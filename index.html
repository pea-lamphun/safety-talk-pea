<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // ============ ICONS ============
    const Ic = ({sz=20,cl='',ch}) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={sz} height={sz} viewBox="0 0 24 24"
        fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={cl}>
        {ch}
      </svg>
    );
    const ICamera      = (p) => <Ic sz={p.sz} cl={p.cl} ch={<><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>}/>;
    const IMapPin      = (p) => <Ic sz={p.sz} cl={p.cl} ch={<><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></>}/>;
    const IClock       = (p) => <Ic sz={p.sz} cl={p.cl} ch={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>}/>;
    const IUsers       = (p) => <Ic sz={p.sz} cl={p.cl} ch={<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>}/>;
    const ICheck       = (p) => <Ic sz={p.sz} cl={p.cl} ch={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>}/>;
    const IXCircle     = (p) => <Ic sz={p.sz} cl={p.cl} ch={<><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></>}/>;
    const ICalendar    = (p) => <Ic sz={p.sz} cl={p.cl} ch={<><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>}/>;
    const ITrend       = (p) => <Ic sz={p.sz} cl={p.cl} ch={<><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></>}/>;
    const IAlert       = (p) => <Ic sz={p.sz} cl={p.cl} ch={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>}/>;
    const ICog         = (p) => <Ic sz={p.sz} cl={p.cl} ch={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>}/>;
    const IQr          = (p) => <Ic sz={p.sz} cl={p.cl} ch={<><rect x="3" y="3" width="5" height="5"/><rect x="16" y="3" width="5" height="5"/><rect x="3" y="16" width="5" height="5"/><rect x="13" y="13" width="2" height="2"/><rect x="16" y="16" width="2" height="2"/></>}/>;
    const IDownload    = (p) => <Ic sz={p.sz} cl={p.cl} ch={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>}/>;
    const IUserPlus    = (p) => <Ic sz={p.sz} cl={p.cl} ch={<><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></>}/>;
    const IEdit        = (p) => <Ic sz={p.sz} cl={p.cl} ch={<path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>}/>;
    const ITrash       = (p) => <Ic sz={p.sz} cl={p.cl} ch={<><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>}/>;
    const ISearch      = (p) => <Ic sz={p.sz} cl={p.cl} ch={<><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></>}/>;
    const IFile        = (p) => <Ic sz={p.sz} cl={p.cl} ch={<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></>}/>;
    const IBar         = (p) => <Ic sz={p.sz} cl={p.cl} ch={<><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></>}/>;
    const IChev        = (p) => <Ic sz={p.sz} cl={p.cl} ch={<polyline points="9 18 15 12 9 6"/>}/>;
    const IFlip        = (p) => <Ic sz={p.sz} cl={p.cl} ch={<><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></>}/>;
    const IEye         = (p) => <Ic sz={p.sz} cl={p.cl} ch={<><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>}/>;
    const ISpin        = (p) => <Ic sz={p.sz} cl={p.cl + ' animate-spin'} ch={<><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></>}/>;

    // ============ LOCATIONS ============
    const DEFAULT_LOCATIONS = {
      lampun:        { id:'lampun',        name:'กฟจ.ลำพูน',         fullName:'การไฟฟ้าส่วนภูมิภาคจังหวัดลำพูน',          lat:18.5745, lng:99.0087 },
      pasang:        { id:'pasang',        name:'กฟส.ป่าซาง',        fullName:'การไฟฟ้าส่วนภูมิภาคสาขาป่าซาง',            lat:18.5235, lng:98.9394 },
      banhong:       { id:'banhong',       name:'กฟส.บ้านโฮ่ง',      fullName:'การไฟฟ้าส่วนภูมิภาคสาขาบ้านโฮ่ง',          lat:18.7367, lng:98.9436 },
      li:            { id:'li',            name:'กฟส.ลี้',            fullName:'การไฟฟ้าส่วนภูมิภาคสาขาลี้',               lat:18.2773, lng:99.0534 },
      banthi:        { id:'banthi',        name:'กฟส.บ้านธิ',        fullName:'การไฟฟ้าส่วนภูมิภาคสาขาบ้านธิ',            lat:18.4156, lng:99.1367 },
      maeta:         { id:'maeta',         name:'กฟส.แม่ทา',         fullName:'การไฟฟ้าส่วนภูมิภาคสาขาแม่ทา',             lat:18.1856, lng:99.2678 },
      nakornchadee:  { id:'nakornchadee',  name:'กฟส.นครเจดีย์',     fullName:'การไฟฟ้าส่วนภูมิภาคสาขานครเจดีย์',         lat:18.3456, lng:99.5134 },
      wiangnonglong: { id:'wiangnonglong', name:'กฟส.เวียงหนองล่อง', fullName:'การไฟฟ้าส่วนภูมิภาคสาขาเวียงหนองล่อง',     lat:18.6523, lng:99.2134 },
      thunghuachang: { id:'thunghuachang', name:'กฟส.ทุ่งหัวช้าง',   fullName:'การไฟฟ้าส่วนภูมิภาคสาขาทุ่งหัวช้าง',       lat:18.4012, lng:99.3245 },
      maetuen:       { id:'maetuen',       name:'กฟส.แม่ตืน',        fullName:'การไฟฟ้าส่วนภูมิภาคสาขาแม่ตืน',            lat:18.1234, lng:99.4567 },
    };
    function loadLocs() { try { const s=localStorage.getItem('pea-locs'); return s?JSON.parse(s):DEFAULT_LOCATIONS; } catch(e){return DEFAULT_LOCATIONS;} }
    function saveLocs(l) { localStorage.setItem('pea-locs',JSON.stringify(l)); }

    const CONFIG = { maxDistance:30, allowedTime:{ start:'08:00', end:'09:30' } };

    // ============ HELPERS ============
    function calcDist(la1,lo1,la2,lo2){const R=6371e3,p1=la1*Math.PI/180,p2=la2*Math.PI/180,dp=(la2-la1)*Math.PI/180,dl=(lo2-lo1)*Math.PI/180,a=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
    function withinTime(s,e){const n=new Date(),t=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;return t>=s&&t<=e;}
    function thaiDT(d){return new Date(d).toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});}
    function compress(b64,maxW=800,q=0.7){return new Promise((res,rej)=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',q));};img.onerror=()=>rej(new Error('img'));img.src=b64;});}
    function b64Blob(b64){const[hd,dt]=b64.split(','),mime=hd.match(/:(.*?);/)[1],bin=atob(dt),arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return new Blob([arr],{type:mime});}

    // ============ FIREBASE OPS ============
    async function uploadPhoto(blob,path){const ref=storage.ref(path);await ref.put(blob);return await ref.getDownloadURL();}
    async function fetchEmployees(){const s=await db.collection('employees').get();return s.docs.map(d=>({id:d.id,...d.data()}));}
    async function fetchAttendances(){const s=await db.collection('attendances').orderBy('timestamp','desc').get();return s.docs.map(d=>({id:d.id,...d.data()}));}

    // ============ MAIN APP ============
    function App() {
      const [view,setView]       = useState('scan');
      const [emps,setEmps]       = useState([]);
      const [atts,setAtts]       = useState([]);
      const [loading,setLoading] = useState(true);
      const [curLoc,setCurLoc]   = useState('lampun');
      const [locs,setLocs]       = useState(loadLocs());

      useEffect(()=>{
        const p=new URLSearchParams(window.location.search), l=p.get('location'), ls=loadLocs();
        setLocs(ls); if(l&&ls[l]) setCurLoc(l);
        Promise.all([fetchEmployees(),fetchAttendances()])
          .then(([e,a])=>{setEmps(e);setAtts(a);})
          .catch(e=>console.error(e))
          .finally(()=>setLoading(false));
      },[]);

      const addAtt = (a) => setAtts(prev=>[a,...prev]);
      const loc    = locs[curLoc]||Object.values(locs)[0];

      if(loading) return (
        <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center">
          <div className="text-center">
            <ISpin sz={48} cl="text-emerald-400 mx-auto mb-4"/>
            <p className="text-emerald-400 font-bold text-xl animate-pulse">กำลังเชื่อมต่อ Firebase...</p>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
          <nav className="bg-slate-900/80 backdrop-blur-lg border-b border-emerald-500/20 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-3 py-3 flex items-center justify-between flex-wrap gap-2">
              <div className="flex items-center space-x-3">
                <div className="bg-emerald-500/20 p-2 rounded-xl"><IQr sz={28} cl="text-emerald-400"/></div>
                <div>
                  <h1 className="text-xl font-black text-emerald-400 leading-tight">Safety Talk</h1>
                  <div className="flex items-center space-x-2 text-xs">
                    <span className="text-slate-400">PEA Lamphun</span>
                    <span className="text-slate-600">•</span>
                    <span className="text-amber-400 font-bold">{loc.name}</span>
                    <span className="text-slate-600">•</span>
                    <span className="text-emerald-500 font-bold">☁ Firebase</span>
                  </div>
                </div>
              </div>
              <div className="flex gap-1 flex-wrap">
                {[['scan',<ICamera sz={16}/> ,'ลงทะเบียน'],
                  ['employees',<IUsers sz={16}/> ,'พนักงาน'],
                  ['reports',<IBar sz={16}/> ,'รายงาน'],
                  ['settings',<ICog sz={16}/> ,'ตั้งค่า']
                ].map(([v,ico,lbl])=>(
                  <button key={v} onClick={()=>setView(v)}
                    className={`px-3 py-2 rounded-lg font-bold text-sm flex items-center gap-1 transition-all ${view===v?'bg-emerald-500 text-slate-900 shadow-lg shadow-emerald-500/50':'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>
                    {ico}<span className="hidden sm:inline">{lbl}</span>
                  </button>
                ))}
              </div>
            </div>
          </nav>
          <div className="max-w-7xl mx-auto px-4 py-6">
            {view==='scan'      && <ScanView      onRegister={addAtt}     curLoc={curLoc} emps={emps} locs={locs}/>}
            {view==='employees' && <EmployeeView  emps={emps} setEmps={setEmps} curLoc={curLoc} locs={locs}/>}
            {view==='reports'   && <ReportsView   atts={atts} emps={emps} curLoc={curLoc} locs={locs}/>}
            {view==='settings'  && <SettingsView  curLoc={curLoc} setCurLoc={setCurLoc} locs={locs} setLocs={setLocs}/>}
          </div>
        </div>
      );
    }

    // ============ SCAN VIEW ============
    function ScanView({ onRegister, curLoc, emps, locs }) {
      const [step,setStep]       = useState('select');
      const [sel,setSel]         = useState(null);
      const [search,setSearch]   = useState('');
      const [photo,setPhoto]     = useState(null);
      const [err,setErr]         = useState('');
      const [saving,setSaving]   = useState(false);
      const [ld,setLd]           = useState(null);
      const [camOpen,setCamOpen] = useState(false);
      const [camMode,setCamMode] = useState('environment');
      const [savedAtt,setSavedAtt] = useState(null);
      const vidRef = useRef(null); const canRef = useRef(null); const stRef = useRef(null);

      const loc      = locs[curLoc]||Object.values(locs)[0];
      const filtered = emps.filter(e=>e.locationId===curLoc&&`${e.prefix}${e.firstName} ${e.lastName} ${e.department} ${e.team}`.toLowerCase().includes(search.toLowerCase()));

      const startCam = useCallback(async(mode)=>{
        if(stRef.current) stRef.current.getTracks().forEach(t=>t.stop());
        try {
          const st=await navigator.mediaDevices.getUserMedia({video:{facingMode:mode||camMode},audio:false});
          stRef.current=st; if(vidRef.current) vidRef.current.srcObject=st; setCamOpen(true);
        } catch(e){alert('ไม่สามารถเปิดกล้องได้: '+e.message);}
      },[camMode]);

      const stopCam = () => { if(stRef.current){stRef.current.getTracks().forEach(t=>t.stop());stRef.current=null;} setCamOpen(false); };

      const capture = async() => {
        const v=vidRef.current,c=canRef.current; if(!v||!c) return;
        c.width=v.videoWidth; c.height=v.videoHeight;
        c.getContext('2d').drawImage(v,0,0); const raw=c.toDataURL('image/jpeg',0.9);
        stopCam(); setPhoto(await compress(raw,800,0.75));
      };

      const flip = () => { const m=camMode==='environment'?'user':'environment'; setCamMode(m); startCam(m); };

      const doRegister = () => {
        setSaving(true); setErr('');
        if(!withinTime(CONFIG.allowedTime.start,CONFIG.allowedTime.end)){
          setErr(`ลงทะเบียนได้เฉพาะเวลา ${CONFIG.allowedTime.start} - ${CONFIG.allowedTime.end} น.`);
          setStep('error'); setSaving(false); return;
        }
        if(!navigator.geolocation){ setErr('เบราว์เซอร์ไม่รองรับ GPS'); setStep('error'); setSaving(false); return; }
        navigator.geolocation.getCurrentPosition(async pos=>{
          const dist=calcDist(pos.coords.latitude,pos.coords.longitude,loc.lat,loc.lng);
          if(dist>CONFIG.maxDistance){
            setErr(`คุณอยู่ห่างจากจุดกิจกรรม ${dist.toFixed(0)} เมตร (อนุญาตไม่เกิน ${CONFIG.maxDistance} เมตร)`);
            setStep('error'); setSaving(false); return;
          }
          const locData={lat:pos.coords.latitude,lng:pos.coords.longitude,distance:dist.toFixed(2)};
          try {
            const blob=b64Blob(photo);
            const ts=new Date().toISOString().replace(/[:.]/g,'-');
            const path=`photos/${curLoc}/${sel.id}_${ts}.jpg`;
            const photoURL=await uploadPhoto(blob,path);
            const att={
              employeeId:sel.id,
              employeeName:`${sel.prefix}${sel.firstName} ${sel.lastName}`,
              department:sel.department, team:sel.team,
              timestamp:new Date().toISOString(),
              location:locData, locationId:curLoc, locationName:loc.name,
              photoURL, photoPath:path, distance:locData.distance
            };
            const ref=await db.collection('attendances').add(att);
            const full={id:ref.id,...att};
            onRegister(full); setLd(locData); setSavedAtt(full); setStep('success');
          } catch(e){ setErr('เกิดข้อผิดพลาด: '+e.message); setStep('error'); }
          finally { setSaving(false); }
        },()=>{ setErr('ไม่สามารถตรวจสอบตำแหน่งได้ กรุณาเปิด GPS'); setStep('error'); setSaving(false); },
        {enableHighAccuracy:true,timeout:15000});
      };

      const reset = () => { setStep('select');setSel(null);setSearch('');setPhoto(null);setErr('');setLd(null);setSavedAtt(null);stopCam(); };

      // ── SELECT ──
      if(step==='select') return (
        <div className="max-w-4xl mx-auto">
          <div className="bg-slate-800/50 backdrop-blur-lg border border-emerald-500/30 rounded-2xl p-8 shadow-2xl">
            <div className="text-center mb-8">
              <div className="inline-block bg-emerald-500/20 p-4 rounded-full mb-4"><IUsers sz={48} cl="text-emerald-400"/></div>
              <h2 className="text-3xl font-black text-white mb-3">ลงทะเบียนเข้าร่วมกิจกรรม Safety Talk</h2>
              <div className="inline-flex items-center space-x-3 bg-gradient-to-r from-emerald-500/20 to-teal-500/20 border-2 border-emerald-500/40 px-6 py-3 rounded-xl mt-2">
                <IMapPin sz={20} cl="text-emerald-400"/>
                <div className="text-left">
                  <div className="text-emerald-400 font-black text-lg leading-tight">{loc.name}</div>
                  <div className="text-slate-300 text-xs">{loc.fullName}</div>
                </div>
              </div>
            </div>
            <div className="space-y-4">
              <input value={search} onChange={e=>setSearch(e.target.value)}
                className="w-full bg-slate-900/50 border-2 border-slate-700 text-white px-4 py-3 rounded-lg focus:border-emerald-500 focus:outline-none text-lg"
                placeholder="🔍 ค้นหาชื่อ-นามสกุล..."/>
              <div className="bg-slate-900/50 rounded-lg max-h-80 overflow-y-auto">
                {filtered.length===0
                  ? <div className="text-center py-12 text-slate-500"><IUsers sz={40} cl="mx-auto mb-3 opacity-50"/><p>ไม่พบรายชื่อ</p><p className="text-sm mt-1">กรุณาเพิ่มพนักงานในเมนู "พนักงาน"</p></div>
                  : filtered.map(e=>(
                    <button key={e.id} onClick={()=>{setSel(e);setStep('photo');}}
                      className="w-full p-4 hover:bg-slate-800 transition-colors text-left flex items-center justify-between border-b border-slate-700/50 last:border-0">
                      <div><div className="text-white font-bold">{e.prefix}{e.firstName} {e.lastName}</div><div className="text-slate-400 text-sm">{e.department} • {e.team}</div></div>
                      <IChev sz={20} cl="text-emerald-400"/>
                    </button>
                  ))
                }
              </div>
              <div className="bg-slate-900/50 border border-emerald-500/20 rounded-lg p-4 text-sm text-slate-300 space-y-1.5">
                <p className="text-white font-bold flex items-center mb-2"><IAlert sz={16} cl="text-yellow-400 mr-2"/>ข้อกำหนดการลงทะเบียน</p>
                <p className="flex items-center"><IClock sz={14} cl="text-emerald-400 mr-2"/>เวลา {CONFIG.allowedTime.start} - {CONFIG.allowedTime.end} น.</p>
                <p className="flex items-center"><IMapPin sz={14} cl="text-emerald-400 mr-2"/>ต้องอยู่ภายในรัศมี {CONFIG.maxDistance} เมตร</p>
                <p className="flex items-center"><ICamera sz={14} cl="text-emerald-400 mr-2"/>ต้องถ่ายรูปยืนยันตัวตน (เก็บใน Firebase Storage)</p>
              </div>
            </div>
          </div>
        </div>
      );

      // ── PHOTO ──
      if(step==='photo') return (
        <div className="max-w-2xl mx-auto">
          <div className="bg-slate-800/50 backdrop-blur-lg border border-emerald-500/30 rounded-2xl p-8 shadow-2xl">
            <div className="text-center mb-6">
              <h2 className="text-2xl font-black text-white mb-1">ถ่ายรูปยืนยันตัวตน</h2>
              <p className="text-slate-300 font-semibold">{sel.prefix}{sel.firstName} {sel.lastName}</p>
              <p className="text-emerald-400 text-sm">{sel.department} • {sel.team}</p>
            </div>
            <div className="space-y-4">
              {!photo && !camOpen && (
                <button onClick={()=>startCam()}
                  className="w-full bg-slate-700 border-2 border-slate-600 text-white font-bold py-5 rounded-lg hover:bg-slate-600 flex items-center justify-center text-lg">
                  <ICamera sz={24} cl="mr-3"/>เปิดกล้องถ่ายรูป
                </button>
              )}
              {camOpen && !photo && (
                <div className="space-y-3">
                  <div className="relative bg-black rounded-xl overflow-hidden">
                    <video ref={vidRef} autoPlay playsInline muted className="w-full h-auto"/>
                    <div className="absolute inset-0 border-4 border-emerald-500/40 rounded-xl pointer-events-none"/>
                    <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                      <div className="w-44 h-56 border-4 border-emerald-400/60 rounded-full"/>
                    </div>
                    <button onClick={flip} className="absolute top-3 right-3 bg-slate-900/80 text-white p-2.5 rounded-xl border border-emerald-500/30">
                      <IFlip sz={20}/>
                    </button>
                    <div className="absolute bottom-3 left-0 right-0 flex justify-center">
                      <span className="text-white text-sm bg-slate-900/80 px-3 py-1 rounded-full">
                        {camMode==='environment'?'📷 กล้องหลัง':'🤳 กล้องหน้า'}
                      </span>
                    </div>
                  </div>
                  <p className="text-slate-400 text-xs text-center">จัดใบหน้าให้อยู่ในวงรี แล้วกดถ่ายรูป</p>
                  <div className="flex space-x-3">
                    <button onClick={()=>{stopCam();setStep('select');}} className="flex-1 bg-slate-700 text-white font-bold py-3 rounded-lg hover:bg-slate-600">ยกเลิก</button>
                    <button onClick={capture} className="flex-1 bg-gradient-to-r from-emerald-500 to-teal-500 text-slate-900 font-black py-3 rounded-lg hover:shadow-lg hover:shadow-emerald-500/50">
                      <ICamera sz={18} cl="inline mr-2"/>ถ่ายรูป
                    </button>
                  </div>
                </div>
              )}
              {photo && (
                <div className="space-y-3">
                  <div className="relative rounded-xl overflow-hidden">
                    <img src={photo} alt="preview" className="w-full h-auto rounded-xl"/>
                    <div className="absolute top-3 right-3 bg-emerald-500/90 text-slate-900 px-3 py-1 rounded-full text-sm font-bold">✓ ถ่ายแล้ว</div>
                  </div>
                  <div className="flex space-x-3">
                    <button onClick={()=>{setPhoto(null);startCam();}} className="flex-1 bg-slate-700 text-white font-bold py-3 rounded-lg hover:bg-slate-600">ถ่ายใหม่</button>
                    <button onClick={doRegister} disabled={saving}
                      className="flex-1 bg-gradient-to-r from-emerald-500 to-teal-500 text-slate-900 font-black py-3 rounded-lg disabled:opacity-60 flex items-center justify-center">
                      {saving?<><ISpin sz={18} cl="mr-2"/>กำลังบันทึก...</>:'ลงทะเบียน →'}
                    </button>
                  </div>
                  {saving&&<div className="bg-blue-500/10 border border-blue-500/30 rounded-lg p-3 text-center text-blue-400 text-sm">📤 กำลังอัปโหลดรูปไป Firebase Storage...</div>}
                </div>
              )}
              <canvas ref={canRef} className="hidden"/>
            </div>
          </div>
        </div>
      );

      // ── SUCCESS ──
      if(step==='success') return (
        <div className="max-w-2xl mx-auto">
          <div className="bg-slate-800/50 backdrop-blur-lg border border-emerald-500/30 rounded-2xl p-8 shadow-2xl text-center">
            <div className="inline-block bg-emerald-500/20 p-6 rounded-full mb-6"><ICheck sz={64} cl="text-emerald-400"/></div>
            <h2 className="text-3xl font-black text-white mb-2">ลงทะเบียนสำเร็จ!</h2>
            <p className="text-emerald-400 font-bold text-lg mb-1">✓ บันทึกข้อมูลและรูปภาพสำเร็จ</p>
            <p className="text-slate-400 text-sm mb-6">รูปภาพถูกเก็บใน Firebase Storage เรียบร้อยแล้ว</p>
            <div className="bg-slate-900/50 rounded-lg p-5 mb-5 text-left space-y-3">
              <div><p className="text-slate-500 text-xs font-bold mb-0.5">ชื่อ-นามสกุล</p><p className="text-white font-bold">{sel.prefix}{sel.firstName} {sel.lastName}</p></div>
              <div className="grid grid-cols-2 gap-3">
                <div><p className="text-slate-500 text-xs font-bold mb-0.5">หน่วยงาน</p><p className="text-emerald-400 font-bold">{loc.name}</p></div>
                <div><p className="text-slate-500 text-xs font-bold mb-0.5">ระยะห่าง</p><p className="text-emerald-400 font-bold">{ld?.distance} ม.</p></div>
                <div className="col-span-2"><p className="text-slate-500 text-xs font-bold mb-0.5">เวลา</p><p className="text-white">{thaiDT(new Date())}</p></div>
              </div>
              {savedAtt?.photoURL&&(
                <div>
                  <p className="text-slate-500 text-xs font-bold mb-2">🖼 รูปที่บันทึกใน Firebase</p>
                  <img src={savedAtt.photoURL} alt="saved" className="w-full max-h-52 object-cover rounded-xl border border-emerald-500/30"/>
                </div>
              )}
            </div>
            <button onClick={reset} className="w-full bg-gradient-to-r from-emerald-500 to-teal-500 text-slate-900 font-black py-4 rounded-lg hover:shadow-lg hover:shadow-emerald-500/50 text-lg">
              ลงทะเบียนคนถัดไป
            </button>
          </div>
        </div>
      );

      // ── ERROR ──
      if(step==='error') return (
        <div className="max-w-2xl mx-auto">
          <div className="bg-slate-800/50 backdrop-blur-lg border border-red-500/30 rounded-2xl p-8 shadow-2xl text-center">
            <div className="inline-block bg-red-500/20 p-6 rounded-full mb-6"><IXCircle sz={64} cl="text-red-400"/></div>
            <h2 className="text-3xl font-black text-white mb-3">ไม่สามารถลงทะเบียนได้</h2>
            <p className="text-red-400 mb-6 font-semibold">{err}</p>
            <button onClick={reset} className="w-full bg-slate-700 text-white font-bold py-4 rounded-lg hover:bg-slate-600 text-lg">ลองใหม่อีกครั้ง</button>
          </div>
        </div>
      );
      return null;
    }

    // ============ EMPLOYEE VIEW ============
    function EmployeeView({ emps, setEmps, curLoc, locs }) {
      const [showForm,setShowForm] = useState(false);
      const [editing,setEditing]   = useState(null);
      const [search,setSearch]     = useState('');
      const blank = {prefix:'นาย',firstName:'',lastName:'',department:'',team:'',locationId:curLoc};
      const [form,setForm] = useState({...blank});

      const locEmps  = emps.filter(e=>e.locationId===curLoc);
      const filtered = locEmps.filter(e=>`${e.prefix}${e.firstName} ${e.lastName} ${e.department} ${e.team}`.toLowerCase().includes(search.toLowerCase()));

      const submit = async(ev) => {
        ev.preventDefault();
        try {
          if(editing){ await db.collection('employees').doc(editing.id).update(form); setEmps(emps.map(e=>e.id===editing.id?{...e,...form}:e)); }
          else { const r=await db.collection('employees').add(form); setEmps([...emps,{...form,id:r.id}]); }
          resetForm();
        } catch(e){ alert('เกิดข้อผิดพลาด: '+e.message); }
      };
      const del = async(id) => {
        if(!confirm('ต้องการลบพนักงานคนนี้?')) return;
        try { await db.collection('employees').doc(id).delete(); setEmps(emps.filter(e=>e.id!==id)); }
        catch(e){ alert('ลบไม่ได้: '+e.message); }
      };
      const edit = (e) => { setEditing(e); setForm({prefix:e.prefix,firstName:e.firstName,lastName:e.lastName,department:e.department,team:e.team,locationId:e.locationId}); setShowForm(true); };
      const resetForm = () => { setShowForm(false); setEditing(null); setForm({...blank,locationId:curLoc}); };

      return (
        <div className="max-w-6xl mx-auto">
          <div className="bg-slate-800/50 backdrop-blur-lg border border-emerald-500/30 rounded-2xl p-6 shadow-xl">
            <div className="flex items-center justify-between mb-6">
              <h2 className="text-2xl font-black text-white flex items-center"><IUsers sz={26} cl="text-emerald-400 mr-3"/>จัดการรายชื่อพนักงาน</h2>
              <button onClick={()=>setShowForm(!showForm)} className="bg-emerald-500 text-slate-900 font-bold px-5 py-2.5 rounded-lg hover:shadow-lg hover:shadow-emerald-500/50 flex items-center">
                <IUserPlus sz={18} cl="mr-2"/>เพิ่มพนักงาน
              </button>
            </div>
            {showForm&&(
              <form onSubmit={submit} className="bg-slate-900/50 rounded-lg p-6 mb-6">
                <h3 className="text-white font-bold mb-4">{editing?'แก้ไขข้อมูล':'เพิ่มพนักงานใหม่'}</h3>
                <div className="grid grid-cols-2 gap-4">
                  {[['คำนำหน้า',<select value={form.prefix} onChange={e=>setForm({...form,prefix:e.target.value})} className="w-full bg-slate-800 border border-slate-700 text-white px-3 py-2 rounded-lg focus:border-emerald-500 focus:outline-none">{['นาย','นาง','นางสาว'].map(p=><option key={p}>{p}</option>)}</select>],
                    ['หน่วยงาน',<select value={form.locationId} onChange={e=>setForm({...form,locationId:e.target.value})} className="w-full bg-slate-800 border border-slate-700 text-white px-3 py-2 rounded-lg focus:border-emerald-500 focus:outline-none">{Object.values(locs).map(l=><option key={l.id} value={l.id}>{l.name}</option>)}</select>],
                    ['ชื่อ',<input value={form.firstName} onChange={e=>setForm({...form,firstName:e.target.value})} required className="w-full bg-slate-800 border border-slate-700 text-white px-3 py-2 rounded-lg focus:border-emerald-500 focus:outline-none"/>],
                    ['นามสกุล',<input value={form.lastName} onChange={e=>setForm({...form,lastName:e.target.value})} required className="w-full bg-slate-800 border border-slate-700 text-white px-3 py-2 rounded-lg focus:border-emerald-500 focus:outline-none"/>],
                    ['แผนก',<input value={form.department} onChange={e=>setForm({...form,department:e.target.value})} required placeholder="เช่น ผกส." className="w-full bg-slate-800 border border-slate-700 text-white px-3 py-2 rounded-lg focus:border-emerald-500 focus:outline-none"/>],
                    ['ชุดงาน',<input value={form.team} onChange={e=>setForm({...form,team:e.target.value})} required placeholder="เช่น ก่อสร้าง 1" className="w-full bg-slate-800 border border-slate-700 text-white px-3 py-2 rounded-lg focus:border-emerald-500 focus:outline-none"/>],
                  ].map(([lbl,inp])=>(<div key={lbl}><label className="block text-slate-400 text-sm font-semibold mb-1">{lbl}</label>{inp}</div>))}
                </div>
                <div className="flex space-x-3 mt-4">
                  <button type="button" onClick={resetForm} className="flex-1 bg-slate-700 text-white font-bold py-2 rounded-lg hover:bg-slate-600">ยกเลิก</button>
                  <button type="submit" className="flex-1 bg-emerald-500 text-slate-900 font-bold py-2 rounded-lg">{editing?'บันทึกการแก้ไข':'เพิ่มพนักงาน'}</button>
                </div>
              </form>
            )}
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 ค้นหาพนักงาน..."
              className="w-full bg-slate-900/50 border border-slate-700 text-white px-4 py-2 rounded-lg focus:border-emerald-500 focus:outline-none mb-4"/>
            <div className="bg-slate-900/50 rounded-lg overflow-x-auto">
              <table className="w-full">
                <thead className="bg-slate-800"><tr>{['ชื่อ-นามสกุล','แผนก','ชุดงาน','หน่วยงาน','จัดการ'].map(h=><th key={h} className="px-4 py-3 text-left text-emerald-400 font-bold text-sm">{h}</th>)}</tr></thead>
                <tbody className="divide-y divide-slate-700">
                  {filtered.length===0
                    ?<tr><td colSpan="5" className="px-4 py-12 text-center text-slate-500"><IUsers sz={40} cl="mx-auto mb-3 opacity-50"/><p>ไม่พบรายชื่อ</p></td></tr>
                    :filtered.map(e=>(
                      <tr key={e.id} className="hover:bg-slate-800/50 transition-colors">
                        <td className="px-4 py-3 text-white font-medium">{e.prefix}{e.firstName} {e.lastName}</td>
                        <td className="px-4 py-3 text-slate-300">{e.department}</td>
                        <td className="px-4 py-3 text-slate-300">{e.team}</td>
                        <td className="px-4 py-3 text-slate-300">{locs[e.locationId]?.name}</td>
                        <td className="px-4 py-3">
                          <div className="flex items-center space-x-2">
                            <button onClick={()=>edit(e)} className="bg-blue-500/20 text-blue-400 p-2 rounded-lg hover:bg-blue-500/30"><IEdit sz={14}/></button>
                            <button onClick={()=>del(e.id)} className="bg-red-500/20 text-red-400 p-2 rounded-lg hover:bg-red-500/30"><ITrash sz={14}/></button>
                          </div>
                        </td>
                      </tr>
                    ))
                  }
                </tbody>
              </table>
            </div>
            <div className="mt-3 text-slate-400 text-sm">แสดง {filtered.length} จาก {locEmps.length} คน ที่ {locs[curLoc]?.name}</div>
          </div>
        </div>
      );
    }

    // ============ REPORTS VIEW ============
    function ReportsView({ atts, emps, curLoc, locs }) {
      const [modal,setModal] = useState(null);
      const loc      = locs[curLoc]||Object.values(locs)[0];
      const locEmps  = emps.filter(e=>e.locationId===curLoc);
      const locAtts  = atts.filter(a=>a.locationId===curLoc);
      const recent   = [...locAtts].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).slice(0,60);

      const grouped  = locEmps.reduce((acc,emp)=>{
        const key=`${emp.department}|${emp.team}`;
        if(!acc[key]) acc[key]={department:emp.department,team:emp.team,employees:[]};
        const ea=locAtts.filter(a=>a.employeeId===emp.id);
        acc[key].employees.push({...emp,atts:ea,rate:(ea.length/52*100).toFixed(1)});
        return acc;
      },{});

      const exportCSV = () => {
        const h=['แผนก','ชุดงาน','ชื่อ-นามสกุล','จำนวนครั้ง','%การเข้าร่วม'];
        const r=Object.values(grouped).flatMap(g=>g.employees.map(e=>[g.department,g.team,`${e.prefix}${e.firstName} ${e.lastName}`,e.atts.length,e.rate]));
        const a=document.createElement('a');
        a.href=URL.createObjectURL(new Blob(['\ufeff'+[h,...r].map(x=>x.join(',')).join('\n')],{type:'text/csv;charset=utf-8;'}));
        a.download=`safety-talk-${curLoc}-${new Date().toISOString().slice(0,10)}.csv`; a.click();
      };

      return (
        <div className="max-w-7xl mx-auto space-y-6">
          {/* Photo Modal */}
          {modal&&(
            <div className="fixed inset-0 bg-black/85 z-50 flex items-center justify-center p-4" onClick={()=>setModal(null)}>
              <div className="relative max-w-md w-full" onClick={e=>e.stopPropagation()}>
                <img src={modal.photoURL} alt="proof" className="w-full rounded-2xl shadow-2xl border-2 border-emerald-500/40"/>
                <div className="mt-3 bg-slate-900/95 rounded-xl p-4 space-y-1">
                  <p className="text-white font-black text-lg">{modal.employeeName}</p>
                  <p className="text-slate-400 text-sm">{modal.department} • {modal.team}</p>
                  <p className="text-emerald-400 text-sm font-semibold">{thaiDT(modal.timestamp)}</p>
                  <p className="text-slate-300 text-sm">📍 ระยะห่าง <span className="text-white font-bold">{modal.distance} เมตร</span></p>
                  <p className="text-slate-400 text-xs font-mono">พิกัด: {modal.location?.lat?.toFixed(6)}, {modal.location?.lng?.toFixed(6)}</p>
                  <p className="text-slate-500 text-xs">สาขา: {modal.locationName}</p>
                </div>
                <button onClick={()=>setModal(null)} className="absolute top-2 right-2 bg-slate-900/80 text-white w-9 h-9 rounded-full flex items-center justify-center font-black text-lg hover:bg-red-500 transition-colors">✕</button>
              </div>
            </div>
          )}

          {/* Header */}
          <div className="bg-slate-800/50 backdrop-blur-lg border border-emerald-500/30 rounded-2xl p-6 shadow-xl flex flex-wrap gap-3 items-center justify-between">
            <div>
              <h2 className="text-2xl font-black text-white flex items-center"><IBar sz={26} cl="text-emerald-400 mr-3"/>รายงานการเข้าร่วมกิจกรรม</h2>
              <p className="text-slate-400 mt-1 text-sm">{loc.fullName}</p>
            </div>
            <button onClick={exportCSV} className="bg-emerald-500 text-slate-900 font-bold px-5 py-2.5 rounded-lg hover:shadow-lg hover:shadow-emerald-500/50 flex items-center">
              <IDownload sz={18} cl="mr-2"/>Export CSV
            </button>
          </div>

          {/* Stats */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            {[
              [locEmps.length,'พนักงานทั้งหมด',<IUsers sz={28} cl="text-slate-900"/>,'from-emerald-500 to-teal-500','text-slate-900','text-slate-700'],
              [locAtts.length,'ครั้งที่เข้าร่วม',<ICheck sz={28} cl="text-emerald-400"/>,'bg-slate-800/50 border border-emerald-500/30','text-white','text-slate-400'],
              [locEmps.length>0?((locAtts.length/(locEmps.length*52))*100).toFixed(1)+'%':'0%','% เฉลี่ยรวม',<ITrend sz={28} cl="text-emerald-400"/>,'bg-slate-800/50 border border-emerald-500/30','text-white','text-slate-400'],
              [52,'สัปดาห์/ปี',<ICalendar sz={28} cl="text-emerald-400"/>,'bg-slate-800/50 border border-emerald-500/30','text-white','text-slate-400'],
            ].map(([v,l,ic,bg,tc,sc])=>(
              <div key={l} className={`bg-gradient-to-br ${bg} rounded-2xl p-5 shadow-xl`}>
                {ic}<div className={`text-3xl font-black ${tc} mt-2`}>{v}</div><div className={`${sc} font-semibold text-xs mt-1`}>{l}</div>
              </div>
            ))}
          </div>

          {/* Photo grid — หลักฐานรูปภาพ */}
          <div className="bg-slate-800/50 backdrop-blur-lg border border-emerald-500/30 rounded-2xl p-6 shadow-xl">
            <h3 className="text-xl font-black text-white mb-1 flex items-center"><IEye sz={22} cl="text-emerald-400 mr-2"/>หลักฐานรูปภาพล่าสุด</h3>
            <p className="text-slate-400 text-sm mb-4">กดที่รูปเพื่อดูรายละเอียด พิกัด และเวลา</p>
            {recent.length===0
              ? <div className="text-center py-10 text-slate-500"><IFile sz={40} cl="mx-auto mb-3 opacity-50"/><p>ยังไม่มีข้อมูล</p></div>
              : <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3">
                  {recent.map(a=>(
                    <div key={a.id} className="bg-slate-900/70 rounded-xl overflow-hidden border border-slate-700 hover:border-emerald-500/60 transition-all cursor-pointer group"
                      onClick={()=>a.photoURL&&setModal(a)}>
                      {a.photoURL
                        ? <div className="relative">
                            <img src={a.photoURL} alt="proof" className="w-full h-36 object-cover group-hover:opacity-90 transition-opacity"/>
                            <div className="absolute inset-0 bg-gradient-to-t from-slate-900/70 to-transparent"/>
                            <div className="absolute bottom-2 left-2 right-2 flex items-center justify-between">
                              <span className="text-emerald-400 text-xs font-bold bg-slate-900/80 px-1.5 py-0.5 rounded-full">📍{a.distance}ม.</span>
                              <span className="text-white text-xs bg-slate-900/80 px-1.5 py-0.5 rounded-full opacity-0 group-hover:opacity-100 transition-opacity">🔍ดู</span>
                            </div>
                          </div>
                        : <div className="w-full h-36 bg-slate-800 flex items-center justify-center"><ICamera sz={28} cl="text-slate-600"/></div>
                      }
                      <div className="p-2.5">
                        <p className="text-white font-bold text-xs truncate">{a.employeeName}</p>
                        <p className="text-slate-400 text-xs truncate">{a.department}</p>
                        <p className="text-emerald-400 text-xs mt-0.5">{new Date(a.timestamp).toLocaleDateString('th-TH',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</p>
                      </div>
                    </div>
                  ))}
                </div>
            }
          </div>

          {/* Summary table */}
          <div className="bg-slate-800/50 backdrop-blur-lg border border-emerald-500/30 rounded-2xl p-6 shadow-xl">
            <h3 className="text-xl font-black text-white mb-4">สรุปรายแผนก / ชุดงาน</h3>
            <div className="bg-slate-900/50 rounded-lg overflow-x-auto">
              <table className="w-full">
                <thead className="bg-slate-800"><tr>{['แผนก','ชุดงาน','ชื่อ-นามสกุล','จำนวนครั้ง','%การเข้าร่วม'].map(h=><th key={h} className="px-4 py-3 text-left text-emerald-400 font-bold text-sm">{h}</th>)}</tr></thead>
                <tbody className="divide-y divide-slate-700">
                  {Object.values(grouped).length===0
                    ?<tr><td colSpan="5" className="px-4 py-12 text-center text-slate-500"><IFile sz={40} cl="mx-auto mb-3 opacity-50"/><p>ไม่มีข้อมูล</p></td></tr>
                    :Object.values(grouped).flatMap(g=>g.employees.map((e,i)=>(
                      <tr key={e.id} className="hover:bg-slate-800/50 transition-colors">
                        {i===0&&<><td rowSpan={g.employees.length} className="px-4 py-3 text-white font-bold bg-slate-800/30 align-top">{g.department}</td><td rowSpan={g.employees.length} className="px-4 py-3 text-slate-300 bg-slate-800/30 align-top">{g.team}</td></>}
                        <td className="px-4 py-3 text-white">{e.prefix}{e.firstName} {e.lastName}</td>
                        <td className="px-4 py-3 text-center text-slate-300">{e.atts.length}</td>
                        <td className="px-4 py-3 text-center"><span className={`font-bold ${parseFloat(e.rate)>=80?'text-emerald-400':parseFloat(e.rate)>=50?'text-yellow-400':'text-red-400'}`}>{e.rate}%</span></td>
                      </tr>
                    )))
                  }
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // ============ SETTINGS VIEW ============
    function SettingsView({ curLoc, setCurLoc, locs, setLocs }) {
      const [sel,setSel] = useState(curLoc);
      const [saved,setSaved] = useState(false);
      const cur = locs[sel]||Object.values(locs)[0];

      const upd  = (la,ln) => setLocs(prev=>({...prev,[sel]:{...prev[sel],lat:parseFloat(la)||0,lng:parseFloat(ln)||0}}));
      const gps  = () => navigator.geolocation.getCurrentPosition(p=>upd(p.coords.latitude,p.coords.longitude),()=>alert('ไม่สามารถรับตำแหน่งได้'));
      const save = () => { saveLocs(locs); setSaved(true); setTimeout(()=>setSaved(false),3000); };
      const apply= () => { setCurLoc(sel); alert(`เปลี่ยนสถานที่เป็น ${locs[sel].name} แล้ว`); };
      const copy = () => navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}?location=${sel}`).then(()=>alert('คัดลอก URL แล้ว!'));

      return (
        <div className="max-w-4xl mx-auto">
          <div className="bg-slate-800/50 backdrop-blur-lg border border-emerald-500/30 rounded-2xl p-8 shadow-xl">
            <h2 className="text-2xl font-black text-white mb-6 flex items-center"><ICog sz={26} cl="text-emerald-400 mr-3"/>ตั้งค่าระบบ - แอดมิน</h2>

            <div className="bg-gradient-to-r from-emerald-500/10 to-teal-500/10 border border-emerald-500/30 rounded-xl p-6 mb-6">
              <h3 className="text-white font-bold mb-4">เลือกหน่วยงานที่ต้องการตั้งค่า</h3>
              <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-2">
                {Object.values(locs).map(l=>(
                  <button key={l.id} onClick={()=>setSel(l.id)}
                    className={`px-3 py-2 rounded-lg font-bold text-xs transition-all ${sel===l.id?'bg-emerald-500 text-slate-900 shadow-lg shadow-emerald-500/50':'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}>
                    {l.name}
                  </button>
                ))}
              </div>
              <div className="mt-4 p-3 bg-slate-900/50 rounded-lg">
                <p className="text-emerald-400 font-bold">{cur.name}</p>
                <p className="text-slate-400 text-sm">{cur.fullName}</p>
              </div>
            </div>

            <div className="space-y-5">
              <div className="bg-slate-900/50 rounded-lg p-5">
                <h3 className="text-white font-bold mb-4 flex items-center"><IMapPin sz={18} cl="text-emerald-400 mr-2"/>พิกัดจุดกิจกรรม — {cur.name}</h3>
                <div className="grid grid-cols-2 gap-4 mb-3">
                  <div><label className="block text-slate-400 text-sm font-semibold mb-1">Latitude</label>
                    <input type="number" step="0.000001" value={cur.lat} onChange={e=>upd(e.target.value,cur.lng)}
                      className="w-full bg-slate-800 border border-slate-700 text-white px-3 py-2 rounded-lg focus:border-emerald-500 focus:outline-none font-mono text-sm"/></div>
                  <div><label className="block text-slate-400 text-sm font-semibold mb-1">Longitude</label>
                    <input type="number" step="0.000001" value={cur.lng} onChange={e=>upd(cur.lat,e.target.value)}
                      className="w-full bg-slate-800 border border-slate-700 text-white px-3 py-2 rounded-lg focus:border-emerald-500 focus:outline-none font-mono text-sm"/></div>
                </div>
                <button onClick={gps} className="w-full bg-slate-700 text-white font-bold py-2 rounded-lg hover:bg-slate-600 text-sm">
                  <IMapPin sz={14} cl="inline mr-1"/>ใช้ตำแหน่ง GPS ปัจจุบัน
                </button>
              </div>

              <div className="bg-amber-500/10 border border-amber-500/30 rounded-lg p-5">
                <h3 className="text-white font-bold mb-3 flex items-center"><IQr sz={18} cl="text-amber-400 mr-2"/>QR Code แต่ละหน่วยงาน</h3>
                <div className="bg-slate-900/50 rounded-lg p-3 mb-3"><p className="text-emerald-400 font-mono text-xs break-all">{window.location.origin}{window.location.pathname}?location={sel}</p></div>
                <div className="grid grid-cols-2 gap-3">
                  <button onClick={apply} className="bg-amber-500 text-slate-900 font-bold py-2.5 rounded-lg hover:bg-amber-400 text-sm">ใช้งานสถานที่นี้</button>
                  <button onClick={copy}  className="bg-slate-700 text-white font-bold py-2.5 rounded-lg hover:bg-slate-600 text-sm">คัดลอก URL</button>
                </div>
              </div>

              <button onClick={save} className="w-full bg-gradient-to-r from-emerald-500 to-teal-500 text-slate-900 font-black py-4 rounded-lg hover:shadow-lg hover:shadow-emerald-500/50 text-lg">
                {saved?<><ICheck sz={18} cl="inline mr-2"/>บันทึกสำเร็จ!</>:'บันทึกการตั้งค่า'}
              </button>

              {/* Firebase info */}
              <div className="bg-slate-900/50 border border-slate-700 rounded-lg p-4 space-y-2 text-xs">
                <p className="text-white font-bold text-sm">☁ Firebase Storage — โครงสร้างรูปภาพ</p>
                <p className="text-slate-400 font-mono">photos/<span className="text-amber-400">{'{locationId}'}</span>/<span className="text-emerald-400">{'{employeeId}'}</span>_timestamp.jpg</p>
                <p className="text-slate-500">ตัวอย่าง: photos/lampun/emp123_2025-01-10T08-30-00.jpg</p>
                <div className="border-t border-slate-700 pt-2 mt-2">
                  <p className="text-blue-400 flex items-start"><IAlert sz={12} cl="mr-1 mt-0.5 flex-shrink-0"/>
                    ถ้าพบ error "permission denied" ให้ไปตั้งค่า Rules ใน Firebase Console:<br/>
                    Firestore Rules และ Storage Rules ให้เป็น <code className="text-yellow-400 bg-slate-800 px-1 rounded">allow read, write: if true;</code>
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ============ RENDER ============
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
