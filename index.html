  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // ============ SVG ICONS ============
    const Icon = ({ d, size=20, className='', viewBox='0 0 24 24', children }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox={viewBox}
        fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );
    const Camera = ({size,className}) => <Icon size={size} className={className}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></Icon>;
    const MapPin = ({size,className}) => <Icon size={size} className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></Icon>;
    const Clock = ({size,className}) => <Icon size={size} className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;

    const CheckCircle = ({size,className}) => <Icon size={size} className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></Icon>;
    const XCircle = ({size,className}) => <Icon size={size} className={className}><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></Icon>;
    const Calendar = ({size,className}) => <Icon size={size} className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></Icon>;
    const TrendingUp = ({size,className}) => <Icon size={size} className={className}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></Icon>;

    const SettingsIcon = ({size,className}) => <Icon size={size} className={className}><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6m5.2-14.2l-4.2 4.2m0 6l-4.2 4.2M23 12h-6m-6 0H1m19-5.2l-4.2 4.2m0 6l-4.2 4.2M6.8 6.8l4.2 4.2m0 6l4.2 4.2"/></Icon>;
    const QrCode = ({size,className}) => <Icon size={size} className={className}><rect x="3" y="3" width="5" height="5"/><rect x="16" y="3" width="5" height="5"/><rect x="3" y="16" width="5" height="5"/><rect x="13" y="13" width="2" height="2"/><rect x="13" y="16" width="2" height="2"/><rect x="16" y="13" width="2" height="2"/><rect x="19" y="16" width="2" height="2"/></Icon>;
    const Download = ({size,className}) => <Icon size={size} className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;
    const UserPlus = ({size,className}) => <Icon size={size} className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></Icon>;
    const Edit2 = ({size,className}) => <Icon size={size} className={className}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></Icon>;
    const Trash2 = ({size,className}) => <Icon size={size} className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></Icon>;
    const Search = ({size,className}) => <Icon size={size} className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></Icon>;
    const FileText = ({size,className}) => <Icon size={size} className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></Icon>;
    const BarChart3 = ({size,className}) => <Icon size={size} className={className}><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></Icon>;
    const ChevronRight = ({size,className}) => <Icon size={size} className={className}><polyline points="9 18 15 12 9 6"/></Icon>;
    const RefreshCw = ({size,className}) => <Icon size={size} className={className}><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></Icon>;

    // ============ LOCAL STORAGE DATABASE ============
    class DB {
      constructor() {
        this._load();
      }
      _load() {
        try {
          const s = localStorage.getItem('safety-talk-db');
          this.data = s ? JSON.parse(s) : { employees: {}, attendances: {} };
        } catch(e) {
          this.data = { employees: {}, attendances: {} };
        }
      }
      _save() {
        localStorage.setItem('safety-talk-db', JSON.stringify(this.data));
      }
      collection(name) {
        const self = this;
        return {
          add(obj) {
            const id = Date.now().toString() + Math.random().toString(36).slice(2,6);
            self.data[name] = self.data[name] || {};
            self.data[name][id] = { ...obj, id };
            self._save();
            return { id };
          },
          getAll() {
            return Object.values(self.data[name] || {});
          },
          doc(id) {
            return {
              update(patch) {
                if (self.data[name]?.[id]) {
                  self.data[name][id] = { ...self.data[name][id], ...patch };
                  self._save();
                }
              },
              delete() {
                if (self.data[name]?.[id]) {
                  delete self.data[name][id];
                  self._save();
                }
              }
            };
          }
        };
      }
    }
    const db = new DB();

    // ============ LOCATIONS ============
    const DEFAULT_LOCATIONS = {
      lampun:        { id:'lampun',        name:'กฟจ.ลำพูน',         fullName:'การไฟฟ้าส่วนภูมิภาคจังหวัดลำพูน',             lat:18.5745, lng:99.0087, color:'#10b981' },
      pasang:        { id:'pasang',        name:'กฟส.ป่าซาง',        fullName:'การไฟฟ้าส่วนภูมิภาคสาขาป่าซาง',               lat:18.5235, lng:98.9394, color:'#3b82f6' },
      banhong:       { id:'banhong',       name:'กฟส.บ้านโฮ่ง',      fullName:'การไฟฟ้าส่วนภูมิภาคสาขาบ้านโฮ่ง',             lat:18.7367, lng:98.9436, color:'#8b5cf6' },
      li:            { id:'li',            name:'กฟส.ลี้',            fullName:'การไฟฟ้าส่วนภูมิภาคสาขาลี้',                  lat:18.2773, lng:99.0534, color:'#f59e0b' },
      banthi:        { id:'banthi',        name:'กฟส.บ้านธิ',        fullName:'การไฟฟ้าส่วนภูมิภาคสาขาบ้านธิ',               lat:18.4156, lng:99.1367, color:'#ec4899' },
      maeta:         { id:'maeta',         name:'กฟส.แม่ทา',         fullName:'การไฟฟ้าส่วนภูมิภาคสาขาแม่ทา',                lat:18.1856, lng:99.2678, color:'#14b8a6' },
      nakornchadee:  { id:'nakornchadee',  name:'กฟส.นครเจดีย์',     fullName:'การไฟฟ้าส่วนภูมิภาคสาขานครเจดีย์',            lat:18.3456, lng:99.5134, color:'#06b6d4' },
      wiangnonglong: { id:'wiangnonglong', name:'กฟส.เวียงหนองล่อง', fullName:'การไฟฟ้าส่วนภูมิภาคสาขาเวียงหนองล่อง',        lat:18.6523, lng:99.2134, color:'#a855f7' },
      thunghuachang: { id:'thunghuachang', name:'กฟส.ทุ่งหัวช้าง',   fullName:'การไฟฟ้าส่วนภูมิภาคสาขาทุ่งหัวช้าง',          lat:18.4012, lng:99.3245, color:'#f97316' },
      maetuen:       { id:'maetuen',       name:'กฟส.แม่ตืน',        fullName:'การไฟฟ้าส่วนภูมิภาคสาขาแม่ตืน',               lat:18.1234, lng:99.4567, color:'#84cc16' },
    };

    function loadLocations() {
      try {
        const s = localStorage.getItem('safety-talk-locations');
        return s ? JSON.parse(s) : DEFAULT_LOCATIONS;
      } catch(e) { return DEFAULT_LOCATIONS; }
    }
    function saveLocations(locs) {
      localStorage.setItem('safety-talk-locations', JSON.stringify(locs));
    }

    const CONFIG = { maxDistance: 30, allowedTime: { start: '08:00', end: '09:30' } };

    // ============ HELPERS ============
    function calcDistance(lat1,lon1,lat2,lon2) {
      const R=6371e3, p1=lat1*Math.PI/180, p2=lat2*Math.PI/180;
      const dp=(lat2-lat1)*Math.PI/180, dl=(lon2-lon1)*Math.PI/180;
      const a=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
      return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    }
    function withinTime(start,end) {
      const now=new Date();
      const t=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      return t>=start && t<=end;
    }
    function thaiDateTime(d) {
      return new Date(d).toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
    }
    function compressImage(b64, maxW=400, q=0.3) {
      return new Promise((res,rej) => {
        const img=new Image();
        img.onload=()=>{
          const canvas=document.createElement('canvas');
          let w=img.width, h=img.height;
          if(w>maxW){h=h*maxW/w;w=maxW;}
          canvas.width=w; canvas.height=h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          res(canvas.toDataURL('image/jpeg',q));
        };
        img.onerror=()=>rej(new Error('img load fail'));
        img.src=b64;
      });
    }

    // ============ MAIN APP ============
    function App() {
      const [view, setView] = useState('scan');
      const [employees, setEmployees] = useState([]);
      const [attendances, setAttendances] = useState([]);
      const [currentLocation, setCurrentLocation] = useState('lampun');
      const [locations, setLocations] = useState(loadLocations());

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const loc = params.get('location');
        const locs = loadLocations();
        setLocations(locs);
        if (loc && locs[loc]) setCurrentLocation(loc);
        setEmployees(db.collection('employees').getAll());
        setAttendances(db.collection('attendances').getAll());
      }, []);

      const addAttendance = (att) => {
        const saved = db.collection('attendances').add(att);
        setAttendances(prev => [...prev, { ...att, id: saved.id }]);
      };

      const locConfig = locations[currentLocation] || Object.values(locations)[0];

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
          {/* NAV */}
          <nav className="bg-slate-900/80 backdrop-blur-lg border-b border-emerald-500/20 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-3 py-3">
              <div className="flex items-center justify-between flex-wrap gap-2">
                <div className="flex items-center space-x-3">
                  <div className="bg-emerald-500/20 p-2 rounded-xl">
                    <QrCode className="text-emerald-400" size={28} />
                  </div>
                  <div>
                    <h1 className="text-xl font-black text-emerald-400 leading-tight">Safety Talk</h1>
                    <div className="flex items-center space-x-2">
                      <span className="text-slate-400 text-xs">Registration System</span>
                      <span className="text-slate-600">•</span>
                      <span className="text-amber-400 font-bold text-xs">{locConfig.name}</span>
                    </div>
                  </div>
                </div>
                <div className="flex space-x-1 flex-wrap gap-1">
                  {[
                    ['scan','ลงทะเบียน',<Camera size={16}/>],
                    ['employees','พนักงาน',<Users size={16}/>],
                    ['reports','รายงาน',<BarChart3 size={16}/>],
                    ['settings','ตั้งค่า',<SettingsIcon size={16}/>],
                  ].map(([v,label,icon])=>(
                    <button key={v} onClick={()=>setView(v)}
                      className={`px-3 py-2 rounded-lg font-bold text-sm transition-all flex items-center gap-1 ${view===v?'bg-emerald-500 text-slate-900 shadow-lg shadow-emerald-500/50':'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>
                      {icon}<span className="hidden sm:inline">{label}</span>
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </nav>

          {/* CONTENT */}
          <div className="max-w-7xl mx-auto px-4 py-6">
            {view==='scan'     && <ScanView onRegister={addAttendance} currentLocation={currentLocation} employees={employees} locations={locations} />}
            {view==='employees'&& <EmployeeView employees={employees} setEmployees={setEmployees} currentLocation={currentLocation} locations={locations} />}
            {view==='reports'  && <ReportsView attendances={attendances} employees={employees} currentLocation={currentLocation} locations={locations} />}
            {view==='settings' && <SettingsView currentLocation={currentLocation} setCurrentLocation={setCurrentLocation} locations={locations} setLocations={setLocations} />}
          </div>
        </div>
      );
    }

    // ============ SCAN VIEW ============
    function ScanView({ onRegister, currentLocation, employees, locations }) {
      const [step, setStep] = useState('select');
      const [selected, setSelected] = useState(null);
      const [search, setSearch] = useState('');
      const [photo, setPhoto] = useState(null);
      const [error, setError] = useState('');
      const [checking, setChecking] = useState(false);
      const [locData, setLocData] = useState(null);
      const [camOpen, setCamOpen] = useState(false);
      const [camMode, setCamMode] = useState('user');
      const videoRef = useRef(null);
      const canvasRef = useRef(null);
      const streamRef = useRef(null);

      const locConfig = locations[currentLocation] || Object.values(locations)[0];
      const filtered = employees.filter(e =>
        e.locationId === currentLocation &&
        `${e.prefix}${e.firstName} ${e.lastName} ${e.department} ${e.team}`.toLowerCase().includes(search.toLowerCase())
      );

      const startCamera = async () => {
        stopCamera();
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: camMode }, audio: false });
          streamRef.current = stream;
          if (videoRef.current) videoRef.current.srcObject = stream;
          setCamOpen(true);
        } catch(e) {
          alert('ไม่สามารถเปิดกล้องได้: ' + e.message);
        }
      };
      const stopCamera = () => {
        if (streamRef.current) { streamRef.current.getTracks().forEach(t=>t.stop()); streamRef.current=null; }
        setCamOpen(false);
      };
      const capturePhoto = async () => {
        const video = videoRef.current;
        const canvas = canvasRef.current;
        if (!video || !canvas) return;
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const raw = canvas.toDataURL('image/jpeg', 0.8);
        stopCamera();
        const compressed = await compressImage(raw, 400, 0.3);
        setPhoto(compressed);
      };

      const doRegister = () => {
        setChecking(true);
        setError('');
        if (!withinTime(CONFIG.allowedTime.start, CONFIG.allowedTime.end)) {
          setError(`ลงทะเบียนได้เฉพาะเวลา ${CONFIG.allowedTime.start} - ${CONFIG.allowedTime.end} น.`);
          setStep('error'); setChecking(false); return;
        }
        if (!navigator.geolocation) {
          setError('เบราว์เซอร์ไม่รองรับ GPS'); setStep('error'); setChecking(false); return;
        }
        navigator.geolocation.getCurrentPosition(pos => {
          const dist = calcDistance(pos.coords.latitude, pos.coords.longitude, locConfig.lat, locConfig.lng);
          if (dist > CONFIG.maxDistance) {
            setError(`คุณอยู่ห่างจากจุดกิจกรรม ${dist.toFixed(0)} เมตร (อนุญาตไม่เกิน ${CONFIG.maxDistance} เมตร)`);
            setStep('error'); setChecking(false); return;
          }
          const ld = { lat: pos.coords.latitude, lng: pos.coords.longitude, distance: dist.toFixed(2) };
          onRegister({
            employeeId: selected.id,
            employeeName: `${selected.prefix}${selected.firstName} ${selected.lastName}`,
            department: selected.department,
            team: selected.team,
            timestamp: new Date().toISOString(),
            location: ld,
            locationId: currentLocation,
            locationName: locConfig.name,
            photo,
            distance: ld.distance
          });
          setLocData(ld);
          setStep('success');
          setChecking(false);
        }, () => {
          setError('ไม่สามารถตรวจสอบตำแหน่งได้ กรุณาเปิด GPS และอนุญาตการเข้าถึงตำแหน่ง');
          setStep('error'); setChecking(false);
        }, { enableHighAccuracy: true, timeout: 10000 });
      };

      const reset = () => {
        setStep('select'); setSelected(null); setSearch('');
        setPhoto(null); setError(''); setLocData(null);
        stopCamera();
      };

      if (step === 'select') return (
        <div className="max-w-4xl mx-auto">
          <div className="bg-slate-800/50 backdrop-blur-lg border border-emerald-500/30 rounded-2xl p-8 shadow-2xl">
            <div className="text-center mb-8">
              <div className="inline-block bg-emerald-500/20 p-4 rounded-full mb-4">
                <Users size={48} className="text-emerald-400" />
              </div>
              <h2 className="text-3xl font-black text-white mb-3">ลงทะเบียนเข้าร่วมกิจกรรม Safety Talk</h2>
              <div className="inline-flex items-center space-x-2 bg-gradient-to-r from-emerald-500/20 to-teal-500/20 border-2 border-emerald-500/40 px-6 py-3 rounded-xl mt-2">
                <MapPin size={20} className="text-emerald-400" />
                <div className="text-left">
                  <div className="text-emerald-400 font-black text-lg leading-tight">{locConfig.name}</div>
                  <div className="text-slate-300 text-xs font-semibold">{locConfig.fullName}</div>
                </div>
              </div>
            </div>
            <div className="space-y-4">
              <div>
                <label className="block text-emerald-400 font-bold mb-2 text-sm uppercase tracking-wide">
                  <Search size={14} className="inline mr-1" />ค้นหาชื่อ-นามสกุล
                </label>
                <input value={search} onChange={e=>setSearch(e.target.value)}
                  className="w-full bg-slate-900/50 border-2 border-slate-700 text-white px-4 py-3 rounded-lg focus:border-emerald-500 focus:outline-none text-lg"
                  placeholder="พิมพ์เพื่อค้นหา..." />
              </div>
              <div className="bg-slate-900/50 rounded-lg max-h-80 overflow-y-auto">
                {filtered.length === 0 ? (
                  <div className="text-center py-12 text-slate-500">
                    <Users size={40} className="mx-auto mb-3 opacity-50" />
                    <p className="font-semibold">ไม่พบรายชื่อ</p>
                    <p className="text-sm mt-1">กรุณาเพิ่มพนักงานในเมนู "พนักงาน"</p>
                  </div>
                ) : filtered.map(emp => (
                  <button key={emp.id} onClick={()=>{setSelected(emp);setStep('photo');}}
                    className="w-full p-4 hover:bg-slate-800 transition-colors text-left flex items-center justify-between border-b border-slate-700/50 last:border-0">
                    <div>
                      <div className="text-white font-bold">{emp.prefix}{emp.firstName} {emp.lastName}</div>
                      <div className="text-slate-400 text-sm">{emp.department} - {emp.team}</div>
                    </div>
                    <ChevronRight size={20} className="text-emerald-400" />
                  </button>
                ))}
              </div>
              <div className="bg-slate-900/50 border border-emerald-500/20 rounded-lg p-4">
                <h3 className="text-white font-bold mb-2 flex items-center">
                  <AlertCircle size={18} className="text-yellow-400 mr-2" />ข้อกำหนดการลงทะเบียน
                </h3>
                <ul className="space-y-1 text-sm text-slate-300">
                  <li className="flex items-center"><Clock size={14} className="text-emerald-400 mr-2 flex-shrink-0"/>เวลา {CONFIG.allowedTime.start} - {CONFIG.allowedTime.end} น.</li>
                  <li className="flex items-center"><MapPin size={14} className="text-emerald-400 mr-2 flex-shrink-0"/>ต้องอยู่ภายในรัศมี {CONFIG.maxDistance} เมตร จากจุดลงทะเบียน</li>
                  <li className="flex items-center"><Camera size={14} className="text-emerald-400 mr-2 flex-shrink-0"/>ต้องถ่ายรูปยืนยันตัวตน</li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      );

      if (step === 'photo') return (

      const [search, setSearch] = useState('');

      const locEmps = employees.filter(e => e.locationId === currentLocation);

        `${e.prefix}${e.firstName} ${e.lastName} ${e.department} ${e.team}`.toLowerCase().includes(search.toLowerCase())

      const handleSubmit = (ev) => {
        ev.preventDefault();
        if (editing) {
          db.collection('employees').doc(editing.id).update(form);
          setEmployees(employees.map(e => e.id===editing.id ? {...e,...form} : e));

          setEmployees([...employees, {...form, id: ref.id}]);

        if (!confirm('ต้องการลบพนักงานคนนี้?')) return;

        setEditing(emp);

                <div className="grid grid-cols-2 gap-4">

                    ['คำนำหน้า', <select value={form.prefix} onChange={e=>setForm({...form,prefix:e.target.value})}

                      {Object.values(locations).map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
                    </select>],
                    ['ชื่อ', <input value={form.firstName} onChange={e=>setForm({...form,firstName:e.target.value})} required

                        <div className="flex items-center space-x-2">
                          <button onClick={()=>handleEdit(emp)} className="bg-blue-500/20 text-blue-400 p-2 rounded-lg hover:bg-blue-500/30"><Edit2 size={14}/></button>
                          <button onClick={()=>handleDelete(emp.id)} className="bg-red-500/20 text-red-400 p-2 rounded-lg hover:bg-red-500/30"><Trash2 size={14}/></button>

    // ============ REPORTS VIEW ============
    function ReportsView({ attendances, employees, currentLocation, locations }) {
      const locConfig = locations[currentLocation] || Object.values(locations)[0];
      const locEmps = employees.filter(e=>e.locationId===currentLocation);
      const locAtts = attendances.filter(a=>a.locationId===currentLocation);

      const grouped = locEmps.reduce((acc,emp)=>{
        const key=`${emp.department}|${emp.team}`;
        if(!acc[key]) acc[key]={department:emp.department,team:emp.team,employees:[]};
        const atts=locAtts.filter(a=>a.employeeId===emp.id);
        acc[key].employees.push({...emp,attendances:atts,rate:(atts.length/52*100).toFixed(1)});
        return acc;
      },{});

      const exportCSV = () => {
        const headers=['แผนก','ชุดงาน','ชื่อ-นามสกุล','จำนวนครั้ง','%การเข้าร่วม'];
        const rows=Object.values(grouped).flatMap(g=>g.employees.map(e=>[g.department,g.team,`${e.prefix}${e.firstName} ${e.lastName}`,e.attendances.length,e.rate]));
        const csv=[headers,...rows].map(r=>r.join(',')).join('\n');
        const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
        const a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download=`safety-talk-${currentLocation}-${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
      };

      return (
        <div className="max-w-7xl mx-auto space-y-6">
          <div className="bg-slate-800/50 backdrop-blur-lg border border-emerald-500/30 rounded-2xl p-6 shadow-xl flex items-center justify-between flex-wrap gap-3">
            <div>
              <h2 className="text-2xl font-black text-white flex items-center">
                <BarChart3 size={26} className="text-emerald-400 mr-3" />รายงานการเข้าร่วมกิจกรรม
              </h2>
              <p className="text-slate-400 mt-1 text-sm">{locConfig.fullName}</p>
            </div>
            <button onClick={exportCSV}
              className="bg-emerald-500 text-slate-900 font-bold px-5 py-2.5 rounded-lg hover:shadow-lg hover:shadow-emerald-500/50 flex items-center">
              <Download size={18} className="mr-2" />Export CSV
            </button>
          </div>

          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            {[
              [locEmps.length,'พนักงานทั้งหมด',<Users size={28} className="text-slate-900"/>,'from-emerald-500 to-teal-500','text-slate-900'],
              [locAtts.length,'ครั้งที่เข้าร่วม',<CheckCircle size={28} className="text-emerald-400"/>,'bg-slate-800/50 border border-emerald-500/30','text-white'],
              [locEmps.length>0?((locAtts.length/(locEmps.length*52))*100).toFixed(1)+'%':0+'%','% เฉลี่ยรวม',<TrendingUp size={28} className="text-emerald-400"/>,'bg-slate-800/50 border border-emerald-500/30','text-white'],
              [52,'สัปดาห์/ปี',<Calendar size={28} className="text-emerald-400"/>,'bg-slate-800/50 border border-emerald-500/30','text-white'],
            ].map(([val,label,icon,bg,tc])=>(
              <div key={label} className={`bg-gradient-to-br ${bg} rounded-2xl p-5 shadow-xl`}>
                {icon}
                <div className={`text-3xl font-black ${tc} mt-2`}>{val}</div>
                <div className={`${tc==='text-slate-900'?'text-slate-700':'text-slate-400'} font-semibold text-xs mt-1`}>{label}</div>
              </div>
            ))}
          </div>

          <div className="bg-slate-800/50 backdrop-blur-lg border border-emerald-500/30 rounded-2xl p-6 shadow-xl">
            <h3 className="text-xl font-black text-white mb-4">รายงานแยกตามแผนก/ชุดงาน</h3>
            <div className="bg-slate-900/50 rounded-lg overflow-x-auto">
              <table className="w-full">
                <thead className="bg-slate-800">
                  <tr>
                    {['แผนก','ชุดงาน','ชื่อ-นามสกุล','จำนวนครั้ง','%การเข้าร่วม'].map(h=>(
                      <th key={h} className="px-4 py-3 text-left text-emerald-400 font-bold text-sm">{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-700">
                  {Object.values(grouped).length===0 ? (
                    <tr><td colSpan="5" className="px-4 py-12 text-center text-slate-500">
                      <FileText size={40} className="mx-auto mb-3 opacity-50" /><p>ไม่มีข้อมูล</p>
                    </td></tr>
                  ) : Object.values(grouped).flatMap(g=>
                    g.employees.map((emp,i)=>(
                      <tr key={emp.id} className="hover:bg-slate-800/50 transition-colors">
                        {i===0&&<>
                          <td rowSpan={g.employees.length} className="px-4 py-3 text-white font-bold bg-slate-800/30 align-top">{g.department}</td>
                          <td rowSpan={g.employees.length} className="px-4 py-3 text-slate-300 bg-slate-800/30 align-top">{g.team}</td>
                        </>}
                        <td className="px-4 py-3 text-white">{emp.prefix}{emp.firstName} {emp.lastName}</td>
                        <td className="px-4 py-3 text-center text-slate-300">{emp.attendances.length}</td>
                        <td className="px-4 py-3 text-center">
                          <span className={`font-bold ${parseFloat(emp.rate)>=80?'text-emerald-400':parseFloat(emp.rate)>=50?'text-yellow-400':'text-red-400'}`}>
                            {emp.rate}%
                          </span>
                        </td>
                      </tr>
                    ))
                  )}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // ============ SETTINGS VIEW ============

                  <div>
                    <label className="block text-slate-400 font-semibold mb-1 text-sm">Latitude</label>
                    <input type="number" step="0.000001" value={cur.lat}
                      onChange={e=>updateCoords(e.target.value,cur.lng)}
                      className="w-full bg-slate-800 border border-slate-700 text-white px-3 py-2 rounded-lg focus:border-emerald-500 focus:outline-none font-mono text-sm" />
                  </div>
                  <div>
                    <label className="block text-slate-400 font-semibold mb-1 text-sm">Longitude</label>
                    <input type="number" step="0.000001" value={cur.lng}
                      onChange={e=>updateCoords(cur.lat,e.target.value)}
                      className="w-full bg-slate-800 border border-slate-700 text-white px-3 py-2 rounded-lg focus:border-emerald-500 focus:outline-none font-mono text-sm" />
                  </div>
                </div>
                <button onClick={getGPS}
                  className="w-full bg-slate-700 text-white font-bold py-2 rounded-lg hover:bg-slate-600 text-sm">
                  <MapPin size={14} className="inline mr-1" />ใช้ตำแหน่ง GPS ปัจจุบัน
                </button>
              </div>

              <div className="bg-gradient-to-r from-amber-500/10 to-orange-500/10 border border-amber-500/30 rounded-lg p-5">
                <h3 className="text-white font-bold mb-3 flex items-center">
                  <QrCode size={18} className="text-amber-400 mr-2" />สร้าง QR Code สำหรับแต่ละหน่วยงาน
                </h3>
                <p className="text-slate-400 text-sm mb-3">URL สำหรับสร้าง QR Code:</p>
                <div className="bg-slate-900/50 rounded-lg p-3 mb-3">
                  <p className="text-emerald-400 font-mono text-xs break-all">
                    {window.location.origin}{window.location.pathname}?location={selLoc}
                  </p>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <button onClick={applyLoc}
                    className="bg-amber-500 text-slate-900 font-bold py-2.5 rounded-lg hover:bg-amber-400 text-sm">ใช้งานสถานที่นี้</button>
                  <button onClick={copyUrl}
                    className="bg-slate-700 text-white font-bold py-2.5 rounded-lg hover:bg-slate-600 text-sm">คัดลอก URL</button>
                </div>
              </div>

              <button onClick={doSave}
                className="w-full bg-gradient-to-r from-emerald-500 to-teal-500 text-slate-900 font-black py-4 rounded-lg hover:shadow-lg hover:shadow-emerald-500/50 text-lg">
                {saved?<><CheckCircle size={18} className="inline mr-2"/>บันทึกสำเร็จ!</>:'บันทึกการตั้งค่า'}
              </button>

              <div className="bg-blue-500/10 border border-blue-500/30 rounded-lg p-4">
                <p className="text-blue-400 text-sm flex items-start">
                  <AlertCircle size={14} className="mr-2 mt-0.5 flex-shrink-0" />
                  <span>
                    <strong>วิธีใช้งาน QR Code:</strong><br/>
                    1. เลือกหน่วยงาน → คัดลอก URL<br/>
                    2. นำ URL ไปสร้าง QR Code ที่ qr-code-generator.com หรือ qrcode.me<br/>
                    3. แต่ละหน่วยงานจะมี QR Code ของตัวเอง<br/>
                    4. พนักงานสแกน QR Code แล้วลงทะเบียน
                  </span>
                </p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ============ RENDER ============
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
