<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safety Talk - PEA Lamphun</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root">
    <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);">
      <div style="text-align: center; color: #10b981;">
        <div style="font-size: 24px; font-weight: bold; margin-bottom: 16px;">กำลังโหลดระบบ...</div>
        <div style="font-size: 14px; color: #64748b;">Safety Talk Registration System</div>
      </div>
    </div>
  </div>
  
  <!-- React + ReactDOM (Development for debugging) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script>
    console.log('%c🚀 Starting Safety Talk System...', 'color: #10b981; font-weight: bold; font-size: 16px;');
    console.log('React:', typeof React);
    console.log('ReactDOM:', typeof ReactDOM);
    console.log('Babel:', typeof Babel);
    
    // Check React hooks
    console.log('React.useState:', typeof React.useState);
    console.log('React.useEffect:', typeof React.useEffect);
    console.log('React.useRef:', typeof React.useRef);
    
    // Create icon helper
    const createIcon = (paths) => (props = {}) => {
      const { size = 24, className = '', ...rest } = props;
      return React.createElement('svg', {
        xmlns: 'http://www.w3.org/2000/svg',
        width: size,
        height: size,
        viewBox: '0 0 24 24',
        fill: 'none',
        stroke: 'currentColor',
        strokeWidth: '2',
        strokeLinecap: 'round',
        strokeLinejoin: 'round',
        className,
        ...rest
      }, ...paths.map(p => React.createElement(p.type, p.props)));
    };
    
    // Define Lucide icons
    const LucideIcons = {
      Camera: createIcon([
        { type: 'path', props: { d: 'M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z' }},
        { type: 'circle', props: { cx: '12', cy: '13', r: '3' }}
      ]),
      MapPin: createIcon([
        { type: 'path', props: { d: 'M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z' }},
        { type: 'circle', props: { cx: '12', cy: '10', r: '3' }}
      ]),
      Clock: createIcon([
        { type: 'circle', props: { cx: '12', cy: '12', r: '10' }},
        { type: 'polyline', props: { points: '12 6 12 12 16 14' }}
      ]),
      Users: createIcon([
        { type: 'path', props: { d: 'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2' }},
        { type: 'circle', props: { cx: '9', cy: '7', r: '4' }},
        { type: 'path', props: { d: 'M23 21v-2a4 4 0 0 0-3-3.87' }},
        { type: 'path', props: { d: 'M16 3.13a4 4 0 0 1 0 7.75' }}
      ]),
      CheckCircle: createIcon([
        { type: 'path', props: { d: 'M22 11.08V12a10 10 0 1 1-5.93-9.14' }},
        { type: 'polyline', props: { points: '22 4 12 14.01 9 11.01' }}
      ]),
      XCircle: createIcon([
        { type: 'circle', props: { cx: '12', cy: '12', r: '10' }},
        { type: 'line', props: { x1: '15', y1: '9', x2: '9', y2: '15' }},
        { type: 'line', props: { x1: '9', y1: '9', x2: '15', y2: '15' }}
      ]),
      Calendar: createIcon([
        { type: 'rect', props: { x: '3', y: '4', width: '18', height: '18', rx: '2', ry: '2' }},
        { type: 'line', props: { x1: '16', y1: '2', x2: '16', y2: '6' }},
        { type: 'line', props: { x1: '8', y1: '2', x2: '8', y2: '6' }},
        { type: 'line', props: { x1: '3', y1: '10', x2: '21', y2: '10' }}
      ]),
      TrendingUp: createIcon([
        { type: 'polyline', props: { points: '23 6 13.5 15.5 8.5 10.5 1 18' }},
        { type: 'polyline', props: { points: '17 6 23 6 23 12' }}
      ]),
      AlertCircle: createIcon([
        { type: 'circle', props: { cx: '12', cy: '12', r: '10' }},
        { type: 'line', props: { x1: '12', y1: '8', x2: '12', y2: '12' }},
        { type: 'line', props: { x1: '12', y1: '16', x2: '12.01', y2: '16' }}
      ]),
      Settings: createIcon([
        { type: 'circle', props: { cx: '12', cy: '12', r: '3' }},
        { type: 'path', props: { d: 'M12 1v6m0 6v6m-9-9h6m6 0h6' }}
      ]),
      QrCode: createIcon([
        { type: 'rect', props: { x: '2', y: '2', width: '9', height: '9', rx: '1' }},
        { type: 'rect', props: { x: '13', y: '2', width: '9', height: '9', rx: '1' }},
        { type: 'rect', props: { x: '2', y: '13', width: '9', height: '9', rx: '1' }}
      ]),
      Download: createIcon([
        { type: 'path', props: { d: 'M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4' }},
        { type: 'polyline', props: { points: '7 10 12 15 17 10' }},
        { type: 'line', props: { x1: '12', y1: '15', x2: '12', y2: '3' }}
      ]),
      Upload: createIcon([
        { type: 'path', props: { d: 'M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4' }},
        { type: 'polyline', props: { points: '17 8 12 3 7 8' }},
        { type: 'line', props: { x1: '12', y1: '3', x2: '12', y2: '15' }}
      ]),
      UserPlus: createIcon([
        { type: 'path', props: { d: 'M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2' }},
        { type: 'circle', props: { cx: '8.5', cy: '7', r: '4' }},
        { type: 'line', props: { x1: '20', y1: '8', x2: '20', y2: '14' }},
        { type: 'line', props: { x1: '23', y1: '11', x2: '17', y2: '11' }}
      ]),
      Edit2: createIcon([
        { type: 'path', props: { d: 'M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z' }}
      ]),
      Trash2: createIcon([
        { type: 'polyline', props: { points: '3 6 5 6 21 6' }},
        { type: 'path', props: { d: 'M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2' }}
      ]),
      Search: createIcon([
        { type: 'circle', props: { cx: '11', cy: '11', r: '8' }},
        { type: 'path', props: { d: 'm21 21-4.35-4.35' }}
      ]),
      FileText: createIcon([
        { type: 'path', props: { d: 'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z' }},
        { type: 'polyline', props: { points: '14 2 14 8 20 8' }}
      ]),
      BarChart3: createIcon([
        { type: 'path', props: { d: 'M3 3v18h18' }},
        { type: 'path', props: { d: 'M18 17V9M13 17V5M8 17v-3' }}
      ]),
      Filter: createIcon([
        { type: 'polygon', props: { points: '22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3' }}
      ])
    };
    
    console.log('✅ Icons created');
    
    // Expose globally
    window.React = React;
    window.ReactDOM = ReactDOM;
    
    // Expose individual items from React
    window.useState = React.useState;
    window.useEffect = React.useEffect;
    window.useRef = React.useRef;
    
    // Expose LucideReact
    window.LucideReact = LucideIcons;
    window.Camera = LucideIcons.Camera;
    window.MapPin = LucideIcons.MapPin;
    window.Clock = LucideIcons.Clock;
    window.Users = LucideIcons.Users;
    window.CheckCircle = LucideIcons.CheckCircle;
    window.XCircle = LucideIcons.XCircle;
    window.Calendar = LucideIcons.Calendar;
    window.TrendingUp = LucideIcons.TrendingUp;
    window.AlertCircle = LucideIcons.AlertCircle;
    window.Settings = LucideIcons.Settings;
    window.QrCode = LucideIcons.QrCode;
    window.Download = LucideIcons.Download;
    window.Upload = LucideIcons.Upload;
    window.UserPlus = LucideIcons.UserPlus;
    window.Edit2 = LucideIcons.Edit2;
    window.Trash2 = LucideIcons.Trash2;
    window.Search = LucideIcons.Search;
    window.FileText = LucideIcons.FileText;
    window.BarChart3 = LucideIcons.BarChart3;
    window.Filter = LucideIcons.Filter;
  </script>
  
  <script>
    console.log('%c📂 Loading JSX file...', 'color: #3b82f6; font-weight: bold;');
    
    fetch('./safety-talk-complete.jsx')
      .then(response => {
        if (!response.ok) throw new Error('Failed to load JSX file');
        console.log('✅ JSX file loaded');
        return response.text();
      })
      .then(code => {
        console.log('%c🔄 Transforming code...', 'color: #8b5cf6; font-weight: bold;');
        
        // Replace imports - make sure hooks are available globally
        code = code.replace(
          /import\s+React,?\s*{([^}]+)}\s+from\s+['"]react['"];?/g, 
          'const React = window.React; const {$1} = React;'
        );
        code = code.replace(
          /import\s+React.*from\s+['"]react['"];?/g, 
          'const React = window.React; const { useState, useRef, useEffect } = React;'
        );
        code = code.replace(
          /import\s+{([^}]+)}\s+from\s+['"]react['"];?/g, 
          'const {$1} = window.React;'
        );
        code = code.replace(
          /import\s+{([^}]+)}\s+from\s+['"]lucide-react['"];?/g, 
          'const {$1} = window.LucideReact;'
        );
        code = code.replace(/export\s+default\s+/g, 'window.SafetyTalkApp = ');
        
        console.log('%c⚙️ Transforming JSX with Babel...', 'color: #f59e0b; font-weight: bold;');
        
        try {
          const transformed = Babel.transform(code, {
            presets: ['react'],
            filename: 'safety-talk-complete.jsx'
          }).code;
          
          console.log('%c✅ JSX transformed successfully', 'color: #10b981; font-weight: bold;');
          console.log('%c▶️ Executing code...', 'color: #06b6d4; font-weight: bold;');
          
          eval(transformed);
          
          console.log('%c✅ Code executed', 'color: #10b981; font-weight: bold;');
          
          if (typeof window.SafetyTalkApp === 'undefined') {
            throw new Error('SafetyTalkApp not defined after execution');
          }
          
          console.log('%c🎨 Rendering app...', 'color: #ec4899; font-weight: bold;');
          
          const root = ReactDOM.createRoot(document.getElementById('root'));
          root.render(React.createElement(window.SafetyTalkApp));
          
          console.log('%c✅ App rendered successfully!', 'color: #10b981; font-weight: bold; font-size: 18px;');
          console.log('%c🎉 Safety Talk System Ready!', 'color: #10b981; font-weight: bold; font-size: 20px; background: #0f172a; padding: 8px;');
          
        } catch (error) {
          console.error('%c❌ Transformation/Execution Error:', 'color: #ef4444; font-weight: bold;', error);
          throw error;
        }
      })
      .catch(error => {
        console.error('%c❌ Fatal Error:', 'color: #ef4444; font-weight: bold; font-size: 16px;', error);
        document.getElementById('root').innerHTML = `
          <div style="padding: 40px; max-width: 900px; margin: 40px auto; font-family: -apple-system, sans-serif;">
            <div style="background: #fee2e2; border: 3px solid #ef4444; border-radius: 16px; padding: 32px;">
              <h1 style="color: #dc2626; margin: 0 0 20px 0; font-size: 28px; font-weight: 800;">
                ⚠️ ไม่สามารถโหลดระบบได้
              </h1>
              <p style="color: #991b1b; margin: 0 0 20px 0; font-size: 16px; line-height: 1.8;">
                เกิดข้อผิดพลาดในการโหลด หรือ transform ไฟล์ JSX
              </p>
              <details style="margin: 24px 0;">
                <summary style="cursor: pointer; color: #dc2626; font-weight: 700; font-size: 16px; padding: 12px; background: #fef2f2; border-radius: 8px;">
                  📋 รายละเอียด Error
                </summary>
                <pre style="background: #fef2f2; padding: 16px; border-radius: 8px; overflow-x: auto; font-size: 13px; margin-top: 12px; border: 1px solid #fecaca; white-space: pre-wrap; word-wrap: break-word; line-height: 1.6;">${error.message}

${error.stack || ''}</pre>
              </details>
              <hr style="margin: 32px 0; border: none; border-top: 2px solid #fecaca;" />
              <div style="background: #fef2f2; padding: 20px; border-radius: 8px; border-left: 4px solid #ef4444;">
                <h3 style="color: #dc2626; margin: 0 0 12px 0; font-size: 18px;">🔧 วิธีแก้:</h3>
                <ol style="color: #7f1d1d; margin: 0; padding-left: 20px; line-height: 2;">
                  <li>ตรวจสอบว่าไฟล์ <strong>safety-talk-complete.jsx</strong> อยู่ในโฟลเดอร์เดียวกับ index.html</li>
                  <li>เปิด Console (F12) ดู error message ทั้งหมด</li>
                  <li>Hard refresh: <strong>Ctrl + Shift + R</strong></li>
                  <li>Clear cache และลองใหม่</li>
                  <li>ถ้ายังไม่ได้ → ติดต่อ Admin</li>
                </ol>
              </div>
            </div>
          </div>
        `;
      });
  </script>
</body>
</html>
