<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safety Talk - ระบบลงทะเบียน</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script>
    const { useState, useEffect, useRef } = React;
    const { createElement: h } = React;
    
    // Firebase Mock
    class FirebaseMock {
      constructor() {
        this.data = { attendances: [] };
        this.loadFromStorage();
      }
      
      loadFromStorage() {
        try {
          const stored = localStorage.getItem('safety-talk-data');
          if (stored) this.data = JSON.parse(stored);
        } catch (e) {}
      }
      
      saveToStorage() {
        localStorage.setItem('safety-talk-data', JSON.stringify(this.data));
      }
      
      collection(name) {
        return {
          add: async (data) => {
            const id = Date.now().toString() + Math.random().toString(36);
            const item = { ...data, id, createdAt: new Date().toISOString() };
            this.data[name] = this.data[name] || [];
            this.data[name].push(item);
            this.saveToStorage();
            return { id };
          },
          get: async () => {
            return {
              docs: (this.data[name] || []).map(item => ({
                id: item.id,
                data: () => item
              }))
            };
          }
        };
      }
    }
    
    const db = new FirebaseMock();
    
    // Main App
    function SafetyTalkApp() {
      const [view, setView] = useState('register');
      const [showSuccess, setShowSuccess] = useState(false);
      
      const handleSuccess = () => {
        setShowSuccess(true);
        setTimeout(() => setShowSuccess(false), 3000);
      };
      
      return h('div', { className: 'min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900' },
        h('div', { className: 'container mx-auto px-4 py-8' },
          // Header
          h('div', { className: 'text-center mb-8' },
            h('h1', { className: 'text-4xl font-black text-emerald-400 mb-2' }, 'Safety Talk'),
            h('p', { className: 'text-slate-400' }, 'ระบบลงทะเบียนเข้าร่วมกิจกรรม')
          ),
          
          // Navigation
          h('div', { className: 'flex justify-center space-x-4 mb-8' },
            h('button',
              {
                onClick: () => setView('register'),
                className: `px-6 py-3 rounded-lg font-bold ${view === 'register' ? 'bg-emerald-500 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`
              },
              '📝 ลงทะเบียน'
            ),
            h('button',
              {
                onClick: () => setView('reports'),
                className: `px-6 py-3 rounded-lg font-bold ${view === 'reports' ? 'bg-emerald-500 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`
              },
              '📊 รายงาน'
            )
          ),
          
          // Success Message
          showSuccess && h('div',
            { className: 'fixed top-4 right-4 bg-emerald-500 text-white px-6 py-4 rounded-lg shadow-lg flex items-center space-x-3 animate-bounce' },
            h('span', null, '✅'),
            h('span', { className: 'font-bold' }, 'ลงทะเบียนสำเร็จ!')
          ),
          
          // Content
          h('div', { className: 'max-w-4xl mx-auto' },
            view === 'register' 
              ? h(RegistrationForm, { onSuccess: handleSuccess })
              : h(ReportsView, null)
          )
        )
      );
    }
    
    // Registration Form Component
    function RegistrationForm({ onSuccess }) {
      const [formData, setFormData] = useState({
        employeeCode: '',
        fullName: '',
        position: '',
        department: ''
      });
      const [photo, setPhoto] = useState(null);
      const [gps, setGps] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [cameraActive, setCameraActive] = useState(false);
      const videoRef = useRef(null);
      
      useEffect(() => {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (position) => {
              setGps({
                latitude: position.coords.latitude,
                longitude: position.coords.longitude
              });
            },
            (error) => console.log('GPS Error:', error)
          );
        }
      }, []);
      
      const startCamera = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
          if (videoRef.current) {
            videoRef.current.srcObject = stream;
            setCameraActive(true);
          }
        } catch (err) {
          setError('ไม่สามารถเปิดกล้องได้');
        }
      };
      
      const takePhoto = () => {
        const canvas = document.createElement('canvas');
        canvas.width = videoRef.current.videoWidth;
        canvas.height = videoRef.current.videoHeight;
        canvas.getContext('2d').drawImage(videoRef.current, 0, 0);
        setPhoto(canvas.toDataURL('image/jpeg', 0.7));
        videoRef.current.srcObject.getTracks().forEach(track => track.stop());
        setCameraActive(false);
      };
      
      const handleSubmit = async (e) => {
        e.preventDefault();
        
        if (!formData.fullName.trim()) {
          setError('กรุณากรอกชื่อ-นามสกุล');
          return;
        }
        
        if (!photo) {
          setError('กรุณาถ่ายรูป');
          return;
        }
        
        setLoading(true);
        setError(null);
        
        try {
          await db.collection('attendances').add({
            employeeCode: formData.employeeCode.trim(),
            fullName: formData.fullName.trim(),
            position: formData.position.trim() || '-',
            department: formData.department.trim() || '-',
            photo: photo,
            gps: gps,
            timestamp: new Date().toISOString(),
            date: new Date().toISOString().split('T')[0]
          });
          
          onSuccess();
          setFormData({ employeeCode: '', fullName: '', position: '', department: '' });
          setPhoto(null);
        } catch (err) {
          setError('เกิดข้อผิดพลาด กรุณาลองใหม่');
        } finally {
          setLoading(false);
        }
      };
      
      return h('form', { onSubmit: handleSubmit, className: 'space-y-6' },
        // Form Fields
        h('div', { className: 'bg-slate-800 rounded-xl p-6 space-y-4' },
          h('h3', { className: 'text-lg font-bold text-emerald-400 mb-4' }, '📝 กรอกข้อมูลของคุณ'),
          
          // Employee Code
          h('div', null,
            h('label', { className: 'block text-sm font-medium text-slate-300 mb-2' },
              'รหัสพนักงาน ',
              h('span', { className: 'text-slate-500' }, '(ถ้ามี)')
            ),
            h('input', {
              type: 'text',
              value: formData.employeeCode,
              onChange: (e) => setFormData({...formData, employeeCode: e.target.value}),
              className: 'w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white focus:border-emerald-500 focus:outline-none',
              placeholder: '12345'
            })
          ),
          
          // Full Name
          h('div', null,
            h('label', { className: 'block text-sm font-medium text-slate-300 mb-2' },
              'ชื่อ - นามสกุล ',
              h('span', { className: 'text-red-400' }, '*')
            ),
            h('input', {
              type: 'text',
              value: formData.fullName,
              onChange: (e) => setFormData({...formData, fullName: e.target.value}),
              className: 'w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white focus:border-emerald-500 focus:outline-none',
              placeholder: 'นายสมชาย ใจดี',
              required: true
            })
          ),
          
          // Position
          h('div', null,
            h('label', { className: 'block text-sm font-medium text-slate-300 mb-2' }, 'ตำแหน่ง'),
            h('input', {
              type: 'text',
              value: formData.position,
              onChange: (e) => setFormData({...formData, position: e.target.value}),
              className: 'w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white focus:border-emerald-500 focus:outline-none',
              placeholder: 'ช่างไฟฟ้า'
            })
          ),
          
          // Department
          h('div', null,
            h('label', { className: 'block text-sm font-medium text-slate-300 mb-2' }, 'สังกัด / แผนก'),
            h('input', {
              type: 'text',
              value: formData.department,
              onChange: (e) => setFormData({...formData, department: e.target.value}),
              className: 'w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white focus:border-emerald-500 focus:outline-none',
              placeholder: 'ผกส. / กฟจ.ลำพูน'
            })
          )
        ),
        
        // Photo Section
        h('div', { className: 'bg-slate-800 rounded-xl p-6' },
          h('h3', { className: 'text-lg font-bold text-emerald-400 mb-4' },
            '📸 ถ่ายรูปยืนยันตัวตน ',
            h('span', { className: 'text-red-400' }, '*')
          ),
          
          !photo
            ? h('div', { className: 'space-y-4' },
                !cameraActive
                  ? h('button', {
                      type: 'button',
                      onClick: startCamera,
                      className: 'w-full py-4 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-lg'
                    }, '📷 เปิดกล้อง')
                  : h('div', { className: 'space-y-4' },
                      h('video', { ref: videoRef, autoPlay: true, playsInline: true, className: 'w-full rounded-lg' }),
                      h('button', {
                        type: 'button',
                        onClick: takePhoto,
                        className: 'w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-lg'
                      }, '📸 ถ่ายรูป')
                    )
              )
            : h('div', { className: 'space-y-4' },
                h('img', { src: photo, alt: 'Photo', className: 'w-full rounded-lg' }),
                h('button', {
                  type: 'button',
                  onClick: () => setPhoto(null),
                  className: 'w-full py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-lg'
                }, 'ถ่ายใหม่')
              )
        ),
        
        // GPS Info
        gps && h('div', { className: 'bg-slate-800 rounded-xl p-4 flex items-center space-x-3' },
          h('span', null, '📍'),
          h('div', { className: 'text-sm text-slate-300' },
            `ตำแหน่ง: ${gps.latitude.toFixed(6)}, ${gps.longitude.toFixed(6)}`
          )
        ),
        
        // Error Message
        error && h('div', { className: 'bg-red-500/20 border border-red-500 rounded-lg p-4 text-red-400' }, error),
        
        // Submit Button
        h('button', {
          type: 'submit',
          disabled: loading,
          className: 'w-full py-4 bg-emerald-500 hover:bg-emerald-600 disabled:bg-slate-700 text-white font-bold rounded-lg text-lg'
        }, loading ? 'กำลังบันทึก...' : '✅ ลงทะเบียน')
      );
    }
    
    // Reports View Component
    function ReportsView() {
      const [attendances, setAttendances] = useState([]);
      const [filter, setFilter] = useState({
        startDate: new Date().toISOString().split('T')[0],
        endDate: new Date().toISOString().split('T')[0]
      });
      
      useEffect(() => {
        loadData();
      }, [filter]);
      
      const loadData = async () => {
        const result = await db.collection('attendances').get();
        const data = result.docs.map(doc => doc.data());
        const filtered = data.filter(item => {
          const itemDate = item.date;
          return itemDate >= filter.startDate && itemDate <= filter.endDate;
        });
        filtered.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
        setAttendances(filtered);
      };
      
      const exportToExcel = () => {
        const csv = [
          ['วันที่', 'เวลา', 'รหัสพนักงาน', 'ชื่อ-นามสกุล', 'ตำแหน่ง', 'สังกัด/แผนก', 'GPS'],
          ...attendances.map(item => [
            new Date(item.timestamp).toLocaleDateString('th-TH'),
            new Date(item.timestamp).toLocaleTimeString('th-TH'),
            item.employeeCode || '-',
            item.fullName,
            item.position,
            item.department,
            item.gps ? `${item.gps.latitude},${item.gps.longitude}` : '-'
          ])
        ].map(row => row.join(',')).join('\n');
        
        const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `safety-talk-${filter.startDate}-to-${filter.endDate}.csv`;
        link.click();
      };
      
      const groupedByDate = attendances.reduce((acc, item) => {
        const date = item.date;
        if (!acc[date]) acc[date] = [];
        acc[date].push(item);
        return acc;
      }, {});
      
      return h('div', { className: 'space-y-6' },
        // Filters
        h('div', { className: 'bg-slate-800 rounded-xl p-6' },
          h('h3', { className: 'text-lg font-bold text-emerald-400 mb-4' }, '📅 เลือกช่วงเวลา'),
          h('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-4' },
            h('div', null,
              h('label', { className: 'block text-sm text-slate-300 mb-2' }, 'จากวันที่'),
              h('input', {
                type: 'date',
                value: filter.startDate,
                onChange: (e) => setFilter({...filter, startDate: e.target.value}),
                className: 'w-full px-4 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white'
              })
            ),
            h('div', null,
              h('label', { className: 'block text-sm text-slate-300 mb-2' }, 'ถึงวันที่'),
              h('input', {
                type: 'date',
                value: filter.endDate,
                onChange: (e) => setFilter({...filter, endDate: e.target.value}),
                className: 'w-full px-4 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white'
              })
            )
          )
        ),
        
        // Summary Stats
        h('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-4' },
          h('div', { className: 'bg-gradient-to-br from-emerald-500 to-teal-600 rounded-xl p-6 text-white' },
            h('div', { className: 'text-3xl font-black mb-1' }, attendances.length),
            h('div', { className: 'text-sm opacity-90' }, 'ลงทะเบียนทั้งหมด')
          ),
          h('div', { className: 'bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl p-6 text-white' },
            h('div', { className: 'text-3xl font-black mb-1' }, Object.keys(groupedByDate).length),
            h('div', { className: 'text-sm opacity-90' }, 'จำนวนวัน')
          ),
          h('div', { className: 'bg-gradient-to-br from-purple-500 to-pink-600 rounded-xl p-6 text-white' },
            h('div', { className: 'text-3xl font-black mb-1' },
              attendances.length > 0 ? Math.round(attendances.length / Math.max(Object.keys(groupedByDate).length, 1)) : 0
            ),
            h('div', { className: 'text-sm opacity-90' }, 'เฉลี่ยต่อวัน')
          )
        ),
        
        // Export Button
        h('button', {
          onClick: exportToExcel,
          className: 'w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-lg flex items-center justify-center space-x-2'
        },
          h('span', null, '📥'),
          h('span', null, `Export Excel (${attendances.length} รายการ)`)
        ),
        
        // Data by Date
        h('div', { className: 'space-y-4' },
          Object.keys(groupedByDate).sort().reverse().map(date =>
            h('div', { key: date, className: 'bg-slate-800 rounded-xl p-6' },
              h('h3', { className: 'text-lg font-bold text-emerald-400 mb-4' },
                `📅 ${new Date(date + 'T00:00:00').toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' })} (${groupedByDate[date].length} คน)`
              ),
              h('div', { className: 'space-y-3' },
                groupedByDate[date].map((item, idx) =>
                  h('div', { key: idx, className: 'bg-slate-900 rounded-lg p-4 flex items-start space-x-4' },
                    item.photo && h('img', { src: item.photo, alt: 'Photo', className: 'w-16 h-16 rounded-lg object-cover' }),
                    h('div', { className: 'flex-1' },
                      h('div', { className: 'font-bold text-white' }, item.fullName),
                      h('div', { className: 'text-sm text-slate-400 space-y-1 mt-1' },
                        item.employeeCode && h('div', null, `รหัส: ${item.employeeCode}`),
                        h('div', null, `ตำแหน่ง: ${item.position}`),
                        h('div', null, `สังกัด: ${item.department}`),
                        h('div', { className: 'text-xs text-slate-500' },
                          `เวลา: ${new Date(item.timestamp).toLocaleTimeString('th-TH')}`
                        )
                      )
                    )
                  )
                )
              )
            )
          )
        ),
        
        attendances.length === 0 && h('div', { className: 'text-center py-12 text-slate-500' },
          'ไม่มีข้อมูลในช่วงเวลาที่เลือก'
        )
      );
    }
    
    // Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(h(SafetyTalkApp));
    
    console.log('%c✅ Safety Talk System Ready!', 'color:#10b981;font-weight:bold;font-size:18px');
  </script>
</body>
</html>
