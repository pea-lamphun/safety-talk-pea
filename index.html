<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safety Talk - PEA Lamphun</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root">
    <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);">
      <div style="text-align: center; color: #10b981;">
        <div style="font-size: 24px; font-weight: bold; margin-bottom: 16px;">กำลังโหลดระบบ...</div>
        <div style="font-size: 14px; color: #64748b;">Safety Talk Registration System - Complete Version</div>
      </div>
    </div>
  </div>
  
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1"
      }
    }
  </script>
  
  <script type="module">
    import React from 'react';
    import ReactDOM from 'react-dom/client';
    import * as LucideReact from 'lucide-react';
    
    window.React = React;
    window.ReactDOM = ReactDOM;
    window.LucideReact = LucideReact;
    
    const loadApp = async () => {
      try {
        const response = await fetch('./safety-talk-complete.jsx');
        let code = await response.text();
        
        code = code.replace(/import\s+React.*from\s+['"]react['"];?/g, 'const React = window.React;');
        code = code.replace(/import\s+{([^}]+)}\s+from\s+['"]react['"];?/g, 'const {$1} = window.React;');
        code = code.replace(/import\s+{([^}]+)}\s+from\s+['"]lucide-react['"];?/g, 'const {$1} = window.LucideReact;');
        code = code.replace(/export\s+default\s+/g, 'window.App = ');
        
        const blob = new Blob([code], { type: 'text/javascript' });
        const url = URL.createObjectURL(blob);
        
        await import(url);
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(window.App));
        
        URL.revokeObjectURL(url);
      } catch (error) {
        console.error('Error loading app:', error);
        document.getElementById('root').innerHTML = `
          <div style="padding: 40px; max-width: 600px; margin: 40px auto;">
            <div style="background: #fee2e2; border: 2px solid #ef4444; border-radius: 12px; padding: 24px;">
              <h2 style="color: #dc2626; margin: 0 0 16px 0;">⚠️ Error Loading System</h2>
              <p style="color: #991b1b;">${error.message}</p>
            </div>
          </div>
        `;
      }
    };
    
    loadApp();
  </script>
</body>
</html>
