<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safety Talk - ระบบลงทะเบียน</title>
  
  <!-- React & ReactDOM (UMD) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // Expose React
    window.React = React;
    window.ReactDOM = ReactDOM;
    
    // Expose React hooks
    window.useState = React.useState;
    window.useEffect = React.useEffect;
    window.useRef = React.useRef;
    
    // Expose Lucide icons
    window.Camera = lucide.Camera;
    window.MapPin = lucide.MapPin;
    window.Clock = lucide.Clock;
    window.CheckCircle = lucide.CheckCircle;
    window.XCircle = lucide.XCircle;
    window.Download = lucide.Download;
    window.BarChart3 = lucide.BarChart3;
    window.Calendar = lucide.Calendar;
    
    console.log('%c🚀 Starting Safety Talk System (Simple Mode)...', 'color:#10b981;font-weight:bold;font-size:16px');
    console.log('%c✅ React & Lucide icons loaded', 'color:#10b981');
  </script>

  <!-- Load the Safety Talk app -->
  <script type="text/babel" src="./safety-talk-simple.jsx"></script>
  
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SafetyTalkApp />);
    console.log('%c✅ Safety Talk App rendered successfully!', 'color:#10b981;font-weight:bold;font-size:16px');
    console.log('%c🎉 System Ready!', 'color:#10b981;font-weight:bold;font-size:18px');
  </script>
</body>
</html>
