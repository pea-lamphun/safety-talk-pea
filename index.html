    const calcDist = (la1,lo1,la2,lo2) => {
      const R=6371e3,p1=la1*Math.PI/180,p2=la2*Math.PI/180,
            dp=(la2-la1)*Math.PI/180,dl=(lo2-lo1)*Math.PI/180,
            a=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
      return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    };
    const withinTime = (s,e) => {

      const img=new Image();
      img.onload=()=>{ const c=document.createElement("canvas"); let w=img.width,h=img.height; if(w>maxW){h=Math.round(h*maxW/w);w=maxW;} c.width=w;c.height=h; c.getContext("2d").drawImage(img,0,0,w,h); res(c.toDataURL("image/jpeg",q)); };
      img.onerror=()=>rej(new Error("img")); img.src=b64;
    });

      const data=b64.includes(",")?b64.split(",")[1]:b64;

      const r=await fetch("https://api.imgbb.com/1/upload",{method:"POST",body:f});
      const j=await r.json();
      if(!j.success) throw new Error("ImgBB: "+JSON.stringify(j));
      return { url:j.data.url, thumb:j.data.thumb?.url||j.data.url, del:j.data.delete_url };
    };

    const getWeekRange = () => {
      const now=new Date(), day=now.getDay(), diff=day===0?-6:1-day;

    // ============ IN-APP BROWSER DETECTION ============
    // ============ IN-APP BROWSER AUTO-REDIRECT ============
    (function autoRedirect() {
      const ua = navigator.userAgent || "";
      const url = window.location.href;
      const isLine = /Line\//i.test(ua);
      const isAndroid = /Android/i.test(ua);
      const isIOS = /iPad|iPhone|iPod/.test(ua);
      const alreadyRedirected = url.includes("openExternalBrowser=1");

      if (!isLine || alreadyRedirected) return;

      // LINE รองรับ parameter นี้ทั้ง iOS และ Android
      // เมื่อเจอ openExternalBrowser=1 จะเปิด Safari/Chrome อัตโนมัติ
      const sep = url.includes("?") ? "&" : "?";
      window.location.replace(url + sep + "openExternalBrowser=1");
    })();

    function detectBrowser() {
      const ua = navigator.userAgent || "";
      // ถ้ามี openExternalBrowser=1 แสดงว่า redirect แล้ว = normal browser
      if (window.location.href.includes("openExternalBrowser=1")) return "normal";
      if (/Line\//i.test(ua))                                    return "line";
      if (/FBAN|FBAV/i.test(ua))                                 return "facebook";
      if (/Instagram/i.test(ua))                                 return "instagram";
      if (/wv\)|; wv\)/i.test(ua) && /Android/i.test(ua))       return "webview";
      return "normal";
    }
    function getChromeIntentUrl() {

    // ============ MAIN APP ============
    function App() {
      const [view,setView]         = useState("register");

      const [atts,setAtts]         = useState([]);
      const [loading,setLoading]   = useState(false);
      const [locsLoading,setLocsLoading] = useState(true); // โหลด locs จาก Firestore
      const [curLoc,setCurLoc]     = useState("lampun");
      const [locs,setLocs]         = useState(LOCATIONS); // เริ่มจาก default ก่อน

      // โหลด locs จาก Firestore ทันทีที่เปิดแอพ (ทั้ง user และ admin)
      useEffect(()=>{
        const p=new URLSearchParams(window.location.search);
        const l=p.get("location");
        if(p.get("admin")==="1") setView("admin");

        // ดึงพิกัดจาก Firestore
        db.collection("settings").doc("locations").get()
          .then(doc=>{
            let merged = {...LOCATIONS};
            if(doc.exists){
              const saved = doc.data();
              // merge ค่าที่บันทึกไว้เข้ากับ default (เผื่อมีหน่วยงานใหม่ใน default)
              Object.keys(merged).forEach(id=>{
                if(saved[id]) merged[id] = {...merged[id], ...saved[id]};
              });
            }
            setLocs(merged);
            // ตั้ง curLoc หลังจากได้ locs แล้ว
            if(l && merged[l]) setCurLoc(l);
          })
          .catch(()=>{
            // ถ้า Firestore ล้มเหลว ใช้ LOCATIONS default
            if(l && LOCATIONS[l]) setCurLoc(l);
          })
          .finally(()=>setLocsLoading(false));
      },[]);

      const loc = locs[curLoc]||Object.values(locs)[0];

      const addAtt = a => setAtts(prev=>[a,...prev]);

      // โหลด attendances เฉพาะตอนเข้า admin
      useEffect(()=>{
        if(view==="admin"&&adminAuth&&atts.length===0){
          setLoading(true);
          db.collection("attendances").orderBy("timestamp","desc").get()

    // ============ POSITION SORT (อ้างอิงระบบ PEA Lamphun เดิม) ============

    // กลุ่มหลัก: พนักงาน=0, ลูกจ้าง=1, คนงาน=2, พขร.(บ)=3
    function getGroup(pos) {
      if (!pos) return 0;
      const p = pos.trim();
      if (p.includes("พขร."))                          return 3;
      if (p.startsWith("คนงาน"))                       return 2;
      if (p.startsWith("ผู้ปฏิบัติงาน"))               return 2; // คนงาน กฟส.
      if (p.includes("ชชง") || p.includes("ชบช.") ||
          p.includes("ชบค.") || p.includes("ชพด."))   return 1;
      return 0; // พนักงาน
    }

    // ลำดับย่อยภายในกลุ่มคนงาน
    const WORKER_RANK_TABLE = [
      {match:"ก่อสร้าง 1",     rank:0},
      {match:"ก่อสร้าง 2",     rank:1},
      {match:"ก่อสร้าง",       rank:2},
      {match:"ตัดกิ่งไม้",     rank:3},
      {match:"ปรับปรุงระบบฯ",  rank:4},
      {match:"ซ่อมย่อย (C5)",  rank:6},
      {match:"ซ่อมย่อย",       rank:5},
      {match:"เวรแก้ฯ",        rank:7},
      {match:"หม้อแปลง",       rank:8},
      {match:"มิเตอร์ฯ",       rank:9},
      {match:"มิเตอร์",        rank:10},
      {match:"คลังพัสดุ",      rank:11},
      // ผู้ปฏิบัติงานระบบไฟฟ้า กฟภ. (คนงาน กฟส.)
      {match:"ก่อสร้าง",       rank:2},
      {match:"เวรแก้",         rank:7},
      {match:"ซ่อมย่อย",       rank:5},
      {match:"หม้อแปลง",       rank:8},
      {match:"มิเตอร์",        rank:10},
    ];

    function extractNum(str) {
      const m = str.match(/(\d+)/);
      return m ? parseInt(m[1]) : 0;
    }

    // ลำดับตำแหน่งภายในกลุ่ม (rank ต่ำ = อยู่ก่อน, num ใช้เรียงระดับ)
    function getPosRank(pos) {
      if (!pos) return {rank:99, num:0};
      const p = pos.trim();
      // ---- บริหาร ----
      if (p.includes("ผจก."))       return {rank:0,  num: extractNum(p)};
      if (p.includes("รจก."))       return {rank:1,  num: extractNum(p)};
      if (p.includes("หผ.(ฉ)"))     return {rank:2,  num: 0};
      // ---- ตำแหน่งเฉพาะ กฟจ. ----
      if (p.includes("นกต."))       return {rank:3,  num: extractNum(p)};
      if (p.includes("นทน."))       return {rank:4,  num: extractNum(p)};
      if (p.includes("ผชน."))       return {rank:5,  num: extractNum(p)};
      if (p.includes("จป.ว."))      return {rank:6,  num: extractNum(p)};
      // ---- หัวหน้า/ช่างแผนก ----
      if (p.includes("หผ."))        return {rank:7,  num: 0};
      if (p.includes("ชผ."))        return {rank:8,  num: 0};
      if (p.includes("นพด."))       return {rank:9,  num: extractNum(p)};
      if (p.includes("วศก."))       return {rank:10, num: extractNum(p)};
      if (p.includes("นบช."))       return {rank:11, num: extractNum(p)};
      if (p.includes("นบท"))        return {rank:12, num: extractNum(p)};
      // ---- พชง./พบช. suffix พิเศษ ----
      if (p.includes("(สข)"))       return {rank:13, num: extractNum(p)};
      if (p.includes("(ฮล)"))       return {rank:14, num: extractNum(p)};
      if (p.includes("(ปฟ)") && (p.includes("พชง") || p.includes("พบช")))
                                     return {rank:15, num: extractNum(p)};
      // ---- พชง./พบช. ทั่วไป ----
      if (p.includes("พชง.") || p.includes("พบช."))
                                     return {rank:16, num: extractNum(p)};
      // ---- ลูกจ้าง ----
      if (p.includes("ชชง.(ปฟ)"))   return {rank:20, num: 0};
      if (p.includes("ชชง"))         return {rank:19, num: 0};
      if (p.includes("ชบช."))        return {rank:21, num: 0};
      if (p.includes("ชบค."))        return {rank:22, num: 0};
      if (p.includes("ชพด."))        return {rank:23, num: 0};
      // ---- คนงาน ----
      if (p.startsWith("คนงาน")) {
        let sub = 99;
        for (const c of WORKER_RANK_TABLE) { if (p.includes(c.match)) { sub = c.rank; break; } }
        return {rank:30, num: sub};
      }
      // ---- ผู้ปฏิบัติงานระบบไฟฟ้า กฟภ. (คนงาน กฟส.) ----
      if (p.startsWith("ผู้ปฏิบัติงาน")) {
        let sub = 50; // default
        for (const c of WORKER_RANK_TABLE) { if (p.includes(c.match)) { sub = c.rank; break; } }
        return {rank:30, num: sub};
      }
      // ---- พขร.(บ) ----
      if (p.includes("พขร."))        return {rank:40, num: 0};
      return {rank:98, num: extractNum(p)};
    }

    // ลำดับสังกัดหลัก กฟจ.ลำพูน
    const DEPT_ORDER = [
      "กฟจ.ลำพูน","ผกส.","ผปบ.","ผมต.","ผบร.","ผบส.","ผสน.","ผคพ.","ผบง.",
      "กฟส.ป่าซาง","กฟส.บ้านโฮ่ง","กฟส.ลี้","กฟส.บ้านธิ","กฟส.แม่ทา",
      "กฟส.นครเจดีย์","กฟส.เวียงหนองล่อง","กฟส.ทุ่งหัวช้าง","กฟส.แม่ตืน",
      "ผปร.","ผบค.",
    ];

    function deptOrder(dept) {
      const i = DEPT_ORDER.indexOf((dept||"").trim());
      return i >= 0 ? i : 500;
    }

    function sortPersonnel(list) {
      return [...list].sort((a,b)=>{
        // 1. กลุ่มหลัก: พนักงาน → ลูกจ้าง → คนงาน → พขร.(บ)
        const gA = getGroup(a.position), gB = getGroup(b.position);
        if (gA !== gB) return gA - gB;
        // 2. สังกัด/แผนก
        const dA = deptOrder(a.department), dB = deptOrder(b.department);
        if (dA !== dB) return dA - dB;
        // 3. ลำดับตำแหน่งภายในสังกัด
        const pA = getPosRank(a.position), pB = getPosRank(b.position);
        if (pA.rank !== pB.rank) return pA.rank - pB.rank;
        // 4. ระดับตัวเลข: ส่วนใหญ่สูงก่อน ยกเว้น คนงาน (ascending)
        if (pA.num !== pB.num) {
          if (pA.rank === 30) return pA.num - pB.num;
          return pB.num - pA.num;
        }
        // 5. ชื่อ
        return (a.fullName||"").localeCompare(b.fullName||"", "th");
      });
    }

    // ============ MEMBERS VIEW ============
    function MembersView({ locs }) {
      const [selLoc,setSelLoc]   = useState("lampun");
      const [members,setMembers] = useState([]);
      const [loadingM,setLoadingM] = useState(false);
      const [showForm,setShowForm] = useState(false);
      const [editing,setEditing] = useState(null);
      const [form,setForm]       = useState({empId:"",fullName:"",position:"",department:""});
      const [pinFor,setPinFor]   = useState(null);
      const [importMsg,setImportMsg] = useState("");
      const fileRef = useRef(null);

      const loadMembers = async (locId) => {
        setLoadingM(true);
        try {
          const snap=await db.collection("personnel").where("locationId","==",locId).get();
          setMembers(sortPersonnel(snap.docs.map(d=>({id:d.id,...d.data()}))));
        } catch(e){ alert("โหลดข้อมูลไม่ได้: "+e.message); }
        finally { setLoadingM(false); }
      };

      useEffect(()=>{ loadMembers(selLoc); },[selLoc]);

      const resetForm=()=>{ setForm({empId:"",fullName:"",position:"",department:""}); setEditing(null); setShowForm(false); };

      const handleSave=async()=>{
        if(!form.fullName.trim()||!form.position.trim()||!form.department.trim()){ alert("กรุณากรอกข้อมูลที่จำเป็นให้ครบ"); return; }
        try {
          const data={empId:form.empId.trim()||null,fullName:form.fullName.trim(),position:form.position.trim(),department:form.department.trim(),locationId:selLoc};
          if(editing){
            await db.collection("personnel").doc(editing.id).update(data);
            setMembers(prev=>sortPersonnel(prev.map(m=>m.id===editing.id?{...m,...data}:m)));
          } else {
            const ref=await db.collection("personnel").add(data);
            setMembers(prev=>sortPersonnel([...prev,{id:ref.id,...data}]));
          }
          resetForm();
        } catch(e){ alert("บันทึกไม่สำเร็จ: "+e.message); }
      };

      const handleDelete=async(member)=>{
        try {
          await db.collection("personnel").doc(member.id).delete();
          setMembers(prev=>prev.filter(m=>m.id!==member.id));
          setPinFor(null);
        } catch(e){ alert("ลบไม่สำเร็จ: "+e.message); }
      };

      const formRef = useRef(null);
      const handleEdit=(member)=>{
        setEditing(member);
        setForm({empId:member.empId||"",fullName:member.fullName,position:member.position,department:member.department});
        setShowForm(true); setPinFor(null);
        // scroll ไปที่ form หลัง render
        setTimeout(()=>{ formRef.current?.scrollIntoView({behavior:"smooth",block:"start"}); },80);
      };

      const handleImport=(e)=>{
        const file=e.target.files[0]; if(!file) return;
        const reader=new FileReader();
        reader.onload=async(ev)=>{
          try {
            setImportMsg("กำลังอ่านไฟล์...");
            const wb=XLSX.read(ev.target.result,{type:"array"});
            const ws=wb.Sheets[wb.SheetNames[0]];
            const rows=XLSX.utils.sheet_to_json(ws,{header:1});
            if(rows.length<2){ setImportMsg("ไม่พบข้อมูลในไฟล์"); return; }
            const headers=rows[0].map(h=>(h||"").toString().toLowerCase().trim());
            const findCol=(...keys)=>{ for(const k of keys){ const i=headers.findIndex(h=>h.includes(k)); if(i>=0) return i; } return -1; };
            const colId=findCol("รหัส","id","emp");
            const colName=findCol("ชื่อ","name","fullname");
            const colPos=findCol("ตำแหน่ง","position","pos");
            const colDept=findCol("สังกัด","แผนก","dept","department");
            if(colName<0){ setImportMsg("ไม่พบคอลัมน์ชื่อในไฟล์"); return; }
            const toImport=[];
            for(let i=1;i<rows.length;i++){
              const row=rows[i];
              const name=(row[colName]||"").toString().trim();
              if(!name) continue;
              toImport.push({ empId:colId>=0?(row[colId]||"").toString().trim()||null:null, fullName:name, position:colPos>=0?(row[colPos]||"").toString().trim():"", department:colDept>=0?(row[colDept]||"").toString().trim():"", locationId:selLoc });
            }
            if(toImport.length===0){ setImportMsg("ไม่พบข้อมูลรายชื่อในไฟล์"); return; }
            setImportMsg("กำลังนำเข้า "+toImport.length+" รายชื่อ...");
            const batch=db.batch();
            const newDocs=[];
            for(const item of toImport){ const ref=db.collection("personnel").doc(); batch.set(ref,item); newDocs.push({id:ref.id,...item}); }
            await batch.commit();
            setMembers(prev=>sortPersonnel([...prev,...newDocs]));
            setImportMsg("นำเข้าสำเร็จ "+toImport.length+" รายชื่อ ✅");
            setTimeout(()=>setImportMsg(""),4000);
          } catch(err){ setImportMsg("เกิดข้อผิดพลาด: "+err.message); }
        };
        reader.readAsArrayBuffer(file);
        e.target.value="";
      };

      const loc=locs[selLoc]||Object.values(locs)[0];

      return (
        <div className="max-w-5xl mx-auto space-y-5">
          {pinFor&&(
            <PinDialog
              title={pinFor.action==="delete"?"ลบรายชื่อ: "+pinFor.target.fullName:"แก้ไขรายชื่อ: "+pinFor.target.fullName}
              onConfirm={()=>{ if(pinFor.action==="delete") handleDelete(pinFor.target); else handleEdit(pinFor.target); }}
              onCancel={()=>setPinFor(null)}
            />
          )}
          <div className="bg-slate-800/50 backdrop-blur-lg border border-emerald-500/30 rounded-2xl p-5 shadow-xl">
            <h2 className="text-xl font-black text-white mb-4 flex items-center"><IUsers sz={22} cl="text-emerald-400 mr-2"/>จัดการรายชื่อบุคลากร</h2>
            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-2 mb-3">
              {Object.values(locs).map(l=>(
                <button key={l.id} onClick={()=>setSelLoc(l.id)}
                  className={`px-3 py-2 rounded-xl font-bold text-xs transition-all text-center ${selLoc===l.id?"bg-emerald-500 text-slate-900 shadow-lg shadow-emerald-500/50":"bg-slate-700 text-slate-300 hover:bg-slate-600"}`}>
                  {l.name}
                </button>
              ))}
            </div>
            <div className="p-3 bg-slate-900/50 rounded-lg flex items-center justify-between">
              <div><p className="text-emerald-400 font-bold text-sm">{loc.name}</p><p className="text-slate-400 text-xs">{loc.fullName} — {members.length} คน</p></div>
            </div>
          </div>
          <div className="flex gap-3 flex-wrap">
            <button onClick={()=>{ resetForm(); setShowForm(true); }} className="flex items-center gap-2 bg-emerald-500 text-slate-900 font-bold px-5 py-2.5 rounded-xl hover:shadow-lg hover:shadow-emerald-500/50">
              <IPlus sz={16}/>เพิ่มรายชื่อ
            </button>
            <button onClick={()=>fileRef.current?.click()} className="flex items-center gap-2 bg-blue-500/20 text-blue-400 font-bold px-5 py-2.5 rounded-xl hover:bg-blue-500/30 border border-blue-500/30">
              <IUpload sz={16}/>นำเข้าจาก Excel
            </button>
            <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" className="hidden" onChange={handleImport}/>
            {importMsg&&<p className="text-sm text-emerald-400 font-semibold flex items-center">{importMsg}</p>}
          </div>
          <div className="bg-blue-500/10 border border-blue-500/20 rounded-xl p-3 text-xs text-slate-400">
            <p className="text-blue-400 font-bold mb-1">📋 รูปแบบไฟล์ Excel ที่รองรับ</p>
            <p>แถวแรก = Header: <span className="text-white font-mono">รหัส | ชื่อ-นามสกุล | ตำแหน่ง | สังกัด</span> (ระบบจะหาคอลัมน์อัตโนมัติ)</p>
          </div>
          {showForm&&(
            <div ref={formRef} className="bg-slate-800/50 border border-emerald-500/30 rounded-2xl p-5 shadow-xl">
              <h3 className="text-white font-bold mb-4">{editing?"✏️ แก้ไขรายชื่อ":"เพิ่มรายชื่อใหม่"}</h3>
              <div className="grid grid-cols-2 gap-3 mb-4">
                {[["รหัสพนักงาน","empId","เว้นว่างได้",false],["ชื่อ-นามสกุล","fullName","ชื่อ นามสกุล",true],["ตำแหน่ง","position","เช่น พชง.3, ชชง",true],["สังกัด / แผนก","department","เช่น ผกส., ผปบ.",true]].map(([lbl,key,ph,req])=>(
                  <div key={key}>
                    <label className="block text-slate-400 text-xs font-semibold mb-1">{lbl}{req&&<span className="text-red-400 ml-1">*</span>}</label>
                    <input value={form[key]} onChange={e=>setForm(prev=>({...prev,[key]:e.target.value}))} placeholder={ph}
                      className="w-full bg-slate-900 border border-slate-700 text-white px-3 py-2 rounded-lg focus:border-emerald-500 focus:outline-none text-sm"/>
                  </div>
                ))}
              </div>
              <div className="flex gap-3">
                <button onClick={resetForm} className="flex-1 bg-slate-700 text-white font-bold py-2 rounded-lg hover:bg-slate-600">ยกเลิก</button>
                <button onClick={handleSave} className="flex-1 bg-emerald-500 text-slate-900 font-bold py-2 rounded-lg hover:shadow-lg hover:shadow-emerald-500/50">{editing?"บันทึกการแก้ไข":"เพิ่มรายชื่อ"}</button>
              </div>
            </div>
          )}
          <div className="bg-slate-800/50 backdrop-blur-lg border border-emerald-500/30 rounded-2xl shadow-xl overflow-hidden">
            {loadingM
              ?<div className="flex justify-center py-16"><ISpin sz={36} cl="text-emerald-400"/></div>
              :members.length===0
                ?<div className="text-center py-16 text-slate-500"><IUsers sz={40} cl="mx-auto mb-3 opacity-40"/><p>ยังไม่มีรายชื่อ</p><p className="text-xs mt-1">กดเพิ่มรายชื่อ หรือนำเข้าจาก Excel</p></div>
                :<div className="overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead className="bg-slate-800/80">
                      <tr>{["#","รหัส","ชื่อ-นามสกุล","ตำแหน่ง","สังกัด",""].map(h=>(
                        <th key={h} className="px-4 py-3 text-left text-emerald-400 font-bold whitespace-nowrap">{h}</th>
                      ))}</tr>
                    </thead>
                    <tbody className="divide-y divide-slate-700/50">
                      {members.map((m,i)=>(
                        <tr key={m.id} className="hover:bg-slate-700/30 transition-colors">
                          <td className="px-4 py-3 text-slate-500">{i+1}</td>
                          <td className="px-4 py-3 text-slate-400 font-mono text-xs">{m.empId||"-"}</td>
                          <td className="px-4 py-3 text-white font-medium">{m.fullName}</td>
                          <td className="px-4 py-3 text-slate-300">{m.position}</td>
                          <td className="px-4 py-3 text-slate-300">{m.department}</td>
                          <td className="px-4 py-3">
                            <div className="flex gap-1.5">
                              <button onClick={()=>setPinFor({action:"edit",target:m})} className="bg-blue-500/20 text-blue-400 p-1.5 rounded-lg hover:bg-blue-500/30"><IEdit sz={13}/></button>
                              <button onClick={()=>setPinFor({action:"delete",target:m})} className="bg-red-500/20 text-red-400 p-1.5 rounded-lg hover:bg-red-500/30"><ITrash sz={13}/></button>
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
            }
          </div>
        </div>
      );
    }

    // ============ REGISTER FORM ============
    function RegisterForm({ onDone, curLoc, loc, onOpenDash }) {
      const [step,setStep]       = useState("form"); // form | photo | submitting | success | error
      const [form,setForm]       = useState({ empId:"", fullName:"", position:"", department:"" });
      const [autoFilled,setAutoFilled] = useState(false);
      const [searching,setSearching]   = useState(false);
      const [photo,setPhoto]     = useState(null);
      const [camMode,setCamMode] = useState("environment");
      const [camOpen,setCamOpen] = useState(false);
      const [camErr,setCamErr]   = useState(null); // null | "permission" | "notfound" | "other"
      const [err,setErr]         = useState("");
      const [saveMsg,setSaveMsg] = useState("");
      const [savedAtt,setSavedAtt] = useState(null);
      const [locData,setLocData] = useState(null);
      const vidRef=useRef(null); const canRef=useRef(null); const stRef=useRef(null);

      const setF = (k,v) => { setForm(prev=>({...prev,[k]:v})); if(k==="empId") setAutoFilled(false); };

      const lookupEmpId = useCallback(async (val) => {
        const q=val.trim();
        if(!q||q.length<2) return;
        setSearching(true);
        try {
          const snap=await db.collection("personnel").where("locationId","==",curLoc).get();
          const found=snap.docs.map(d=>d.data()).find(d=>
            (d.empId&&d.empId.toString().trim()===q) ||
            (d.empId&&d.empId.toString().replace(/\D/g,"")===q.replace(/\D/g,""))
          );
          if(found){
            setForm(prev=>({...prev,fullName:found.fullName||"",position:found.position||"",department:found.department||""}));
            setAutoFilled(true);
          }
        } catch(e){ /* lookup failed silently */ }
        finally { setSearching(false); }
      },[curLoc]);

      const startCam = useCallback(async mode=>{
        if(stRef.current) stRef.current.getTracks().forEach(t=>t.stop());
        setCamErr(null); // เคลียร์ error เก่า
        const fm = mode||camMode;

        const tryOpen = async(constraints) => {
          const st = await navigator.mediaDevices.getUserMedia(constraints);
          stRef.current = st;
          if(vidRef.current){
            vidRef.current.srcObject = st;
            await new Promise(res => {
              vidRef.current.onloadedmetadata = () => { vidRef.current.play(); res(); };
              setTimeout(res, 2000);
            });
            if(vidRef.current.readyState < 2){
              await new Promise(res => setTimeout(res, 500));
              vidRef.current.play().catch(()=>{});
            }
          }
          setCamOpen(true);
        };

        // ลอง 3 ระดับ: exact → normal → ไม่ระบุ facingMode
        try {
          await tryOpen({ video:{ facingMode:{ exact: fm } }, audio:false });
        } catch(e1){
          try {
            await tryOpen({ video:{ facingMode: fm }, audio:false });
          } catch(e2){
            try {
              await tryOpen({ video:true, audio:false });
            } catch(e3){
              // จำแนกประเภท error เพื่อแสดงคำแนะนำที่ตรงจุด
              const msg = (e3.name||"") + (e3.message||"");
              if(e3.name==="NotAllowedError" || msg.includes("Permission") || msg.includes("denied")){
                setCamErr("permission");
              } else if(e3.name==="NotFoundError" || msg.includes("not found") || msg.includes("Requested device")){
                setCamErr("notfound");
              } else {
                setCamErr("other");
              }
            }
          }
        }
      },[camMode]);

      const stopCam = () => { if(stRef.current){stRef.current.getTracks().forEach(t=>t.stop());stRef.current=null;} setCamOpen(false); };

      const capture = async () => {
        const v=vidRef.current,c=canRef.current; if(!v||!c) return;
        c.width=v.videoWidth; c.height=v.videoHeight; c.getContext("2d").drawImage(v,0,0);
        stopCam(); setPhoto(await compress(c.toDataURL("image/jpeg",0.92),800,0.78));
      };

      const flip = () => { const m=camMode==="environment"?"user":"environment"; setCamMode(m); startCam(m); };

      const handleSubmit = async () => {
        setStep("submitting"); setErr("");
        setSaveMsg("กำลังตรวจสอบเวลา...");
        const tStart = loc.timeStart||TIME_START;
        const tEnd   = loc.timeEnd||TIME_END;
        if(!withinTime(tStart,tEnd)){
          setErr(`ลงทะเบียนได้เฉพาะเวลา ${tStart} - ${tEnd} น.`); setStep("error"); return;
        }
        setSaveMsg("กำลังตรวจสอบตำแหน่ง GPS...");
        if(!navigator.geolocation){ setErr("เบราว์เซอร์ไม่รองรับ GPS"); setStep("error"); return; }
        navigator.geolocation.getCurrentPosition(async pos=>{
          const dist=calcDist(pos.coords.latitude,pos.coords.longitude,loc.lat,loc.lng);
          const maxDist = getMaxDist(loc);
          const displayDist = loc.displayDist || 20;
          if(dist>maxDist){
            setErr(`คุณอยู่ห่างจากจุดกิจกรรม ${dist.toFixed(0)} เมตร (อนุญาตไม่เกิน ${displayDist} เมตร)`);
            setStep("error"); return;
          }
          const ld={lat:pos.coords.latitude,lng:pos.coords.longitude,distance:dist.toFixed(1)};
          try {
            setSaveMsg("กำลังอัปโหลดรูปไป ImgBB...");
            const img=await uploadImgBB(photo);
            setSaveMsg("กำลังบันทึกข้อมูล...");
            const att={
              empId:      form.empId.trim()||null,
              fullName:   form.fullName.trim(),
              position:   form.position.trim(),
              department: form.department.trim(),
              timestamp:  new Date().toISOString(),
              location:   ld,
              locationId: curLoc,
              locationName:loc.name,
              photoURL:   img.url,
              photoThumb: img.thumb,
              distance:   ld.distance,
            };
            const ref=await db.collection("attendances").add(att);
            const full={id:ref.id,...att};
            onDone(full); setLocData(ld); setSavedAtt(full); setStep("success");
          } catch(e){ setErr("เกิดข้อผิดพลาด: "+e.message); setStep("error"); }
        }, err=>{
          // แยก error code เพื่อแสดง popup แนะนำวิธีแก้ที่ตรงจุด
          if(err.code===1) {
            // PERMISSION_DENIED — ผู้ใช้กด "ไม่อนุญาต"
            setErr("PERMISSION_DENIED");
          } else if(err.code===2) {
            // POSITION_UNAVAILABLE — GPS ปิดหรือหาตำแหน่งไม่ได้
            setErr("POSITION_UNAVAILABLE");
          } else {
            // TIMEOUT
            setErr("TIMEOUT");
          }
          setStep("gps_error");
        }, {enableHighAccuracy:true,timeout:15000});
      };

      const reset = () => {
        setStep("form"); setForm({empId:"",fullName:"",position:"",department:""});
        setAutoFilled(false); setPhoto(null); setErr(""); setSavedAtt(null); setLocData(null); stopCam();
      };

      // ── FORM STEP ──
      if(step==="form") return (
        <div className="bg-slate-800/50 backdrop-blur-lg border border-emerald-500/30 rounded-2xl p-6 shadow-2xl">
          <div className="text-center mb-6">
            <div className="inline-flex items-center space-x-2 bg-emerald-500/20 border border-emerald-500/40 px-5 py-2.5 rounded-xl">
              <IMapPin sz={18} cl="text-emerald-400"/>
              <div className="text-left">
                <div className="text-emerald-400 font-black leading-tight">{loc.name}</div>
                <div className="text-slate-400 text-xs">{loc.fullName}</div>
              </div>
            </div>
          </div>
          <div className="space-y-3">
            {/* รหัสพนักงาน — auto-fill */}
            <div>
              <label className="block text-slate-400 text-sm font-semibold mb-1">รหัสพนักงาน / ลูกจ้าง</label>
              <div className="relative">
                <input value={form.empId} onChange={e=>setF("empId",e.target.value)}
                  onBlur={e=>lookupEmpId(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&lookupEmpId(e.target.value)}
                  placeholder="หากไม่มีรหัส ให้ใส่เบอร์โทรศัพท์"
                  className={`w-full bg-slate-900/80 border-2 text-white px-4 py-2.5 rounded-lg focus:outline-none transition-colors ${autoFilled?"border-emerald-500":"border-slate-700 focus:border-emerald-500"}`}/>
                {searching&&<ISpin sz={16} cl="absolute right-3 top-3 text-emerald-400"/>}
                {autoFilled&&<span className="absolute right-3 top-3 text-emerald-400 text-xs font-bold">✓ ดึงข้อมูลแล้ว</span>}
              </div>
              {!autoFilled&&<p className="text-slate-500 text-xs mt-1">พิมพ์รหัสแล้วกด Enter หรือแตะนอกช่อง ระบบจะดึงข้อมูลให้อัตโนมัติ</p>}
            </div>
            {/* ชื่อ-นามสกุล */}
            <div>
              <label className="block text-slate-400 text-sm font-semibold mb-1">ชื่อ-นามสกุล<span className="text-red-400 ml-1">*</span></label>
              <input value={form.fullName} onChange={e=>setF("fullName",e.target.value)}
                readOnly={autoFilled} placeholder="เช่น นาย ชื่อ-นามสกุล"
                className={`w-full border-2 text-white px-4 py-2.5 rounded-lg focus:outline-none transition-colors ${autoFilled?"bg-slate-800/50 border-emerald-500/40 text-slate-300 cursor-not-allowed":"bg-slate-900/80 border-slate-700 focus:border-emerald-500"}`}/>
            </div>
            {/* ตำแหน่ง */}
            <div>
              <label className="block text-slate-400 text-sm font-semibold mb-1">ตำแหน่ง<span className="text-red-400 ml-1">*</span></label>
              <input value={form.position} onChange={e=>setF("position",e.target.value)}
                readOnly={autoFilled} placeholder="เช่น พชง.3, ชชง, คนงาน"
                className={`w-full border-2 text-white px-4 py-2.5 rounded-lg focus:outline-none transition-colors ${autoFilled?"bg-slate-800/50 border-emerald-500/40 text-slate-300 cursor-not-allowed":"bg-slate-900/80 border-slate-700 focus:border-emerald-500"}`}/>
            </div>
            {/* สังกัด */}
            <div>
              <label className="block text-slate-400 text-sm font-semibold mb-1">สังกัด / แผนก<span className="text-red-400 ml-1">*</span></label>
              <input value={form.department} onChange={e=>setF("department",e.target.value)}
                readOnly={autoFilled} placeholder="เช่น ผกส., ผปบ., ผมต."
                className={`w-full border-2 text-white px-4 py-2.5 rounded-lg focus:outline-none transition-colors ${autoFilled?"bg-slate-800/50 border-emerald-500/40 text-slate-300 cursor-not-allowed":"bg-slate-900/80 border-slate-700 focus:border-emerald-500"}`}/>
            </div>
            {/* ปุ่มปลดล็อก */}
            {autoFilled&&(
              <button type="button" onClick={()=>setAutoFilled(false)}
                className="w-full bg-slate-700/60 border border-slate-600 text-slate-400 text-xs font-semibold py-2 rounded-lg hover:bg-slate-700 hover:text-white transition-colors flex items-center justify-center gap-1.5">
                <ILock sz={12}/>ข้อมูลถูกล็อกอัตโนมัติ — กดที่นี่เพื่อแก้ไข
              </button>
            )}
          </div>
          <div className="mt-4 bg-slate-900/50 border border-slate-700 rounded-lg p-3 text-xs text-slate-400 space-y-1">
            <p className="text-slate-300 font-semibold flex items-center"><IAlert sz={13} cl="text-yellow-400 mr-1.5"/>เงื่อนไขการลงทะเบียน</p>
            <p className="flex items-center"><IClock sz={12} cl="text-emerald-400 mr-1.5"/>เวลา {loc.timeStart||TIME_START} - {loc.timeEnd||TIME_END} น.</p>
            <p className="flex items-center"><IMapPin sz={12} cl="text-emerald-400 mr-1.5"/>ต้องอยู่ภายในรัศมี {loc.displayDist||20} เมตร จากจุดลงทะเบียน</p>
            <p className="flex items-center"><ICamera sz={12} cl="text-emerald-400 mr-1.5"/>ต้องถ่ายรูปยืนยันตัวตน</p>
          </div>
          <button
            onClick={()=>{
              if(!form.fullName.trim()||!form.position.trim()||!form.department.trim()){
                alert("กรุณากรอกข้อมูลที่มีเครื่องหมาย * ให้ครบ"); return;
              }
              setStep("photo");
            }}
            className="mt-4 w-full bg-gradient-to-r from-emerald-500 to-teal-500 text-slate-900 font-black py-4 rounded-lg hover:shadow-lg hover:shadow-emerald-500/50 text-lg">
            ถัดไป → ถ่ายรูปยืนยันตัวตน
          </button>
        </div>
      );

      // ── PHOTO STEP ──
      if(step==="photo") return (
        <div className="bg-slate-800/50 backdrop-blur-lg border border-emerald-500/30 rounded-2xl p-6 shadow-2xl">
          <div className="text-center mb-5">
            <h2 className="text-xl font-black text-white mb-1">ถ่ายรูปยืนยันตัวตน</h2>
            <p className="text-emerald-400 text-sm font-semibold">{form.fullName}</p>
            <p className="text-slate-400 text-xs">{form.position} • {form.department}</p>
          </div>
          <div className="space-y-3">
            {/* Camera permission error popup */}
            {camErr && (
              <div className="bg-red-500/10 border-2 border-red-500/40 rounded-xl p-5 space-y-3">
                <p className="text-red-400 font-black text-base flex items-center gap-2">
                  <span className="text-2xl">📵</span>
                  {camErr==="permission" ? "ยังไม่ได้อนุญาตให้เข้าถึงกล้อง"
                  :camErr==="notfound"   ? "ไม่พบกล้องบนอุปกรณ์นี้"
                  :                       "ไม่สามารถเปิดกล้องได้"}
                </p>

                {camErr==="permission" && (
                  <div className="space-y-2 text-sm">
                    <p className="text-white font-bold">วิธีเปิดอนุญาตกล้อง:</p>
                    <div className="bg-slate-900/60 rounded-lg p-3 space-y-1.5 text-slate-300">
                      <p className="text-emerald-400 font-bold">🤖 Android (Samsung / ทั่วไป)</p>
                      <p>1. กดปุ่ม <span className="text-white font-bold">⋮ (สามจุด)</span> มุมขวาบนของเบราว์เซอร์</p>
                      <p>2. เลือก <span className="text-white font-bold">การตั้งค่า → การอนุญาตไซต์</span></p>
                      <p>3. กด <span className="text-white font-bold">กล้อง → อนุญาต</span></p>
                      <p>4. กลับมาที่หน้านี้แล้วกด <span className="text-white font-bold">"ลองใหม่"</span></p>
                    </div>
                    <div className="bg-slate-900/60 rounded-lg p-3 space-y-1.5 text-slate-300 mt-2">
                      <p className="text-emerald-400 font-bold">🔒 วิธีเร็วกว่า (Android Chrome)</p>
                      <p>1. กดไอคอน <span className="text-white font-bold">🔒 หรือ ⓘ</span> ซ้ายของ address bar</p>

    // ============ PUBLIC DASHBOARD (read-only, ไม่ต้อง login) ============
    function PublicDashboard({ locs, atts, curLoc, onBack }) {
      const [selLoc,setSelLoc]       = useState(curLoc);
      const [members,setMembers]     = useState([]);
      const [safeDates,setSafeDates] = useState([]);
      const [overrides,setOverrides] = useState({});
      const [loadingD,setLoadingD]   = useState(false);

      const loadAll = async (locId) => {
        setLoadingD(true);
        try {
          const [snapP, docSD, docOV] = await Promise.all([
            db.collection("personnel").where("locationId","==",locId).get(),
            db.collection("settings").doc("safetydates").get(),
            db.collection("overrides").doc(locId).get(),
          ]);
          setMembers(sortPersonnel(snapP.docs.map(d=>({id:d.id,...d.data()}))));
          const sd = docSD.exists ? (docSD.data()[locId]||[]) : [];
          setSafeDates(sd.sort());
          const ov = docOV.exists ? docOV.data() : {};
          setOverrides(ov);
        } catch(e){ console.error(e); }
        finally { setLoadingD(false); }
      };

      useEffect(()=>{ loadAll(selLoc); },[selLoc]);

      const memberKey = m => m.empId ? m.empId : m.id;

      const attOnDate = (m, date) => atts.some(a=>{
        if(a.locationId!==selLoc) return false;
        if(a.timestamp.slice(0,10)!==date) return false;
        if(m.empId&&a.empId&&m.empId.toString().trim()===a.empId.toString().trim()) return true;
        if(a.fullName&&m.fullName&&a.fullName.trim()===m.fullName.trim()) return true;
        return false;
      });

      const getCellStatus = (m, date) => {
        const key = memberKey(m)+"_"+date;
        const v = overrides[key];
        if(v==="P"||v==="O"||v==="E") return v;
        if(isFuture(date)) return "F";
        return attOnDate(m,date)?"P":"O";
      };

      const calcPct = (m) => {
        let p=0,total=0;
        safeDates.forEach(d=>{ const s=getCellStatus(m,d); if(s!=="E"&&s!=="F"){total++;if(s==="P")p++;} });
        return total===0?null:Math.round(p/total*100);
      };

      const fmtDate = (iso) => {
        const d=new Date(iso+"T00:00:00");
        const mo=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
        return d.getDate()+"\n"+mo[d.getMonth()];
      };

      const cellBg  = s => s==="P"?"bg-emerald-500":s==="E"?"bg-slate-600":s==="F"?"bg-slate-700/50":"bg-red-500/80";
      const cellTxt = s => s==="P"?"✓":s==="E"?"–":s==="F"?"·":"✗";

      // คนนอกฐานข้อมูล
      const pubOutsiders = useMemo(()=>{
        const seen=new Set(), list=[];
        safeDates.forEach(d=>{
          atts.filter(a=>{
            if(a.locationId!==selLoc||a.timestamp.slice(0,10)!==d) return false;
            return !members.some(m=>{
              if(m.empId&&a.empId&&m.empId.toString().trim()===a.empId.toString().trim()) return true;
              if(a.fullName&&m.fullName&&a.fullName.trim()===m.fullName.trim()) return true;
              return false;
            });
          }).forEach(a=>{ const key=(a.empId||"")+"__"+(a.fullName||""); if(!seen.has(key)){seen.add(key);list.push(a);} });
        });
        return list;
      },[atts,members,safeDates,selLoc]);

      const pubOutsiderDates = useMemo(()=>{
        const result={};
        safeDates.forEach(d=>{ result[d]=atts.filter(a=>{
          if(a.locationId!==selLoc||a.timestamp.slice(0,10)!==d) return false;
          return !members.some(m=>{
            if(m.empId&&a.empId&&m.empId.toString().trim()===a.empId.toString().trim()) return true;
            if(a.fullName&&m.fullName&&a.fullName.trim()===m.fullName.trim()) return true;
            return false;
          });
        }); });
        return result;
      },[atts,members,safeDates,selLoc]);

      // Export PDF (PublicDashboard)
      const exportPDF = () => {
        const locName = locs[selLoc]?.name || selLoc;
        const locFull = locs[selLoc]?.fullName || "";
        const MONTHS = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
        const fmtMon = iso => { const d=new Date(iso+"T00:00:00"); return MONTHS[d.getMonth()]+" "+(d.getFullYear()+543); };
        const groups=[]; let cur=null;
        safeDates.forEach(d=>{ const mo=d.slice(0,7); if(!cur||cur.mo!==mo){cur={mo,label:fmtMon(d),count:1};groups.push(cur);}else cur.count++; });
        const bgColor = s => s==="P"?"#22c55e":s==="E"?"#64748b":s==="F"?"#334155":"#ef4444";
        const fgColor = s => s==="E"||s==="F"?"#94a3b8":"#fff";
        const cellChar = s => s==="P"?"✓":s==="E"?"–":s==="F"?"·":"✗";
        const allRows = [
          ...members.map(m=>({
            name: m.fullName, pos: m.position, dept: m.department,
            cells: safeDates.map(d=>getCellStatus(m,d)), pct: calcPct(m),
          })),
          ...(pubOutsiders.length>0?[{name:"⚠️ คนนอกฐานข้อมูล",pos:"",dept:"",cells:null,pct:null,isSep:true}]:[]),
          ...pubOutsiders.map(a=>({
            name: a.fullName||"—", pos: a.position||"—", dept: a.department||"—",
            cells: safeDates.map(d=>(pubOutsiderDates[d]||[]).some(x=>{
              if(a.empId&&x.empId&&a.empId.toString().trim()===x.empId.toString().trim()) return true;
              if(a.fullName&&x.fullName&&a.fullName.trim()===x.fullName.trim()) return true;
              return false;
            })?"P":"F"),
            pct: null, isOutsider: true,
          })),
        ];
        const rowsHtml = allRows.map((r,i)=>{
          if(r.isSep) return `<tr style="background:#7c3aed20"><td colspan="${4+safeDates.length+1}" style="padding:4px 8px;font-weight:bold;color:#f59e0b;font-size:12px">⚠️ พบ ${pubOutsiders.length} คน ที่ลงทะเบียนแต่ยังไม่อยู่ในฐานข้อมูล</td></tr>`;
          const rowBg = r.isOutsider?"#7c3aed10":i%2===0?"#1e293b":"#0f172a";
          const cellsHtml = r.cells?r.cells.map(s=>`<td class="c" style="background:${bgColor(s)};color:${fgColor(s)};width:13px;min-width:13px;max-width:13px">${cellChar(s)}</td>`).join(""):safeDates.map(()=>`<td class="c" style="width:13px;min-width:13px;max-width:13px;background:#1e293b"></td>`).join("");
          const pctColor = r.pct===null?"#64748b":r.pct>=80?"#22c55e":r.pct>=50?"#f59e0b":"#ef4444";
          return `<tr style="background:${rowBg}"><td class="n" style="color:${r.isOutsider?"#fcd34d":"#f1f5f9"}">${r.name}</td><td class="p">${r.pos}</td><td class="d">${r.dept}</td>${cellsHtml}<td class="pct" style="color:${pctColor}">${r.pct!==null?r.pct+"%":"—"}</td></tr>`;
        }).join("");

able><div style="margin-top:10px;font-size:11px;color:#94a3b8;display:flex;gap:16px"><span><span style="background:#22c55e;color:#fff;padding:2px 7px;border-radius:3px;font-weight:bold">✓</span> เข้าร่วม</span><span><span style="background:#ef4444;color:#fff;padding:2px 7px;border-radius:3px;font-weight:bold">✗</span> ไม่เข้าร่วม</span><span><span style="background:#64748b;color:#94a3b8;padding:2px 7px;border-radius:3px;font-weight:bold">–</span> ยกเว้น</span><span><span style="background:#334155;color:#94a3b8;padding:2px 7px;border-radius:3px;font-weight:bold">·</span> ยังไม่ถึงวันกิจกรรม</span></div></body></html>`;

                              <td className="px-1 py-1 text-center font-black border-l-2 border-amber-500/40 sticky right-0 bg-inherit z-10 text-xs dash-col-pct"

                        {/* แถวสรุปรวมรายวัน */}
                        {members.length>0 && (

                              const pct=total>0?Math.round(p/total*100):null;

                        {/* แถวคนนอกฐานข้อมูล */}
                        {pubOutsiders.length>0 && (
                          <>

                                </td>
                                <td className="px-1 py-1 text-white whitespace-nowrap sticky bg-amber-500/5 z-10 border-r border-amber-500/20 overflow-hidden dash-col-pos dash-td-text dash-sticky-pos">

            {/* footer กลับ */}

    }

    // วันนี้ในรูป ISO string YYYY-MM-DD
    const TODAY = new Date().toISOString().slice(0,10);
    const isFuture = (date) => date > TODAY;

    // ============ DASHBOARD VIEW ============
    // เก็บวันที่กิจกรรม: settings/safetydates → { lampun: ["2025-01-06",...], ... }
    // เก็บ override:     overrides/{locId}   → { "key_date": "P"|"O"|"E" }
    // key = empId ถ้ามี ไม่งั้นใช้ fullName

    function DashboardView({ atts, setAtts, locs }) {
      const [selLoc,setSelLoc]         = useState("lampun");
      const [members,setMembers]       = useState([]);
      const [safeDates,setSafeDates]   = useState({}); // {locId: ["2025-01-06",...]}
      const [overrides,setOverrides]   = useState({}); // {locId: {"key_date":"P"|"O"|"E"}}
      const [loadingD,setLoadingD]     = useState(false);
      const [showAddDate,setShowAddDate] = useState(false);
      const [newDate,setNewDate]       = useState("");
      const [savingDate,setSavingDate] = useState(false);
      const [pinFor,setPinFor]         = useState(null); // {type:"deldate"}
      const [copying,setCopying]       = useState(false);
      const [copyMsg,setCopyMsg]       = useState("");

      // โหลด personnel + safedates + overrides
      const loadAll = async (locId) => {
        setLoadingD(true);
        try {
          const [snapP, docSD, docOV] = await Promise.all([
            db.collection("personnel").where("locationId","==",locId).get(),
            db.collection("settings").doc("safetydates").get(),
            db.collection("overrides").doc(locId).get(),
          ]);
          setMembers(sortPersonnel(snapP.docs.map(d=>({id:d.id,...d.data()}))));
          const sd = docSD.exists ? (docSD.data()[locId]||[]) : [];
          setSafeDates(prev=>({...prev,[locId]: sd.sort()}));
          const ov = docOV.exists ? docOV.data() : {};
          setOverrides(prev=>({...prev,[locId]: ov}));
        } catch(e){ alert("โหลดข้อมูลไม่ได้: "+e.message); }
        finally { setLoadingD(false); }
      };

      useEffect(()=>{ loadAll(selLoc); },[selLoc]);

      const dates = (safeDates[selLoc]||[]);
      const ov    = overrides[selLoc]||{};

      // หา key สำหรับ member (ใช้ empId ถ้ามี ไม่งั้นใช้ id)
      const memberKey = m => m.empId ? m.empId : m.id;

      // ตรวจว่า member ลงทะเบียนในวันนั้นไหม (จาก atts)
      const attOnDate = (m, date) => {
        return atts.some(a => {
          if(a.locationId !== selLoc) return false;
          if(a.timestamp.slice(0,10) !== date) return false;
          if(m.empId && a.empId && m.empId.toString().trim() === a.empId.toString().trim()) return true;
          if(a.fullName && m.fullName && a.fullName.trim() === m.fullName.trim()) return true;
          return false;
        });
      };

      // สถานะของแต่ละ cell: "P"=เข้าร่วม "O"=ไม่เข้าร่วม "E"=ยกเว้น "F"=อนาคต
      const getCellStatus = (m, date) => {
        const key = memberKey(m)+"_"+date;
        const manualVal = ov[key];
        // override มีสิทธิ์สูงสุด (แม้แต่วันอนาคต)
        if(manualVal === "P") return "P";
        if(manualVal === "O") return "O";
        if(manualVal === "E") return "E";
        // วันในอนาคต — ยังไม่ถึง ไม่นับ
        if(isFuture(date)) return "F";
        return attOnDate(m, date) ? "P" : "O";
      };

      // คำนวณ % (ไม่นับ E และ F)
      const calcPct = (m) => {
        let p=0, total=0;
        dates.forEach(d=>{
          const s = getCellStatus(m,d);
          if(s==="E"||s==="F") return;
          total++;
          if(s==="P") p++;
        });
        if(total===0) return null;
        return Math.round(p/total*100);
      };

      // สรุปรวม (ไม่นับ E และ F)
      const calcDateSummary = (date) => {
        if(isFuture(date)) return null;
        let p=0, total=0;
        members.forEach(m=>{
          const s = getCellStatus(m,date);
          if(s!=="E"&&s!=="F"){ total++; if(s==="P") p++; }
        });
        return total>0 ? Math.round(p/total*100) : null;
      };

      // cycle cell: auto→P, P→O, O→E, E→auto(ลบ override)
      const cycleCell = (m, date) => {
        const cur = getCellStatus(m, date);
        const key = memberKey(m)+"_"+date;
        let next;
        if(!ov[key]) { next = cur==="P"?"O":"P"; }
        else if(ov[key]==="P") next = "O";
        else if(ov[key]==="O") next = "E";
        else next = null; // E → auto
        applyOverride(key, next); // ไม่ต้องใส่ PIN แล้ว
      };

      const applyOverride = async (key, val) => {
        const locId = selLoc;
        const newOv = {...(overrides[locId]||{})};
        if(val===null) delete newOv[key];
        else newOv[key] = val;
        try {
          await db.collection("overrides").doc(locId).set(newOv);
          setOverrides(prev=>({...prev,[locId]:newOv}));
        } catch(e){ alert("บันทึกไม่ได้: "+e.message); }
      };

      // เพิ่มวัน
      const addDate = async () => {
        if(!newDate){ alert("กรุณาเลือกวันที่"); return; }
        if(dates.includes(newDate)){ alert("วันที่นี้มีอยู่แล้ว"); return; }
        setSavingDate(true);
        try {
          const docSD = await db.collection("settings").doc("safetydates").get();
          const cur = docSD.exists ? (docSD.data()||{}) : {};
          const updated = {...cur, [selLoc]: [...(cur[selLoc]||[]), newDate].sort()};
          await db.collection("settings").doc("safetydates").set(updated);
          setSafeDates(prev=>({...prev,[selLoc]:updated[selLoc]}));
          setNewDate(""); setShowAddDate(false);
        } catch(e){ alert("เพิ่มวันไม่ได้: "+e.message); }
        finally { setSavingDate(false); }
      };

      // ลบวัน
      const deleteDate = async (date) => {
        try {
          const docSD = await db.collection("settings").doc("safetydates").get();
          const cur = docSD.exists ? (docSD.data()||{}) : {};
          const updated = {...cur, [selLoc]: (cur[selLoc]||[]).filter(d=>d!==date)};
          await db.collection("settings").doc("safetydates").set(updated);
          setSafeDates(prev=>({...prev,[selLoc]:updated[selLoc]}));
          // ลบ overrides ที่เกี่ยวกับวันนี้ด้วย
          const locOv = {...(overrides[selLoc]||{})};
          Object.keys(locOv).forEach(k=>{ if(k.endsWith("_"+date)) delete locOv[k]; });
          await db.collection("overrides").doc(selLoc).set(locOv);
          setOverrides(prev=>({...prev,[selLoc]:locOv}));
          setPinFor(null);
        } catch(e){ alert("ลบวันไม่ได้: "+e.message); }
      };

      // export Excel
      const exportExcel = () => {
        const rows = members.map(m=>{
          const row = { "แผนก": m.department, "ชุดงาน": m.position, "ชื่อ-นามสกุล": m.fullName };
          dates.forEach(d=>{
            const s = getCellStatus(m,d);
            const label = d.slice(5).replace("-","/"); // MM/DD
            row[label] = s==="P"?"P":s==="E"?"E":"O";
          });
          const pct = calcPct(m);
          row["%เข้าร่วม"] = pct!==null ? pct/100 : "";
          return row;
        });
        const ws = XLSX.utils.json_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, locs[selLoc]?.name||selLoc);
        XLSX.writeFile(wb, `safety-talk-dashboard-${selLoc}-${new Date().getFullYear()}.xlsx`);
      };

      // Export PDF — ใช้ browser print window
      const exportPDF = () => {
        const locName = locs[selLoc]?.name || selLoc;
        const locFull = locs[selLoc]?.fullName || "";
        const MONTHS = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
        const fmtD = iso => { const d=new Date(iso+"T00:00:00"); return d.getDate()+"<br>"+MONTHS[d.getMonth()]; };
        const fmtMon = iso => { const d=new Date(iso+"T00:00:00"); return MONTHS[d.getMonth()]+" "+(d.getFullYear()+543); };

        // group dates by month for header
        const groups=[]; let cur=null;
        dates.forEach(d=>{ const mo=d.slice(0,7); if(!cur||cur.mo!==mo){cur={mo,label:fmtMon(d),count:1};groups.push(cur);}else cur.count++; });

        // cell color
        const bgColor = s => s==="P"?"#22c55e":s==="E"?"#64748b":s==="F"?"#334155":"#ef4444";
        const fgColor = s => s==="E"||s==="F"?"#94a3b8":"#fff";
        const cellChar = s => s==="P"?"✓":s==="E"?"–":s==="F"?"·":"✗";

        // all rows (members + outsiders)
        const allRows = [
          ...members.map(m=>({
            name: m.fullName,
            pos: m.position, dept: m.department,
            cells: dates.map(d=>getCellStatus(m,d)),
            pct: calcPct(m),
          })),
          ...(outsiderList.length>0 ? [{name:"⚠️ คนนอกฐานข้อมูล", pos:"", dept:"", cells:null, pct:null, isSep:true}] : []),
          ...outsiderList.map(a=>({
            name: a.fullName||"—",
            pos: a.position||"—", dept: a.department||"—",
            cells: dates.map(d=>{
              const hit=(getOutsiders[d]||[]).some(x=>{
                if(a.empId&&x.empId&&a.empId.toString().trim()===x.empId.toString().trim()) return true;
                if(a.fullName&&x.fullName&&a.fullName.trim()===x.fullName.trim()) return true;
                return false;
              });
              return hit?"P":"F";
            }),

          })),
        ];

        const rowsHtml = allRows.map((r,i)=>{
          if(r.isSep) return `<tr style="background:#7c3aed20"><td colspan="${4+dates.length+1}" style="padding:4px 8px;font-weight:bold;color:#f59e0b;font-size:12px">⚠️ พบ ${outsiderList.length} คน ที่ลงทะเบียนแต่ยังไม่อยู่ในฐานข้อมูล</td></tr>`;
          const rowBg = r.isOutsider ? "#7c3aed10" : i%2===0?"#1e293b":"#0f172a";
          const cellsHtml = r.cells ? r.cells.map((s,ci)=>`<td class="cell-col" style="background:${bgColor(s)};color:${fgColor(s)};width:13px;min-width:13px;max-width:13px;border:1px solid #475569">${cellChar(s)}</td>`).join("") : dates.map(()=>`<td style="width:13px;min-width:13px;max-width:13px;border:1px solid #334155;background:#1e293b"></td>`).join("");
          const pctColor = r.pct===null?"#64748b":r.pct>=80?"#22c55e":r.pct>=50?"#f59e0b":"#ef4444";
          const pctHtml = `<td class="pct-col" style="color:${pctColor}">${r.pct!==null?r.pct+"%":"—"}</td>`;
          return `<tr style="background:${rowBg}"><td class="name-col" style="color:${r.isOutsider?"#fcd34d":"#f1f5f9"}">${r.name}</td><td class="pos-col" style="color:#e2e8f0">${r.pos}</td><td class="dept-col" style="color:#cbd5e1">${r.dept}</td>${cellsHtml}${pctHtml}</tr>`;
        }).join("");

        const monthHeaderHtml = groups.map(g=>`<th colspan="${g.count}" style="text-align:center;color:#34d399;font-size:9px;padding:3px 2px;border-left:1px solid #334155">${g.label}</th>`).join("");
        const dateHeaderHtml = dates.map(d=>`<th style="text-align:center;font-size:8px;color:#94a3b8;padding:2px 1px;border-left:1px solid #1e293b;width:11px;min-width:11px;max-width:11px;writing-mode:vertical-lr;transform:rotate(180deg)">${d.slice(5).replace("-","/")} </th>`).join("");

        const now = new Date();
        const thaiDate = now.getDate()+" "+MONTHS[now.getMonth()]+" "+(now.getFullYear()+543);

        const html = `<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8">
<title>Safety Talk — ${locName}</title>
<style>
  @page { size: A4 landscape; margin: 10mm; }
  * { box-sizing: border-box; }
  body { font-family: 'Sarabun','TH Sarabun New',sans-serif; background:#0f172a; color:#e2e8f0; margin:0; padding:0; }
  h1 { text-align:center; font-size:26px; margin:0 0 5px 0; color:#34d399; font-weight:bold; }
  h2 { text-align:center; font-size:20px; margin:0 0 5px 0; color:#1e293b; font-weight:bold; background:#f0fdf4; padding:5px 16px; border-radius:6px; display:inline-block; }
  .meta { text-align:center; font-size:12px; color:#94a3b8; margin-bottom:10px; }
  table { border-collapse:collapse; width:100%; table-layout:fixed; }
  thead { background:#0f172a; }
  th { background:#1e293b; color:#94a3b8; font-size:13px; padding:5px 4px; border:1px solid #334155; }
  td.name-col { padding:5px 8px; font-size:18px; max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#f1f5f9; }
  td.pos-col  { padding:5px 6px; font-size:14px; white-space:nowrap; color:#e2e8f0; }
  td.dept-col { padding:5px 6px; font-size:14px; white-space:nowrap; color:#cbd5e1; }
  td.cell-col { text-align:center; padding:3px 1px; font-weight:bold; font-size:9px; border:1px solid #475569; line-height:1; }
  td.pct-col  { text-align:center; font-weight:bold; font-size:15px; border-left:2px solid #f59e0b80; padding:5px 6px; white-space:nowrap; }
  .sticky-name { width:220px; min-width:220px; max-width:220px; }
  .sticky-pos  { width:85px;  min-width:85px;  max-width:85px; }
  .sticky-dept { width:65px;  min-width:65px;  max-width:65px; }
  tbody tr td { border-bottom:1px solid #1e293b; }
  @media print { body { -webkit-print-color-adjust:exact; print-color-adjust:exact; } }
</style>
</head><body>
<h1>รายงานผลการเข้าร่วมกิจกรรม Safety Talk</h1>
<div style="text-align:center"><h2>${locName} — ${locFull}</h2></div>
<div class="meta">พิมพ์เมื่อ ${thaiDate} • ${members.length} คน • ${dates.length} วันกิจกรรม (${dates[0]||""} ถึง ${dates[dates.length-1]||""})</div>

<thead>
<tr>
  <th class="sticky-name" rowspan="2" style="font-size:14px">ชื่อ-นามสกุล</th>

  <th class="sticky-dept" rowspan="2">แผนก</th>
  ${monthHeaderHtml}
  <th style="width:42px;min-width:42px;text-align:center;color:#f59e0b;font-size:12px;padding:4px 3px;border-left:2px solid #f59e0b80" rowspan="2">%</th>
</tr>
<tr>${dateHeaderHtml}</tr>
</thead>
<tbody>${rowsHtml}</tbody>
</table>
<div style="margin-top:10px;font-size:11px;color:#94a3b8;display:flex;gap:16px;align-items:center">
  <span style="display:inline-flex;align-items:center;gap:5px"><span style="background:#22c55e;color:#fff;padding:2px 7px;border-radius:3px;font-weight:bold;font-size:12px">✓</span> เข้าร่วม</span>
  <span style="display:inline-flex;align-items:center;gap:5px"><span style="background:#ef4444;color:#fff;padding:2px 7px;border-radius:3px;font-weight:bold;font-size:12px">✗</span> ไม่เข้าร่วม</span>
  <span style="display:inline-flex;align-items:center;gap:5px"><span style="background:#64748b;color:#94a3b8;padding:2px 7px;border-radius:3px;font-weight:bold;font-size:12px">–</span> ยกเว้น</span>
  <span style="display:inline-flex;align-items:center;gap:5px"><span style="background:#334155;color:#94a3b8;padding:2px 7px;border-radius:3px;font-weight:bold;font-size:12px">·</span> ยังไม่ถึงวันกิจกรรม</span>
  <span style="margin-left:auto;color:#64748b;font-size:10px">% = เปอร์เซ็นต์การเข้าร่วมสะสม (นับถึงวันปัจจุบัน)</span>
</div>
</body></html>`;

        const w = window.open("","_blank","width=1000,height=700");
        if(!w){ alert("กรุณาอนุญาต Pop-up สำหรับเว็บนี้ก่อนครับ"); return; }
        w.document.write(html);
        w.document.close();
        w.onload = () => { w.focus(); w.print(); };
      };

      // หาคนที่ลงทะเบียนในวันที่กำหนด แต่ไม่อยู่ใน members
      const getOutsiders = useMemo(()=>{
        const result = {}; // { date: [{att},...] }
        dates.forEach(d=>{
          const dayAtts = atts.filter(a=>{
            if(a.locationId!==selLoc) return false;
            if(a.timestamp.slice(0,10)!==d) return false;
            // ตรวจว่าอยู่ใน members ไหม
            const inMembers = members.some(m=>{
              if(m.empId&&a.empId&&m.empId.toString().trim()===a.empId.toString().trim()) return true;
              if(a.fullName&&m.fullName&&a.fullName.trim()===m.fullName.trim()) return true;
              return false;
            });
            return !inMembers;
          });
          if(dayAtts.length>0) result[d] = dayAtts;
        });
        return result;
      },[atts,members,dates,selLoc]);

      // unique คนนอกฐาน (groupby ชื่อ+empId)
      const outsiderList = useMemo(()=>{
        const seen = new Set();
        const list = [];
        Object.values(getOutsiders).flat().forEach(a=>{
          const key = (a.empId||"")+"__"+(a.fullName||"");
          if(!seen.has(key)){ seen.add(key); list.push(a); }
        });
        return list;
      },[getOutsiders]);

      // วันที่มีคนลงทะเบียนแต่ไม่ได้อยู่ในแผน
      const unplannedDates = useMemo(()=>{
        const dateSet = new Set(dates);
        const found = {}; // {date: count}
        atts.forEach(a=>{
          if(a.locationId!==selLoc) return;
          const d = a.timestamp.slice(0,10);
          if(!dateSet.has(d)){
            found[d] = (found[d]||0) + 1;
          }
        });
        return Object.entries(found).sort((a,b)=>a[0].localeCompare(b[0])).map(([date,count])=>({date,count}));
      },[atts,dates,selLoc]);

      // สีและไอคอน cell (F = อนาคต)
      const cellBg  = s => s==="P"?"bg-emerald-500":s==="E"?"bg-slate-600":s==="F"?"bg-slate-700/50":"bg-red-500/80";
      const cellTxt = s => s==="P"?"✓":s==="E"?"–":s==="F"?"·":"✗";
      const cellCol = s => s==="P"?"text-white font-black":s==="E"?"text-slate-400":s==="F"?"text-slate-600":"text-white font-black";

      // format วันที่ไทย
      const fmtDate = (iso) => {
        const d = new Date(iso+"T00:00:00");
        const m = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
        return d.getDate()+"\n"+m[d.getMonth()];
      };
      const fmtDateShort = (iso) => {
        const d = new Date(iso+"T00:00:00");
        return d.getDate()+""; // แค่วันที่ตัวเลข
      };

      const loc = locs[selLoc]||Object.values(locs)[0];

      return (
        <div className="space-y-5">
          {/* PIN dialog สำหรับ cell override */}
          {/* PIN dialog สำหรับลบวัน */}
          {pinFor?.type==="deldate" && (
            <PinDialog
              title={`ลบวันที่ ${pinFor.date} ออกจากตาราง?`}
              onConfirm={()=>deleteDate(pinFor.date)}
              onCancel={()=>setPinFor(null)}
            />
          )}

          {/* Header */}
          <div className="bg-slate-800/50 backdrop-blur-lg border border-emerald-500/30 rounded-2xl p-5 shadow-xl">
            <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
              <h2 className="text-xl font-black text-white flex items-center gap-2">📊 Dashboard สถิติการเข้าร่วม Safety Talk</h2>
              <div className="flex gap-2">
                <button onClick={()=>setShowAddDate(v=>!v)}
                  className="flex items-center gap-1.5 bg-emerald-500/20 text-emerald-400 font-bold px-4 py-2 rounded-xl hover:bg-emerald-500/30 border border-emerald-500/30 text-sm">
                  <IPlus sz={14}/>เพิ่มวันกิจกรรม
                </button>
                <button onClick={exportExcel}
                  className="flex items-center gap-1.5 bg-blue-500/20 text-blue-400 font-bold px-4 py-2 rounded-xl hover:bg-blue-500/30 border border-blue-500/30 text-sm">
                  <IDl sz={14}/>Excel
                </button>
                <button onClick={exportPDF}
                  className="flex items-center gap-1.5 bg-red-500/20 text-red-400 font-bold px-4 py-2 rounded-xl hover:bg-red-500/30 border border-red-500/30 text-sm">
                  📄 PDF
                </button>
              </div>
            </div>

            {/* เพิ่มวัน */}
            {showAddDate && (
              <div className="bg-slate-900/60 rounded-xl p-4 mb-4 space-y-3">
                <div className="flex flex-wrap gap-3 items-end">
                  <div>
                    <label className="block text-slate-400 text-xs font-semibold mb-1">เลือกวันกิจกรรม Safety Talk</label>
                    <input type="date" value={newDate} onChange={e=>setNewDate(e.target.value)}
                      className="bg-slate-800 border border-slate-600 text-white px-3 py-2 rounded-lg focus:border-emerald-500 focus:outline-none text-sm"/>
                  </div>
                  <button onClick={addDate} disabled={savingDate}
                    className="bg-emerald-500 text-slate-900 font-bold px-5 py-2 rounded-lg hover:bg-emerald-400 disabled:opacity-60 text-sm">
                    {savingDate?"กำลังบันทึก...":"เพิ่มวัน"}
                  </button>
                  <button onClick={()=>setShowAddDate(false)} className="bg-slate-700 text-white px-4 py-2 rounded-lg text-sm">ยกเลิก</button>
                </div>

                {/* คัดลอกวันจากหน่วยงานนี้ไปทุกหน่วยงาน */}
                <div className="border-t border-slate-700 pt-3">
                  <p className="text-slate-400 text-xs font-semibold mb-2">📋 คัดลอกวันกิจกรรมจาก <span className="text-emerald-400">{locs[selLoc]?.name}</span> ไปใช้ทุกหน่วยงาน</p>
                  <p className="text-slate-500 text-xs mb-2">วันที่ปัจจุบัน ({dates.length} วัน): {dates.slice(0,5).map(d=>d.slice(5).replace("-","/")).join(", ")}{dates.length>5?"...":""}</p>
                  <div className="flex flex-wrap items-center gap-3">
                    <button
                      disabled={copying||dates.length===0}
                      onClick={async ()=>{
                        if(dates.length===0){ alert("ยังไม่มีวันกิจกรรมสำหรับ "+locs[selLoc]?.name); return; }
                        if(!window.confirm("ยืนยัน: คัดลอก "+dates.length+" วัน จาก "+locs[selLoc]?.name+" ไปใช้กับทุกหน่วยงาน?")){return;}
                        setCopying(true); setCopyMsg("");
                        try {
                          const docSD = await db.collection("settings").doc("safetydates").get();
                          const cur = docSD.exists ? (docSD.data()||{}) : {};
                          const updated = {...cur};
                          Object.keys(locs).forEach(locId=>{
                            if(locId===selLoc) return;
                            const ex = new Set(cur[locId]||[]);
                            dates.forEach(d=>ex.add(d));
                            updated[locId] = [...ex].sort();
                          });
                          await db.collection("settings").doc("safetydates").set(updated);
                          setSafeDates(prev=>{
                            const next={...prev};
                            Object.keys(locs).forEach(locId=>{ if(locId!==selLoc) next[locId]=updated[locId]; });
                            return next;
                          });
                          setCopyMsg("✅ คัดลอกสำเร็จ ทุกหน่วยงานมีวันกิจกรรมครบแล้ว");
                          setTimeout(()=>setCopyMsg(""),4000);
                        } catch(e){ setCopyMsg("❌ เกิดข้อผิดพลาด: "+e.message); }
                        finally { setCopying(false); }
                      }}
                      className="flex items-center gap-2 bg-purple-500/20 text-purple-400 font-bold px-4 py-2 rounded-lg hover:bg-purple-500/30 border border-purple-500/30 text-sm disabled:opacity-50">
                      {copying?<ISpin sz={14}/>:"📋"}
                      {copying?"กำลังคัดลอก...":"คัดลอกวันนี้ไปทุก 10 หน่วยงาน"}
                    </button>
                    {copyMsg&&<p className="text-xs font-semibold" style={{color:copyMsg.startsWith("✅")?"#34d399":"#ef4444"}}>{copyMsg}</p>}
                  </div>
                </div>
              </div>
            )}

            {/* เลือกหน่วยงาน */}
            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-2 mb-3">

                <button key={l.id} onClick={()=>setSelLoc(l.id)}
                  className={`px-3 py-2 rounded-xl font-bold text-xs transition-all text-center ${selLoc===l.id?"bg-emerald-500 text-slate-900 shadow-lg shadow-emerald-500/50":"bg-slate-700 text-slate-300 hover:bg-slate-600"}`}>
                  {l.name}
                </button>
              ))}
            </div>
            <div className="p-3 bg-slate-900/50 rounded-lg">
              <p className="text-emerald-400 font-bold text-sm">{loc.name}</p>

            </div>
          </div>

          {/* คำอธิบาย */}
          <div className="bg-slate-800/30 border border-slate-700 rounded-xl p-3 flex flex-wrap gap-4 text-xs text-slate-400">
            <span className="flex items-center gap-1"><span className="bg-emerald-500 text-white font-black w-6 h-6 rounded flex items-center justify-center">✓</span> เข้าร่วม (P)</span>
            <span className="flex items-center gap-1"><span className="bg-red-500/80 text-white font-black w-6 h-6 rounded flex items-center justify-center">✗</span> ไม่เข้าร่วม (O)</span>
            <span className="flex items-center gap-1"><span className="bg-slate-600 text-slate-400 font-black w-6 h-6 rounded flex items-center justify-center">–</span> ยกเว้น/ไม่นับ (E)</span>
            <span className="text-slate-500">• กดที่ช่องเพื่อสลับสถานะ (ต้องใส่ PIN) • กดวันที่เพื่อลบ</span>
          </div>

                  </p>
                  <div className="flex flex-wrap gap-2 mt-2">

                              if(dates.includes(date)){ alert("วันที่นี้มีอยู่แล้ว"); return; }

                                </td>
                                <td className="px-1 py-1 text-white whitespace-nowrap sticky bg-amber-500/5 z-10 border-r border-amber-500/20 overflow-hidden dash-col-pos dash-td-text dash-sticky-pos">

                                </td>
                                <td className="px-1 py-1 text-white whitespace-nowrap sticky bg-amber-500/5 z-10 border-r border-amber-500/20 overflow-hidden dash-col-dept dash-td-text dash-sticky-dept">
                                  {a.department||"—"}
                                </td>
                                {dates.map(d=>{
                                  const hit = (getOutsiders[d]||[]).some(x=>{

                                    if(a.fullName&&x.fullName&&a.fullName.trim()===x.fullName.trim()) return true;
                                    return false;
                                  });
                                  return (
                                    <td key={d} className="text-center border-l border-amber-500/10 p-0.5">
                                      {hit
                                        ?<div className="w-8 h-7 rounded text-xs font-black flex items-center justify-center mx-auto bg-amber-500/70 text-white">✓</div>
                                        :<div className="w-8 h-7 rounded text-xs flex items-center justify-center mx-auto bg-slate-800/40 text-slate-600">·</div>
                                      }
                                    </td>
                                  );

                              </tr>

    function ReportsView({ atts, locs }) {
      const week = getWeekRange();
      const [selLoc,setSelLoc]     = useState("lampun");
      const [dateFrom,setDateFrom] = useState(week.start);
      const [dateTo,setDateTo]     = useState(week.end);
      const [modal,setModal]       = useState(null);
      const [delTarget,setDelTarget] = useState(null);  // record ที่จะลบ
      const [delPin,setDelPin]     = useState("");
      const [delErr,setDelErr]     = useState("");
      const [deleting,setDeleting] = useState(false);
      const [localAtts,setLocalAtts] = useState(atts);

      // sync localAtts เมื่อ atts เปลี่ยน
      useEffect(()=>{ setLocalAtts(atts); },[atts]);

      const confirmDelete = async () => {
        if(delPin !== ADMIN_PIN){ setDelErr("PIN ไม่ถูกต้อง"); setDelPin(""); return; }
        setDeleting(true);
        try {
          await db.collection("attendances").doc(delTarget.id).delete();
          setLocalAtts(prev=>prev.filter(a=>a.id!==delTarget.id));
          setDelTarget(null); setDelPin(""); setDelErr("");
          if(modal?.id===delTarget.id) setModal(null);
        } catch(e){ setDelErr("ลบไม่สำเร็จ: "+e.message); }
        finally { setDeleting(false); }
      };

      const locAtts = useMemo(()=>{
        return localAtts.filter(a=>{
          if(a.locationId!==selLoc) return false;
          const d=a.timestamp.slice(0,10);
          return d>=dateFrom && d<=dateTo;
        });
      },[localAtts,selLoc,dateFrom,dateTo]);

      const loc = locs[selLoc]||Object.values(locs)[0];

      // Export Excel
      const exportExcel = () => {
        const rows = locAtts.map(a=>({
          "รหัสพนักงาน":    a.empId||"-",
          "ชื่อ-นามสกุล":   a.fullName,
          "ตำแหน่ง":        a.position,
          "สังกัด/แผนก":    a.department,
          "หน่วยงาน":       a.locationName,
          "วันที่":         thaiD(a.timestamp),
          "เวลา":           new Date(a.timestamp).toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"}),
          "ระยะห่าง (ม.)":  a.distance,
          "พิกัด Lat":      a.location?.lat?.toFixed(6)||"",
          "พิกัด Lng":      a.location?.lng?.toFixed(6)||"",
          "URL รูปภาพ":     a.photoURL||"",
        }));
        const ws = XLSX.utils.json_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, loc.name);
        XLSX.writeFile(wb, `safety-talk-${selLoc}-${dateFrom}-${dateTo}.xlsx`);
      };

      return (
        <div className="space-y-5">
          {/* Delete Confirm Modal */}
          {delTarget&&(
            <div className="fixed inset-0 bg-black/85 z-50 flex items-center justify-center p-4">
              <div className="bg-slate-800 border border-red-500/40 rounded-2xl p-6 shadow-2xl w-full max-w-sm text-center">
                <div className="text-4xl mb-3">🗑️</div>
                <h3 className="text-white font-black text-lg mb-1">ยืนยันการลบรายการ</h3>
                <p className="text-slate-400 text-sm mb-1">{delTarget.fullName}</p>
                <p className="text-slate-500 text-xs mb-4">{thaiDT(delTarget.timestamp)}</p>
                <p className="text-red-400 text-sm font-semibold mb-3">⚠️ ข้อมูลจะถูกลบถาวร ไม่สามารถกู้คืนได้</p>
                <input type="password" value={delPin} onChange={e=>{setDelPin(e.target.value);setDelErr("");}}
                  onKeyDown={e=>e.key==="Enter"&&confirmDelete()}
                  placeholder="กรอก PIN ยืนยัน"
                  className="w-full bg-slate-900 border-2 border-slate-700 text-white px-4 py-2.5 rounded-lg focus:border-red-500 focus:outline-none text-center text-xl tracking-widest mb-2"/>
                {delErr&&<p className="text-red-400 text-sm mb-2">{delErr}</p>}
                <div className="flex gap-3 mt-3">
                  <button onClick={()=>{setDelTarget(null);setDelPin("");setDelErr("");}}
                    className="flex-1 bg-slate-700 text-white font-bold py-2.5 rounded-lg hover:bg-slate-600">ยกเลิก</button>
                  <button onClick={confirmDelete} disabled={deleting}
                    className="flex-1 bg-red-500 text-white font-black py-2.5 rounded-lg hover:bg-red-600 disabled:opacity-60">
                    {deleting?"กำลังลบ...":"ยืนยันลบ"}

                </div>
              </div>
            </div>
          )}

          {modal&&(
            <div className="fixed inset-0 bg-black/85 z-50 flex items-center justify-center p-4" onClick={()=>setModal(null)}>

                <img src={modal.photoURL} alt="proof" className="w-full rounded-2xl shadow-2xl border-2 border-emerald-500/40"/>
                <div className="mt-3 bg-slate-900/95 rounded-xl p-4 text-sm space-y-1">
                  <p className="text-white font-black text-base">{modal.fullName}</p>
                  <p className="text-slate-300">{modal.position} • {modal.department}</p>
                  <p className="text-emerald-400 font-semibold">{thaiDT(modal.timestamp)}</p>
                  <p className="text-slate-300">📍 ระยะห่าง <span className="text-white font-bold">{modal.distance} ม.</span></p>
                  <p className="text-slate-400 text-xs font-mono">พิกัด: {modal.location?.lat?.toFixed(6)}, {modal.location?.lng?.toFixed(6)}</p>
                  {modal.empId&&<p className="text-slate-400 text-xs">รหัสพนักงาน: {modal.empId}</p>}

                </div>

              </div>

                  {l.name}
                </button>
              ))}
            </div>
            <div className="mt-3 p-3 bg-slate-900/50 rounded-lg">
              <p className="text-emerald-400 font-bold">{loc.name}</p>
              <p className="text-slate-400 text-xs">{loc.fullName}</p>
            </div>
          </div>

          {/* กรองวันที่ + Export */}
          <div className="bg-slate-800/50 backdrop-blur-lg border border-emerald-500/30 rounded-2xl p-5 shadow-xl">
            <div className="flex flex-wrap gap-3 items-end justify-between">
              <div className="flex items-center gap-3 flex-wrap">
                <IFilter sz={18} cl="text-emerald-400"/>
                <div>
                  <label className="block text-slate-400 text-xs font-semibold mb-1">จากวันที่</label>
                  <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}
                    className="bg-slate-900/80 border-2 border-slate-700 text-white px-3 py-2 rounded-lg focus:border-emerald-500 focus:outline-none text-sm"/>
                </div>
                <div>
                  <label className="block text-slate-400 text-xs font-semibold mb-1">ถึงวันที่</label>
                  <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)}
                    className="bg-slate-900/80 border-2 border-slate-700 text-white px-3 py-2 rounded-lg focus:border-emerald-500 focus:outline-none text-sm"/>
                </div>
                <div className="flex gap-2 mt-4">
                  <button onClick={()=>{const w=getWeekRange();setDateFrom(w.start);setDateTo(w.end);}}
                    className="bg-slate-700 text-slate-300 text-xs font-bold px-3 py-2 rounded-lg hover:bg-slate-600">สัปดาห์นี้</button>
                  <button onClick={()=>{const n=new Date();setDateFrom(new Date(n.getFullYear(),n.getMonth(),1).toISOString().slice(0,10));setDateTo(new Date(n.getFullYear(),n.getMonth()+1,0).toISOString().slice(0,10));}}
