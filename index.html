              </div>
              <button onClick={exportExcel}
                className="bg-emerald-500 text-slate-900 font-bold px-5 py-2.5 rounded-lg hover:shadow-lg hover:shadow-emerald-500/50 flex items-center text-sm">
                <IDl sz={16} cl="mr-2"/>Export Excel
              </button>
            </div>
            <div className="mt-3 text-slate-400 text-sm">
              พบ <span className="text-white font-bold">{locAtts.length}</span> รายการ ระหว่าง {thaiD(dateFrom+"T00:00:00")} — {thaiD(dateTo+"T00:00:00")}
            </div>
          </div>

          {/* Photo Grid */}
          <div className="bg-slate-800/50 backdrop-blur-lg border border-emerald-500/30 rounded-2xl p-5 shadow-xl">
            <h3 className="text-lg font-black text-white mb-1 flex items-center"><IEye sz={20} cl="text-emerald-400 mr-2"/>หลักฐานรูปภาพ</h3>
            <p className="text-slate-400 text-xs mb-4">กดที่รูปเพื่อดูรายละเอียดและพิกัด • รูปเก็บที่ ImgBB 90 วัน</p>
            {locAtts.length===0
              ? <div className="text-center py-10 text-slate-500"><IFile sz={36} cl="mx-auto mb-3 opacity-50"/><p>ไม่มีข้อมูลในช่วงเวลาที่เลือก</p></div>
              : <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3">
                  {locAtts.map(a=>(
                    <div key={a.id} className="bg-slate-900/70 rounded-xl overflow-hidden border border-slate-700 hover:border-emerald-500/60 transition-all group">
                      <div onClick={()=>a.photoURL&&setModal(a)} className="cursor-pointer">
                        {a.photoURL
                          ?<div className="relative">
                            <img src={a.photoThumb||a.photoURL} alt="proof" className="w-full h-32 object-cover group-hover:opacity-90 transition-opacity"/>
                            <div className="absolute inset-0 bg-gradient-to-t from-slate-900/70 to-transparent"/>
                            <span className="absolute bottom-2 left-2 text-emerald-400 text-xs font-bold bg-slate-900/80 px-1.5 py-0.5 rounded-full">📍{a.distance}ม.</span>
                          </div>
                          :<div className="w-full h-32 bg-slate-800 flex items-center justify-center"><ICamera sz={24} cl="text-slate-600"/></div>
                        }
                        <div className="p-2 pb-1">
                          <p className="text-white font-bold text-xs truncate">{a.fullName}</p>
                          <p className="text-slate-400 text-xs truncate">{a.position}</p>
                          <p className="text-emerald-400 text-xs">{new Date(a.timestamp).toLocaleDateString("th-TH",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}</p>
                        </div>
                      </div>
                      <div className="px-2 pb-2">
                        <button onClick={e=>{e.stopPropagation();setDelTarget(a);setDelPin("");setDelErr("");}}
                          className="w-full bg-red-500/10 text-red-400 text-xs font-bold py-1 rounded-lg hover:bg-red-500/20 transition-colors border border-red-500/20">
                          🗑️ ลบรายการ
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
            }
          </div>

          {/* ตารางข้อมูล */}
          <div className="bg-slate-800/50 backdrop-blur-lg border border-emerald-500/30 rounded-2xl p-5 shadow-xl">
            <h3 className="text-lg font-black text-white mb-4">รายละเอียดการลงทะเบียน</h3>
            <div className="bg-slate-900/50 rounded-lg overflow-x-auto">
              <table className="w-full text-sm">
                <thead className="bg-slate-800">
                  <tr>{["วันที่/เวลา","รหัส","ชื่อ-นามสกุล","ตำแหน่ง","สังกัด","ระยะ(ม.)",""].map(h=>(
                    <th key={h} className="px-3 py-2.5 text-left text-emerald-400 font-bold whitespace-nowrap">{h}</th>
                  ))}</tr>
                </thead>
                <tbody className="divide-y divide-slate-700">
                  {locAtts.length===0
                    ?<tr><td colSpan="6" className="px-4 py-10 text-center text-slate-500">ไม่มีข้อมูล</td></tr>
                    :locAtts.map(a=>(
                      <tr key={a.id} className="hover:bg-slate-800/50 transition-colors">
                        <td className="px-3 py-2.5 text-slate-300 whitespace-nowrap">{new Date(a.timestamp).toLocaleDateString("th-TH",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}</td>
                        <td className="px-3 py-2.5 text-slate-400">{a.empId||"-"}</td>
                        <td className="px-3 py-2.5 text-white font-medium">{a.fullName}</td>
                        <td className="px-3 py-2.5 text-slate-300">{a.position}</td>
                        <td className="px-3 py-2.5 text-slate-300">{a.department}</td>
                        <td className="px-3 py-2.5 text-center text-emerald-400 font-bold">{a.distance}</td>
                        <td className="px-3 py-2.5 text-center">
                          <button onClick={()=>{setDelTarget(a);setDelPin("");setDelErr("");}}
                            className="bg-red-500/10 text-red-400 text-xs font-bold px-2 py-1 rounded-lg hover:bg-red-500/20 border border-red-500/20 whitespace-nowrap">
                            🗑️ ลบ
                          </button>
                        </td>
                      </tr>
                    ))
                  }
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // ============ SETTINGS VIEW ============
    // ---- MAP COMPONENT ----
    function LocationMap({ lat, lng, name, onMapClick }) {
      const mapRef = useRef(null);
      const mapObjRef = useRef(null);
      const markerRef = useRef(null);
      const circleRef = useRef(null);

      useEffect(()=>{
        if(!mapRef.current) return;
        // init map ครั้งเดียว
        if(!mapObjRef.current) {
          mapObjRef.current = L.map(mapRef.current, { zoomControl:true }).setView([lat,lng], 17);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution:'© OpenStreetMap',
            maxZoom:19
          }).addTo(mapObjRef.current);
          // คลิกแผนที่เพื่อตั้งพิกัด
          mapObjRef.current.on('click', e=>{
            onMapClick(e.latlng.lat, e.latlng.lng);
          });
        }
        return ()=>{};
      },[]);

      // อัพเดทหมุดและวงกลมเมื่อพิกัดเปลี่ยน
      useEffect(()=>{
        if(!mapObjRef.current) return;
        const validLat = parseFloat(lat)||0, validLng = parseFloat(lng)||0;
        if(!validLat || !validLng) return;

        // ลบหมุดและวงกลมเก่า
        if(markerRef.current) mapObjRef.current.removeLayer(markerRef.current);
        if(circleRef.current) mapObjRef.current.removeLayer(circleRef.current);

        // วงกลมแสดงรัศมี 20 เมตร
        circleRef.current = L.circle([validLat,validLng], {
          radius: 20, color:'#10b981', fillColor:'#10b981', fillOpacity:0.15, weight:2
        }).addTo(mapObjRef.current);

        // หมุด custom
        const icon = L.divIcon({
          className:'',
          html:`<div style="width:36px;height:36px;background:#10b981;border:3px solid white;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.4);font-size:16px;">📍</div>`,
          iconSize:[36,36], iconAnchor:[18,36]
        });
        markerRef.current = L.marker([validLat,validLng], {icon, draggable:true})
          .bindPopup(`<b>${name}</b><br/>${validLat.toFixed(6)}, ${validLng.toFixed(6)}`)
          .addTo(mapObjRef.current)
          .openPopup();

        // ลากหมุดได้
        markerRef.current.on('dragend', e=>{
          const p = e.target.getLatLng();
          onMapClick(p.lat, p.lng);
        });

        // ย้ายแผนที่ไปที่หมุดใหม่
        mapObjRef.current.setView([validLat,validLng], mapObjRef.current.getZoom());
      },[lat,lng,name]);

      return (
        <div>
          <div ref={mapRef} style={{height:"320px",borderRadius:"12px",overflow:"hidden",border:"2px solid rgba(16,185,129,0.3)"}}/>
          <p className="text-slate-500 text-xs mt-2 text-center">
            💡 กดที่แผนที่เพื่อตั้งพิกัด หรือลากหมุดสีเขียวได้เลย • วงกลมสีเขียว = รัศมี 20 เมตร
          </p>
        </div>
      );
    }

    function SettingsView({ curLoc, setCurLoc, locs, setLocs }) {
      const [sel,setSel]   = useState(curLoc);
      const [saved,setSaved] = useState(false);
      const cur = locs[sel]||Object.values(locs)[0];
      const [saving,setSaving] = useState(false);

      const upd = (la,ln) => setLocs(prev=>({...prev,[sel]:{...prev[sel],lat:parseFloat(la)||0,lng:parseFloat(ln)||0}}));
      const gps = () => navigator.geolocation.getCurrentPosition(p=>upd(p.coords.latitude,p.coords.longitude),()=>alert("ไม่สามารถรับตำแหน่งได้"));
      const save = async () => {
        setSaving(true);
        try {
          // บันทึกเฉพาะค่าที่แก้ไขได้ (ไม่เก็บ fullName เดิมซ้ำ เพราะอยู่ใน LOCATIONS แล้ว)
          const toSave = {};
          Object.keys(locs).forEach(id=>{
            toSave[id] = {
              lat:         locs[id].lat,
              lng:         locs[id].lng,
              maxDist:     locs[id].maxDist     || 50,
              displayDist: locs[id].displayDist || 20,
              timeStart:   locs[id].timeStart   || "08:00",
              timeEnd:     locs[id].timeEnd     || "09:30",
            };
          });
          await db.collection("settings").doc("locations").set(toSave);
          setSaved(true);
          setTimeout(()=>setSaved(false), 3000);
        } catch(e) {
          alert("บันทึกไม่สำเร็จ: " + e.message);
        } finally {
          setSaving(false);
        }
      };
      const apply = () => { setCurLoc(sel); alert(`เปลี่ยนสถานที่เป็น ${locs[sel].name} แล้ว`); };
      const copyUrl = url => navigator.clipboard.writeText(url).then(()=>alert("คัดลอกแล้ว!"));

      const base = `${window.location.origin}${window.location.pathname}`;

      return (
        <div className="max-w-4xl mx-auto space-y-5">
          <div className="bg-slate-800/50 backdrop-blur-lg border border-emerald-500/30 rounded-2xl p-6 shadow-xl">
            <h2 className="text-xl font-black text-white mb-5 flex items-center"><ICog sz={22} cl="text-emerald-400 mr-2"/>ตั้งค่าพิกัดหน่วยงาน</h2>

            {/* เลือกหน่วยงาน */}
            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-2 mb-4">
              {Object.values(locs).map(l=>(
                <button key={l.id} onClick={()=>setSel(l.id)}
                  className={`px-3 py-2 rounded-xl font-bold text-xs transition-all ${sel===l.id?"bg-emerald-500 text-slate-900 shadow-lg shadow-emerald-500/50":"bg-slate-700 text-slate-300 hover:bg-slate-600"}`}>
                  {l.name}
                </button>
              ))}
            </div>
            <div className="p-3 bg-slate-900/50 rounded-lg mb-4">
              <p className="text-emerald-400 font-bold">{cur.name}</p>
              <p className="text-slate-400 text-sm">{cur.fullName}</p>
            </div>

            {/* แผนที่ */}
            <div className="mb-4">
              <LocationMap key={sel} lat={cur.lat} lng={cur.lng} name={cur.name} onMapClick={(la,ln)=>upd(la,ln)}/>
            </div>

            {/* input พิกัด */}
            <div className="grid grid-cols-2 gap-4 mb-3">
              <div>
                <label className="block text-slate-400 text-sm font-semibold mb-1">Latitude</label>
                <input type="number" step="0.000001" value={cur.lat} onChange={e=>upd(e.target.value,cur.lng)}
                  className="w-full bg-slate-800 border border-slate-700 text-white px-3 py-2 rounded-lg focus:border-emerald-500 focus:outline-none font-mono text-sm"/>
              </div>
              <div>
                <label className="block text-slate-400 text-sm font-semibold mb-1">Longitude</label>
                <input type="number" step="0.000001" value={cur.lng} onChange={e=>upd(cur.lat,e.target.value)}
                  className="w-full bg-slate-800 border border-slate-700 text-white px-3 py-2 rounded-lg focus:border-emerald-500 focus:outline-none font-mono text-sm"/>
              </div>
            </div>

            {/* ตั้งค่ารัศมี */}
            <div className="bg-slate-800/60 border border-slate-600 rounded-xl p-4 mb-3">
              <label className="block text-white font-bold text-sm mb-3">🎯 รัศมีที่อนุญาต (เมตร) — {cur.name}</label>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-slate-400 text-xs font-semibold mb-1">รัศมีจริง (ระบบใช้)</label>
                  <input type="number" min="10" max="500" step="5"
                    value={cur.maxDist||50}
                    onChange={e=>setLocs(prev=>({...prev,[sel]:{...prev[sel],maxDist:parseInt(e.target.value)||50}}))}
                    className="w-full bg-slate-900 border border-slate-700 text-white px-3 py-2 rounded-lg focus:border-emerald-500 focus:outline-none font-mono text-sm"/>
                  <p className="text-slate-500 text-xs mt-1">ระยะจริงที่ระบบยอมรับ</p>
                </div>
                <div>
                  <label className="block text-slate-400 text-xs font-semibold mb-1">รัศมีที่แสดงผู้ใช้</label>
                  <input type="number" min="5" max="500" step="5"
                    value={cur.displayDist||20}
                    onChange={e=>setLocs(prev=>({...prev,[sel]:{...prev[sel],displayDist:parseInt(e.target.value)||20}}))}
                    className="w-full bg-slate-900 border border-slate-700 text-white px-3 py-2 rounded-lg focus:border-emerald-500 focus:outline-none font-mono text-sm"/>
                  <p className="text-slate-500 text-xs mt-1">ตัวเลขที่พนักงานจะเห็น</p>
                </div>
              </div>
              <div className="mt-2 text-xs text-slate-400 bg-slate-900/50 rounded-lg p-2">
                ระบบจะยอมรับระยะ <span className="text-emerald-400 font-bold">{cur.maxDist||50} ม.</span> แต่แสดงว่าต้องอยู่ใน <span className="text-amber-400 font-bold">{cur.displayDist||20} ม.</span>
              </div>
            </div>

            <button onClick={gps} className="w-full bg-slate-700 text-white font-bold py-2 rounded-lg hover:bg-slate-600 text-sm mb-4">
              <IMapPin sz={13} cl="inline mr-1"/>ใช้ตำแหน่ง GPS ปัจจุบัน (แนะนำ: ยืนที่จุดลงทะเบียนแล้วกด)
            </button>

            {/* ตั้งค่าเวลาลงทะเบียน */}
            <div className="bg-slate-800/60 border border-slate-600 rounded-xl p-4 mb-3">
              <label className="block text-white font-bold text-sm mb-3">⏰ ช่วงเวลาที่ลงทะเบียนได้ — {cur.name}</label>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-slate-400 text-xs font-semibold mb-1">เวลาเริ่มต้น</label>
                  <input type="time"
                    value={cur.timeStart||"08:00"}
                    onChange={e=>setLocs(prev=>({...prev,[sel]:{...prev[sel],timeStart:e.target.value}}))}
                    className="w-full bg-slate-900 border border-slate-700 text-white px-3 py-2 rounded-lg focus:border-emerald-500 focus:outline-none font-mono text-sm"/>
                </div>
                <div>
                  <label className="block text-slate-400 text-xs font-semibold mb-1">เวลาสิ้นสุด</label>
                  <input type="time"
                    value={cur.timeEnd||"09:30"}
                    onChange={e=>setLocs(prev=>({...prev,[sel]:{...prev[sel],timeEnd:e.target.value}}))}
                    className="w-full bg-slate-900 border border-slate-700 text-white px-3 py-2 rounded-lg focus:border-emerald-500 focus:outline-none font-mono text-sm"/>
                </div>
              </div>
              <div className="mt-2 text-xs text-slate-400 bg-slate-900/50 rounded-lg p-2">
                พนักงานลงทะเบียนได้ <span className="text-emerald-400 font-bold">{cur.timeStart||"08:00"} — {cur.timeEnd||"09:30"} น.</span>
              </div>
            </div>
            <button onClick={save} disabled={saving} className="w-full bg-gradient-to-r from-emerald-500 to-teal-500 text-slate-900 font-black py-3 rounded-lg hover:shadow-lg hover:shadow-emerald-500/50 disabled:opacity-70 flex items-center justify-center">
              {saving?<><ISpin sz={16} cl="mr-2"/>กำลังบันทึกไป Firestore...</>:saved?<><ICheck sz={16} cl="inline mr-2"/>บันทึกสำเร็จ! ☁️</>:"บันทึกการตั้งค่า (บันทึกออนไลน์)"}
            </button>
          </div>

          {/* QR Code URLs */}
          <div className="bg-amber-500/10 border border-amber-500/30 rounded-2xl p-6 shadow-xl">
            <h3 className="text-white font-bold mb-1 flex items-center"><IQr sz={18} cl="text-amber-400 mr-2"/>URL สำหรับสร้าง QR Code (แต่ละหน่วยงาน)</h3>
            <p className="text-slate-400 text-xs mb-4">นำ URL ไปสร้าง QR Code ที่ qrcode.me หรือ qr-code-generator.com</p>
            <div className="space-y-2 max-h-72 overflow-y-auto pr-1">
              {Object.values(locs).map(l=>(
                <div key={l.id} className="bg-slate-900/60 rounded-lg p-3 flex items-center justify-between gap-2">
                  <div className="min-w-0">
                    <p className="text-emerald-400 font-bold text-xs">{l.name}</p>
                    <p className="text-slate-400 font-mono text-xs truncate">{base}?location={l.id}</p>
                  </div>
                  <button onClick={()=>copyUrl(`${base}?location=${l.id}`)}
                    className="flex-shrink-0 bg-slate-700 text-white text-xs font-bold px-3 py-1.5 rounded-lg hover:bg-slate-600">
                    คัดลอก
                  </button>
                </div>
              ))}
            </div>
            <div className="mt-4 p-3 bg-slate-800/50 rounded-lg">
              <p className="text-amber-400 font-bold text-xs mb-1">🔐 URL สำหรับ Admin</p>
              <p className="text-slate-400 font-mono text-xs truncate">{base}?admin=1</p>
              <button onClick={()=>copyUrl(`${base}?admin=1`)}
                className="mt-2 bg-slate-700 text-white text-xs font-bold px-3 py-1.5 rounded-lg hover:bg-slate-600">
                คัดลอก URL Admin
              </button>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
